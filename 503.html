<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/favicon_180x180.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#FF7E42">
  <meta name="description" content="Internly is even uit de lucht voor onderhoud. We zijn snel weer terug.">
  <title>Internly — Service tijdelijk niet beschikbaar (503)</title>
  <meta property="og:title" content="Tijdelijk niet beschikbaar — Internly">
  <meta property="og:description" content="Internly is even uit de lucht voor onderhoud. We zijn snel weer terug.">
  <meta property="og:url" content="https://internly.pro/503.html">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Internly">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg, #f4f3ef);
      padding: 32px 24px;
      box-sizing: border-box;
      text-align: center;
    }
    .err-code {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 7rem;
      font-weight: 700;
      color: var(--c-orange-deep, #e05c1a);
      line-height: 1;
      margin-bottom: 4px;
    }
    .err-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: #0d1520;
      margin-bottom: 10px;
    }
    .err-sub {
      font-size: 1rem;
      color: #6b7280;
      max-width: 420px;
      margin: 0 auto 32px;
      line-height: 1.55;
    }
    .err-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .err-btn {
      display: inline-block;
      padding: 12px 24px;
      border-radius: 50px;
      font-family: 'Outfit', sans-serif;
      font-size: .95rem;
      font-weight: 600;
      text-decoration: none;
      transition: background .15s, color .15s;
      min-height: 44px;
      line-height: 1.2;
    }
    .err-btn-primary {
      background: var(--primary, #1a7a48);
      color: #fff;
    }
    .err-btn-primary:hover { background: #0f5c36; }
    .err-btn-ghost {
      background: transparent;
      border: 1.5px solid #d1d5db;
      color: #374151;
    }
    .err-btn-ghost:hover { background: #f3f4f6; }
    .err-logo {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--primary, #1a7a48);
      text-decoration: none;
      margin-bottom: 40px;
      display: block;
    }
    .err-logo span { color: var(--accent, #FF7E42); }
  </style>
</head>
<body>
  <a class="err-logo" href="/">Intern<span>ly</span></a>
  <div class="err-code">503</div>
  <div class="err-title">Internly is even uit de lucht.</div>
  <p class="err-sub">We werken aan onderhoud. We zijn snel weer terug — meestal binnen een paar minuten. Geen actie nodig van jouw kant.</p>
  <div class="err-actions">
    <a href="javascript:location.reload()" class="err-btn err-btn-primary">Opnieuw proberen</a>
  </div>
<footer style="text-align:center;padding:8px 0 12px;font-size:.6rem;color:rgba(0,0,0,.18);">© 2026 Sasubo Holding B.V.</footer>
</body>
</html>

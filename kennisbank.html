<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a7a48">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/favicon_180x180.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="description" content="Antwoorden op stagevragen. Voor studenten, bedrijven, scholen en buddies.">
  <link rel="canonical" href="https://internly.pro/kennisbank.html">
  <title>Kennisbank — Internly</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600&family=DM+Mono:wght@400;500&family=Caveat:wght@500;600;700&display=swap" rel="stylesheet">
  <script src="js/utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/kb.js"></script>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ═══════════════════════════════════════════════════════════════
       Subpage archetype (kennisbank) — search/list pattern.
       Globale tokens uit css/style.css. Kennisbank-eigen kb-*
       class-namen worden door js/kb.js gerenderd in #kb-header.
       ═══════════════════════════════════════════════════════════════ */

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body, 'Outfit', sans-serif);
      background: var(--bg-page, #f4f3ef);
      color: var(--fg-primary, #0d1520);
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── TOPBAR (gerendered in #kb-header door js/kb.js) ── */
    .kb-topbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(244,243,239,.92);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--line-subtle, #f0f0ee);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 var(--s6, 28px);
      height: 58px;
      gap: 16px;
    }
    .kb-logo {
      font-family: var(--font-display, 'Bricolage Grotesque', sans-serif);
      font-size: 1.35rem; font-weight: 700;
      color: var(--c-green-deep, #0f5c36);
      letter-spacing: -.03em;
      text-decoration: none;
      flex-shrink: 0;
    }
    .kb-logo span { color: var(--c-orange-deep, #e05c1a); }
    .kb-nav { display: flex; gap: 20px; }
    .kb-nav a {
      color: var(--fg-secondary, #374151);
      text-decoration: none;
      font-size: .9rem; font-weight: 500;
      transition: color var(--t-fast, .14s);
    }
    .kb-nav a:hover,
    .kb-nav a.active { color: var(--c-orange-deep, #e05c1a); }
    .kb-header-actions {
      display: flex; gap: 10px;
      align-items: center; flex-shrink: 0;
    }
    .kb-btn-secondary {
      padding: 7px 16px;
      border: 1.5px solid var(--line-default, #e2e8f0);
      border-radius: var(--r-pill, 20px);
      color: var(--fg-secondary, #374151);
      background: none;
      font-family: var(--font-body, 'Outfit', sans-serif);
      font-size: .85rem; font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: border-color var(--t-fast, .14s), color var(--t-fast, .14s), background var(--t-fast, .14s);
    }
    .kb-btn-secondary:hover {
      border-color: var(--fg-tertiary);
      color: var(--fg-primary);
      background: var(--c-cream, #f4f3ef);
    }
    .kb-btn-primary {
      padding: 7px 18px;
      background: var(--c-orange-deep, #e05c1a);
      color: #fff;
      border: none;
      border-radius: var(--r-pill, 20px);
      font-family: var(--font-body, 'Outfit', sans-serif);
      font-size: .85rem; font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background var(--t-fast, .14s);
    }
    .kb-btn-primary:hover { background: #b94613; }

    /* ── PAGE ── */
    .kb-page {
      max-width: 1100px;
      margin: 0 auto;
      padding: var(--s7, 40px) var(--s5, 20px) var(--s9, 80px);
    }

    /* ── HERO (mini-hero variant — geen volledig hero-blok) ── */
    .kb-hero {
      text-align: center;
      padding: var(--s7, 40px) 0 var(--s6, 32px);
    }
    .kb-eyebrow {
      font-family: var(--font-script, 'Caveat', cursive);
      font-size: 1.2rem;
      color: var(--c-orange-deep, #e05c1a);
      display: inline-block;
      transform: rotate(-1deg);
      margin-bottom: 4px;
    }
    .kb-hero h1 {
      font-family: var(--font-display, 'Bricolage Grotesque', sans-serif);
      font-size: clamp(2rem, 4.4vw, 3rem);
      font-weight: 800;
      color: var(--fg-primary, #0d1520);
      letter-spacing: -.03em;
      margin-bottom: 10px;
      line-height: 1.1;
    }
    .kb-hero p {
      font-size: 1.05rem;
      color: var(--fg-tertiary, #6b8070);
      max-width: 520px;
      margin: 0 auto;
      line-height: 1.55;
    }

    /* ── CONTROLS ── */
    .kb-controls {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin: var(--s5, 24px) 0 var(--s6, 32px);
    }
    .kb-search-wrap {
      position: relative;
      max-width: 540px;
      margin: 0 auto;
      width: 100%;
    }
    .kb-search-wrap svg {
      position: absolute;
      left: 16px; top: 50%;
      transform: translateY(-50%);
      color: var(--fg-tertiary, #9ca3af);
      pointer-events: none;
    }
    #kb-search {
      width: 100%;
      padding: 12px 18px 12px 44px;
      border: 1.5px solid var(--line-default, #e2e8f0);
      border-radius: var(--r-pill, 50px);
      font-family: var(--font-body, 'Outfit', sans-serif);
      font-size: .95rem;
      color: var(--fg-primary, #0d1520);
      background: var(--bg-surface, #fff);
      outline: none;
      transition: border-color var(--t-fast, .15s);
    }
    #kb-search:focus { border-color: var(--c-green, #1a7a48); }

    /* Filter pills */
    .filter-pills {
      display: flex; gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .fp {
      padding: 7px 18px;
      border: 1.5px solid var(--line-default, #e2e8f0);
      border-radius: var(--r-pill, 50px);
      background: var(--bg-surface, #fff);
      color: var(--fg-secondary, #374151);
      font-family: var(--font-body, 'Outfit', sans-serif);
      font-size: .85rem; font-weight: 500;
      cursor: pointer;
      transition: all var(--t-fast, .14s);
      white-space: nowrap;
    }
    .fp:hover {
      border-color: var(--c-green, #1a7a48);
      color: var(--c-green, #1a7a48);
    }
    .fp.active {
      background: var(--c-green, #1a7a48);
      border-color: var(--c-green, #1a7a48);
      color: #fff;
    }

    /* ── GRID ── */
    .kb-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: var(--s4, 16px);
    }

    /* ── CARDS (gerendered door js/kb.js) ── */
    .kb-card {
      display: flex; flex-direction: column;
      background: var(--bg-surface, #fff);
      border: 1px solid var(--line-subtle, rgba(13,26,16,.09));
      border-radius: var(--r-md, 16px);
      padding: 22px 20px;
      text-decoration: none;
      color: inherit;
      box-shadow: var(--shadow-sm, 0 1px 3px rgba(0,0,0,.06));
      transition: transform var(--t-fast, .14s), box-shadow var(--t-fast, .14s), border-color var(--t-fast, .14s);
    }
    .kb-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md, 0 4px 16px rgba(0,0,0,.08));
      border-color: var(--c-green, #1a7a48);
    }
    .kb-card-audience {
      font-family: var(--font-mono, 'DM Mono', monospace);
      font-size: .68rem; font-weight: 500;
      color: var(--c-green, #1a7a48);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: .12em;
    }
    .kb-card-title {
      font-family: var(--font-display, 'Bricolage Grotesque', sans-serif);
      font-size: 1.05rem; font-weight: 700;
      color: var(--fg-primary, #0d1520);
      margin-bottom: 8px;
      line-height: 1.35;
      letter-spacing: -.01em;
    }
    .kb-card-excerpt {
      font-size: .88rem;
      color: var(--fg-secondary, #6b7280);
      line-height: 1.6;
      flex: 1;
      margin-bottom: 14px;
    }
    .kb-card-footer {
      display: flex; align-items: center;
      justify-content: space-between;
      gap: 8px; flex-wrap: wrap;
    }
    .kb-card-tags {
      display: flex; gap: 5px;
      flex-wrap: wrap;
    }
    .kb-card-date {
      font-family: var(--font-mono, 'DM Mono', monospace);
      font-size: .72rem;
      color: var(--fg-tertiary, #9ca3af);
      flex-shrink: 0;
    }

    /* ── LOADING / EMPTY ── */
    .kb-loading {
      text-align: center;
      padding: 48px;
      color: var(--fg-tertiary, #6b7280);
      grid-column: 1/-1;
    }
    #kb-empty {
      display: none;
      text-align: center;
      padding: 64px 20px;
      color: var(--fg-tertiary, #6b7280);
    }
    #kb-empty:not([hidden]) { display: block; }
    #kb-empty p { font-size: 1rem; margin-bottom: 6px; }
    #kb-empty small {
      font-size: .85rem;
      color: var(--fg-tertiary, #9ca3af);
    }

    /* ── FOOTER (kennisbank-specifiek, light) ── */
    .kb-footer {
      text-align: center;
      margin-top: var(--s9, 60px);
      padding-top: var(--s6, 32px);
      border-top: 1px solid var(--line-subtle, #f0f0ee);
      font-size: .82rem;
      color: var(--fg-tertiary, #9ca3af);
    }
    .kb-footer a {
      color: var(--fg-secondary, #6b7280);
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .kb-footer a:hover { color: var(--c-orange-deep); }

    /* ── NOTIF ── */
    .notif {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: var(--c-ink, #0d1520);
      color: #fff;
      padding: 12px 24px;
      border-radius: var(--r-md, 12px);
      font-size: .9rem;
      box-shadow: 0 8px 28px rgba(0,0,0,.25);
      z-index: 9999;
      opacity: 0;
      transition: opacity .25s, transform .25s;
      pointer-events: none;
    }
    .notif.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    :focus-visible {
      outline: 2px solid var(--c-orange-deep, #e05c1a);
      outline-offset: 2px;
    }

    @media (max-width: 768px) {
      .kb-topbar { padding: 0 16px; }
      .kb-nav { display: none; }
      .kb-hero h1 { font-size: 1.9rem; }
      .kb-grid { grid-template-columns: 1fr; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
      .kb-card:hover { transform: none; }
    }
  </style>
</head>
<body>

<div class="notif" id="notif"></div>
<div id="kb-header"></div>

<main class="kb-page">
  <section class="kb-hero">
    <span class="kb-eyebrow">kennisbank</span>
    <h1>Wat we leren over de stagemarkt</h1>
    <p>Antwoorden op stagevragen — voor iedereen, van student tot stagebedrijf.</p>
  </section>

  <section class="kb-controls">
    <div class="kb-search-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="search" id="kb-search" placeholder="Zoek op onderwerp, rechten, tips…" aria-label="Zoek in kennisbank">
    </div>
    <div class="filter-pills" id="audience-filter" role="group" aria-label="Filter op doelgroep">
      <button class="fp active" data-audience="all">Alles</button>
      <button class="fp" data-audience="student_bol">BOL</button>
      <button class="fp" data-audience="student_bbl">BBL</button>
      <button class="fp" data-audience="bedrijf">Bedrijf</button>
      <button class="fp" data-audience="school">School</button>
      <button class="fp" data-audience="buddy">Buddy</button>
    </div>
  </section>

  <section class="kb-grid" id="kb-articles-grid" aria-live="polite"></section>

  <div id="kb-empty" hidden>
    <p>Geen artikelen gevonden.</p>
    <small>Probeer een andere zoekterm of kies een andere doelgroep.</small>
  </div>

  <footer class="kb-footer">
    <p>© 2026 Sasubo Holding B.V. &nbsp;·&nbsp; <a href="privacybeleid.html">Privacy</a> &nbsp;·&nbsp; <a href="spelregels.html">Spelregels</a></p>
  </footer>
</main>

<script>
document.addEventListener('DOMContentLoaded', async () => {
  await renderKBHeader('kb-header');
  await loadAndRenderArticles();
  bindSearchAndFilter();
});
</script>

</body>
</html>

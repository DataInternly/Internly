<head>

  <title>Berichten — Internly</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700&family=Outfit:wght@300;400;500;600&family=DM+Mono:wght@400;500&family=Caveat:wght@500;600;700&display=swap" rel="stylesheet">
  <script src="js/utils.js"></script>
  <script src="js/roles.js"></script>
  <script src="js/avatar.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4"></script>
  <script src="js/supabase.js"></script>
  <script src="js/profanity.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/emoji-mart@5.5.2/dist/browser.js"
          integrity="sha384-gGElBOlmyIGNVOeetC2Q0EHG2IzuLtq7wBSnFgnkDTB/yzjOi6HwHkyt8xjsy7SU"
          crossorigin="anonymous"></script>
  <script src="js/toast.js"></script>
  <script src="js/consent.js" defer></script>
  <script>
  (function() {
    function _loadTel() {
      var s = document.createElement('script');
      s.src = 'js/telemetry.js';
      s.setAttribute('data-internly-tel', '1');
      document.head.appendChild(s);
    }
    if (typeof window.InternlyConsent !== 'undefined') {
      if (window.InternlyConsent.hasConsent('analytics')) {
        _loadTel();
      } else {
        window.InternlyConsent.onAccept('analytics', _loadTel);
      }
    } else {
      document.addEventListener('DOMContentLoaded', function() {
        if (typeof window.InternlyConsent !== 'undefined') {
          if (window.InternlyConsent.hasConsent('analytics')) {
            _loadTel();
          } else {
            window.InternlyConsent.onAccept('analytics', _loadTel);
          }
        }
      });
    }
  })();
  </script>
  <link rel="stylesheet" href="css/style.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* ═══════════════════════════════════════════════════════════════
       DOTTED JOURNAL ACHTERGROND — Barry's verzoek (KRITIEK)
       Achtergrond zit op <body class="page-chat">, NIET op .chat-wrap
       of bubbles. background-attachment: fixed zorgt dat het patroon
       niet meescroll. Bubbles blijven semi-transparant zodat het
       journal-effect doorschemert.
       ═══════════════════════════════════════════════════════════════ */
    body.page-chat {
      font-family: var(--font-body, 'Outfit', sans-serif);
      color: var(--fg-primary, #0d1520);
      background-color: var(--c-cream-warm, #fdfaf6);
      background-image:
        /* dot grid op 22px ritme */
        radial-gradient(circle, rgba(13, 26, 16, 0.07) 1px, transparent 1px),
        /* warme oranje light-source rechtsboven */
        radial-gradient(ellipse 80% 60% at 90% 8%, rgba(255, 126, 66, 0.10), transparent 60%),
        /* diepere warm-pool linksonder */
        radial-gradient(ellipse 70% 50% at 8% 92%, rgba(224, 92, 26, 0.05), transparent 60%);
      background-size: 22px 22px, 100% 100%, 100% 100%;
      background-attachment: fixed;
      -webkit-font-smoothing: antialiased;
      display: flex; flex-direction: column;
      /* iOS Safari fallback, then dvh for modern browsers */
      height: 100vh;
      height: -webkit-fill-available;
      height: 100dvh;
      overflow: hidden;
    }

    /* ── Topbar — translucent zodat journal doorschemert ── */
    .topbar {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--line-subtle, rgba(13,26,16,.09));
      padding: 0 var(--s5, 24px); height: 56px; flex-shrink: 0;
      display: flex; align-items: center; gap: var(--s3, 14px);
    }
    .topbar-logo {
      font-family: var(--font-display, 'Bricolage Grotesque', sans-serif);
      font-size: 1.2rem; font-weight: 700;
      color: var(--c-green-deep, #0f5c36);
      letter-spacing: -.02em; text-decoration: none;
    }
    .topbar-logo span { color: var(--c-orange-deep, #e05c1a); }
    .back-btn {
      background: transparent;
      border: 1.5px solid var(--line-default, rgba(13,26,16,.14));
      color: var(--fg-secondary, #2e4038);
      padding: 5px 12px; border-radius: var(--r-pill, 999px);
      font-family: var(--font-body, 'Outfit', sans-serif);
      font-size: .82rem; font-weight: 500; cursor: pointer;
      transition: background var(--t-fast, .15s), border-color var(--t-fast, .15s), color var(--t-fast, .15s);
      text-decoration: none;
      display: inline-flex; align-items: center; gap: 5px;
      min-height: 44px;
    }
    .back-btn:hover {
      background: var(--c-cream, #f4f3ef);
      border-color: var(--fg-tertiary, #6b8070);
      color: var(--fg-primary, #0d1520);
    }
    .topbar-match-info { flex: 1; min-width: 0; }
    .topbar-match-name {
      font-family: var(--font-display, 'Bricolage Grotesque', sans-serif);
      font-size: 1rem; font-weight: 700;
      color: var(--fg-primary, #0d1520);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .topbar-match-sub {
      font-size: .78rem;
      color: var(--fg-tertiary, #6b8070);
      display: flex; align-items: center; gap: 6px;
    }
    .topbar-match-sub::before {
      content: ''; width: 7px; height: 7px; border-radius: 50%;
      background: #2bbf6a; flex-shrink: 0;
    }

    /* Lang-switcher op witte topbar — overschrijft .lang-btn van style.css */
    .topbar .lang-btn {
      background: transparent;
      border: 1px solid transparent;
      color: var(--fg-tertiary, #6b8070);
      font-family: var(--font-body, 'Outfit', sans-serif);
      font-size: .72rem; font-weight: 600;
      padding: 4px 8px; border-radius: var(--r-pill, 999px);
      cursor: pointer;
    }
    .topbar .lang-btn:hover {
      color: var(--fg-primary, #0d1520);
      background: var(--c-cream, #f4f3ef);
    }
    .topbar .lang-btn.active {
      color: var(--c-orange-deep, #e05c1a);
      background: rgba(255,126,66,.10);
      border-color: rgba(255,126,66,.25);
    }

    /* ── Chat layout ── */
    .chat-wrap {
      flex: 1; display: flex; flex-direction: column;
      max-width: 720px; width: 100%; margin: 0 auto;
      overflow: hidden;
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }

    /* ── Messages area — geen eigen achtergrond, journal schemert door ── */
    .messages-area {
      flex: 1; overflow-y: auto;
      padding: var(--s5, 20px) var(--s4, 16px);
      display: flex; flex-direction: column; gap: var(--s3, 10px);
    }
    .messages-area::-webkit-scrollbar { width: 5px; }
    .messages-area::-webkit-scrollbar-thumb {
      background: rgba(26,122,72,.25); border-radius: 3px;
    }
    .messages-area::-webkit-scrollbar-track { background: transparent; }

    /* Day separator — Caveat in oranje, kantelt licht */
    .day-sep {
      text-align: center;
      font-family: var(--font-script, 'Caveat', cursive);
      font-size: 1.1rem; font-weight: 600;
      color: var(--c-orange-deep, #e05c1a);
      margin: var(--s4, 16px) 0;
      position: relative;
      transform: rotate(-.5deg);
    }
    .day-sep::before, .day-sep::after {
      content: ''; position: absolute; top: 50%;
      width: calc(50% - 60px); height: 1px;
      background: rgba(224,92,26,.18);
    }
    .day-sep::before { left: 0; }
    .day-sep::after  { right: 0; }

    /* Message bubbles */
    .msg-row {
      display: flex; align-items: flex-end; gap: 8px;
    }
    .msg-row.own  { justify-content: flex-end; }
    .msg-row.other { justify-content: flex-start; }

    .msg-avatar {
      width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
      background: var(--c-green, #1a7a48); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display, 'Bricolage Grotesque', sans-serif);
      font-size: .68rem; font-weight: 700;
    }
    .msg-row.own .msg-avatar { display: none; }

    .bubble-wrap { max-width: 72%; display: flex; flex-direction: column; }
    .msg-row.own  .bubble-wrap { align-items: flex-end; }
    .msg-row.other .bubble-wrap { align-items: flex-start; }

    .bubble {
      padding: 10px 14px; border-radius: 18px;
      font-size: .92rem; line-height: 1.5;
      word-break: break-word; white-space: pre-wrap;
    }
    /* OWN: solid green — staat semi-transparant in blueprint maar
       voor leesbaarheid gebruiken we volle accent. */
    .msg-row.own .bubble {
      background: var(--c-green, #1a7a48);
      color: #fff;
      border-top-right-radius: 4px;
    }
    /* OTHER: semi-transparant wit (alpha .94) — KRITIEK voor journal-effect */
    .msg-row.other .bubble {
      background: rgba(255,255,255,0.94);
      color: var(--fg-primary, #0d1520);
      border: 1px solid var(--line-subtle, rgba(13,26,16,.09));
      border-top-left-radius: 4px;
      box-shadow: 0 1px 3px rgba(0,0,0,.04);
    }

    .msg-time {
      font-family: var(--font-mono, 'DM Mono', monospace);
      font-size: .68rem;
      color: var(--fg-tertiary, #6b8070);
      margin-top: 3px; padding: 0 2px;
    }

    /* ── Input bar — eigen rustig wit, GEEN achtergrond doorschemering ── */
    .input-bar {
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-top: 1px solid var(--line-subtle, rgba(13,26,16,.09));
      padding: var(--s3, 12px) var(--s4, 16px);
      flex-shrink: 0;
      display: flex; align-items: flex-end; gap: 10px;
      position: relative;
      box-shadow: 0 -2px 12px rgba(0,0,0,.04);
    }
    @media (max-width: 768px) {
      .input-bar { padding-bottom: 68px; } /* 56px mobile nav + 12px base */
    }

    .msg-textarea {
      flex: 1; resize: none;
      border: 1.5px solid var(--line-default, #e2e8f0);
      border-radius: 22px;
      padding: 10px 16px;
      font-family: var(--font-body, 'Outfit', sans-serif);
      font-size: 16px; /* prevents iOS zoom */
      color: var(--fg-primary, #0d1520);
      line-height: 1.45;
      max-height: 120px;
      overflow-y: auto;
      outline: none;
      transition: border-color var(--t-fast, .15s);
      background: #fff;
    }
    .msg-textarea:focus { border-color: var(--c-green, #1a7a48); }
    .send-btn {
      background: var(--c-orange-deep, #e05c1a);
      color: #fff; border: none;
      width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 1.1rem;
      box-shadow: 0 4px 12px rgba(224,92,26,.32);
      transition: background var(--t-fast, .15s), transform var(--t-fast, .1s);
    }
    .send-btn:hover { background: #b94613; transform: translateY(-1px); }
    .send-btn:active { transform: scale(.94); }
    .send-btn:disabled { background: #d1d5db; cursor: not-allowed; box-shadow: none; transform: none; }

    /* ── Empty / Loading ── */
    .chat-empty {
      flex: 1; display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 10px;
      color: var(--fg-tertiary, #6b8070);
      font-size: .9rem;
      text-align: center; padding: 40px 20px;
    }
    .chat-empty .icon { font-size: 2.5rem; }

    /* ── Notif ── */
    .notif {
      position: fixed; bottom: 80px; left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: var(--c-ink, #0d1520); color: #fff;
      padding: 10px 20px;
      border-radius: var(--r-md, 10px);
      font-size: .88rem;
      box-shadow: 0 6px 20px rgba(0,0,0,.2);
      z-index: 9999;
      opacity: 0;
      transition: opacity .25s, transform .25s;
      pointer-events: none; white-space: nowrap;
    }
    .notif.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    :focus-visible {
      outline: 2px solid var(--c-orange-deep, #e05c1a);
      outline-offset: 2px;
    }

    /* ── Optimistic message states ── */
    .msg-row[data-status="pending"] .bubble { opacity: .55; }
    .msg-row[data-status="failed"]  .bubble { border: 1.5px solid #b82020; opacity: .85; }
    .msg-retry-btn {
      background: none; border: none; color: #b82020;
      font-size: .75rem; cursor: pointer;
      padding: 2px 4px;
      font-family: var(--font-body, 'Outfit', sans-serif);
      text-decoration: underline;
      margin-top: 2px; display: block;
    }
    .msg-retry-btn:hover { opacity: .75; }

    /* ── Emoji button ── */
    .emoji-btn {
      background: none; border: none; font-size: 1.22rem;
      width: 36px; height: 44px; flex-shrink: 0;
      display: none; align-items: center; justify-content: center;
      border-radius: 8px; cursor: pointer;
      transition: background var(--t-fast, .15s);
      color: var(--fg-tertiary, #6b8070);
      padding: 0;
    }
    .emoji-btn:hover, .emoji-btn.active {
      background: var(--c-cream, #f4f3ef);
      color: var(--fg-secondary, #2e4038);
    }

    /* ── Emoji picker container ── */
    #emoji-picker-container {
      position: absolute;
      bottom: calc(100% + 8px);
      right: 60px;
      z-index: 1000;
      filter: drop-shadow(0 8px 24px rgba(0,0,0,.15));
    }
    #emoji-picker-container em-emoji-picker {
      --border-radius: 14px;
      --font-family: 'Outfit', sans-serif;
      max-width: min(352px, calc(100vw - 32px));
    }

    /* ── Bubble chain (consecutive messages same sender) ── */
    .msg-row.own   .bubble.chain-top    { border-top-right-radius: 4px; }
    .msg-row.own   .bubble.chain-bottom { border-bottom-right-radius: 18px; }
    .msg-row.other .bubble.chain-top    { border-top-left-radius: 4px; }
    .msg-row.other .bubble.chain-bottom { border-bottom-left-radius: 18px; }

    /* Spacer keeps alignment when avatar is hidden for chained messages */
    .msg-avatar-spacer { width: 28px; flex-shrink: 0; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
      .day-sep { transform: none; }
    }

    /* ── Minesweeper ── */
    .mine-btn {
      background: none; border: none; font-size: 1.22rem;
      width: 36px; height: 44px; flex-shrink: 0;
      display: none; align-items: center; justify-content: center;
      border-radius: 8px; cursor: pointer; transition: background .15s;
      color: #9ca3af; padding: 0;
    }
    .mine-btn:hover { background: #f4f3ef; color: #374151; }
    .mine-panel {
      position: fixed; inset: 0; z-index: 8000;
      background: rgba(13,21,32,.55); backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
    }
    .mine-chrome {
      background: #c0c0c0;
      border-top: 3px solid #fff; border-left: 3px solid #fff;
      border-right: 3px solid #808080; border-bottom: 3px solid #808080;
      padding: 6px; width: min(360px, 100vw);
      max-height: 90vh; overflow-y: auto;
      animation: msPopIn .2s ease-out;
    }
    @keyframes msPopIn { from { transform: scale(.92); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    @media (max-width: 480px) {
      .mine-panel { align-items: stretch; }
      .mine-chrome { width: 100vw; max-height: 100vh; border: none; border-radius: 0; }
    }
    .mine-titlebar {
      background: linear-gradient(90deg, #000080, #1084d0);
      color: #fff; padding: 3px 6px; font-size: .78rem; font-weight: bold;
      display: flex; align-items: center; justify-content: space-between;
      user-select: none;
    }
    .mine-close-x {
      background: #c0c0c0; border-top: 2px solid #fff; border-left: 2px solid #fff;
      border-right: 2px solid #808080; border-bottom: 2px solid #808080;
      width: 16px; height: 14px; font-size: .65rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center; padding: 0;
    }
    .mine-close-x:active { border-top: 2px solid #808080; border-left: 2px solid #808080; border-right: 2px solid #fff; border-bottom: 2px solid #fff; }
    .mine-hud {
      background: #c0c0c0; padding: 5px 6px;
      border: 2px inset #808080;
      margin: 5px 0; display: flex; align-items: center; justify-content: space-between;
    }
    .mine-led {
      background: #000; color: #f00; font-family: 'Courier New', monospace;
      font-size: 1rem; font-weight: bold; padding: 1px 4px;
      border: 2px inset #808080; min-width: 3ch; text-align: right;
    }
    .mine-face-btn {
      background: #c0c0c0; border-top: 2px solid #fff; border-left: 2px solid #fff;
      border-right: 2px solid #808080; border-bottom: 2px solid #808080;
      width: 26px; height: 26px; font-size: .95rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center; padding: 0;
    }
    .mine-face-btn:active { border-top: 2px solid #808080; border-left: 2px solid #808080; border-right: 2px solid #fff; border-bottom: 2px solid #fff; }
    .mine-grid {
      display: grid;
      border-top: 3px solid #808080; border-left: 3px solid #808080;
      border-right: 3px solid #fff; border-bottom: 3px solid #fff;
    }
    .mine-cell {
      width: 22px; height: 22px; font-size: .7rem; font-weight: bold;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; user-select: none; font-family: 'Courier New', monospace;
      border-top: 2px solid #fff; border-left: 2px solid #fff;
      border-right: 2px solid #808080; border-bottom: 2px solid #808080;
      background: #c0c0c0; box-sizing: border-box;
    }
    @media (max-width: 480px) { .mine-cell { width: 18px; height: 18px; font-size: .58rem; } }
    .mine-cell.revealed { border: 1px solid #808080; cursor: default; }
    .mine-cell.flagged { color: #f00; }
    .mine-cell.mine-explode { background: #f00; }
    .mine-cell[data-n="1"] { color: #00f; }
    .mine-cell[data-n="2"] { color: #008000; }
    .mine-cell[data-n="3"] { color: #f00; }
    .mine-cell[data-n="4"] { color: #000080; }
    .mine-cell[data-n="5"] { color: #800000; }
    .mine-cell[data-n="6"] { color: #008080; }
    .mine-cell[data-n="7"] { color: #000; }
    .mine-cell[data-n="8"] { color: #808080; }
    .mine-turn-bar {
      text-align: center; font-size: .78rem; padding: 3px 0;
      font-family: 'Outfit', sans-serif;
    }
    .mine-invite-box {
      padding: 16px; text-align: center; font-family: 'Outfit', sans-serif;
    }
    .mine-flag-btn {
      background: #c0c0c0; border-top: 2px solid #fff; border-left: 2px solid #fff;
      border-right: 2px solid #808080; border-bottom: 2px solid #808080;
      padding: 2px 10px; font-size: .75rem; cursor: pointer; font-family: 'Courier New', monospace;
    }
    .mine-flag-btn.active {
      border-top: 2px solid #808080; border-left: 2px solid #808080;
      border-right: 2px solid #fff; border-bottom: 2px solid #fff; background: #a0a0a0;
    }
  </style>
</head>

<div class="notif" id="notif"></div>

<!-- TOPBAR -->

  <div class="topbar-match-info chat-topbar-meta">
    <div class="chat-topbar-avatar" id="chatTopbarAvatar" aria-hidden="true"></div>
    <div class="chat-topbar-meta-text">
      <div class="topbar-match-name" id="topbarMatchName">Laden…</div>
      <div class="topbar-match-sub" id="topbarMatchSub"></div>
    </div>
  </div>

  <a href="privacybeleid.html" style="flex-shrink:0;font-size:.72rem;color:var(--fg-tertiary,#6b8070);text-decoration:none;padding:5px 4px;">Privacy</a>

<!-- CHAT WRAP -->
<div class="chat-wrap" id="chatWrap">

  <div class="messages-area" id="messagesArea">
    <div class="chat-empty">
      <span class="icon">⏳</span>
      Berichten laden…
    </div>
  </div>

  <!-- ── Chat templates panel — BOL Fix 30 apr 2026 ── -->
  <div id="chat-templates" style="display:none;
    background:#faf7f3;border:1px solid rgba(13,21,32,.09);
    border-radius:8px;padding:.85rem;margin:0 12px .5rem">
    <div style="font-size:.72rem;font-weight:600;
      letter-spacing:.07em;text-transform:uppercase;
      color:#7a8799;margin-bottom:.6rem">
      Sjablonen
    </div>
    <div id="chat-templates-list" style="display:flex;flex-direction:column;gap:6px"></div>
  </div>

  <div class="input-bar">
    <button class="emoji-btn" id="emojiBtn"
            onclick="toggleEmojiPicker()"
            aria-label="Emoji toevoegen"
            title="Emoji toevoegen">😊</button>
    <button class="mine-btn" id="mineBtn"
            onclick="openMinesweeperInvite()"
            aria-label="Mijnenveger spelen"
            title="Mijnenveger starten">💣</button>
    <button id="templates-btn"
            onclick="toggleTemplates()"
            title="Gebruik een sjabloon"
            aria-label="Berichtsjablonen"
            style="padding:8px 10px;border-radius:8px;
            background:none;border:1px solid rgba(13,21,32,.12);
            cursor:pointer;font-size:.9rem;flex-shrink:0">📋</button>
    <div id="emoji-picker-container" style="display:none"></div>
    <textarea
      class="msg-textarea"
      id="msgInput"
      placeholder="Typ een bericht… (Enter om te verzenden, Shift+Enter voor nieuwe regel)"
      rows="1"
    ></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Versturen">➤</button>
  </div>

</div>

<script>

  let currentUser    = null;
  let convId         = null;
  let matchId        = null;
  let realtimeSub    = null;
  let meetingNotifSub = null;
  let otherPartyId    = null;  // used for notification trigger
  let otherPartyName  = 'Gesprekspartner';
  let otherPartyEmail = '';


  // ── Helpers ──────────────────────────────────────────────────────────────────

  function formatTime(iso) {
    return new Date(iso).toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit' });
  }

  function formatDay(iso) {
    const d = new Date(iso);
    const today = new Date();
    const yesterday = new Date(today);
    yesterday.setDate(today.getDate() - 1);
    if (d.toDateString() === today.toDateString()) return 'Vandaag';
    if (d.toDateString() === yesterday.toDateString()) return 'Gisteren';
    return d.toLocaleDateString('nl-NL', { day: 'numeric', month: 'long', year: 'numeric' });
  }

  function showLoading(containerId, tekst) {
    const el = document.getElementById(containerId);
    if (!el) return;
    el.innerHTML = `<div style="text-align:center;padding:2rem;color:var(--ink3,#888)"><div style="font-size:.88rem">${tekst || 'Laden...'}</div></div>`;
  }

  // Offline/online listeners
  window.addEventListener('offline', () => notify('Geen internetverbinding — wijzigingen worden niet opgeslagen'));
  window.addEventListener('online',  () => { notify('Verbinding hersteld'); location.reload(); });

  // ── Auto-resize textarea ──────────────────────────────────────────────────

  const msgInput = document.getElementById('msgInput');
  msgInput.addEventListener('input', () => {
    msgInput.style.height = 'auto';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
  });
  msgInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // ── iOS keyboard: resize chat-wrap to keep input visible ─────────────────

  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', () => {
      const chatWrap = document.getElementById('chatWrap');
      if (chatWrap) {
        const availableHeight = window.visualViewport.height - 56; // minus topbar
        chatWrap.style.height = availableHeight + 'px';
      }
      // Scroll to bottom so latest message stays visible
      const area = document.getElementById('messagesArea');
      if (area) area.scrollTop = area.scrollHeight;
    });
  }

  // ── Render messages ───────────────────────────────────────────────────────

  function renderMessages(messages) {
    const area = document.getElementById('messagesArea');

    if (!messages || messages.length === 0) {
      area.innerHTML = `
        <div class="chat-empty empty-state empty-state--chat">
          <p class="es-primary">Begin met een open vraag.</p>
          <p class="es-secondary">Bijvoorbeeld: <em>wat zou een goede stage hier voor jou inhouden?</em></p>
        </div>`;
      return;
    }

    let html = '';
    let lastDay = '';

    messages.forEach((msg, i) => {
      const day = formatDay(msg.created_at);
      if (day !== lastDay) {
        html += `<div class="day-sep">${escapeHtml(day)}</div>`;
        lastDay = day;
      }

      const isOwn      = msg.sender_id === currentUser?.id;
      const rowClass   = isOwn ? 'own' : 'other';
      const senderInit = escapeHtml((msg._senderName || 'X').slice(0, 2).toUpperCase());
      const raw        = (window.Internly?.profanity?.filter(msg.content || '')) ?? (msg.content || '');
      const text       = escapeHtml(raw).replace(/\bbobba\b/g, '<span style="color:#E85D24;font-weight:500">bobba</span>');
      const time       = escapeHtml(formatTime(msg.created_at));

      // Consecutive bubble detection — don't chain across day separators
      const prev = i > 0 ? messages[i - 1] : null;
      const next = i < messages.length - 1 ? messages[i + 1] : null;
      const sameDay = (a, b) => formatDay(a.created_at) === formatDay(b.created_at);
      const sameAsPrev = prev && prev.sender_id === msg.sender_id && sameDay(prev, msg);
      const sameAsNext = next && next.sender_id === msg.sender_id && sameDay(msg, next);

      let chainClass = '';
      if (sameAsPrev) chainClass += ' chain-top';
      if (sameAsNext) chainClass += ' chain-bottom';

      html += `
        <div class="msg-row ${rowClass}">
          ${!isOwn ? (sameAsPrev ? `<div class="msg-avatar-spacer"></div>` : `<div class="msg-avatar">${senderInit}</div>`) : ''}
          <div class="bubble-wrap">
            <div class="bubble${chainClass}">${text}</div>
            ${!sameAsNext ? `<span class="msg-time">${time}</span>` : ''}
          </div>
        </div>`;
    });

    area.innerHTML = html;
    area.scrollTop = area.scrollHeight;
  }

  function appendMessage(msg) {
    const area = document.getElementById('messagesArea');
    const empty = area.querySelector('.chat-empty');
    if (empty) empty.remove();

    const isOwn      = msg.sender_id === currentUser?.id;
    const rowClass   = isOwn ? 'own' : 'other';
    const senderInit = escapeHtml((msg._senderName || 'X').slice(0, 2).toUpperCase());
    const raw        = (window.Internly?.profanity?.filter(msg.content || '')) ?? (msg.content || '');
    const text       = escapeHtml(raw).replace(/\bbobba\b/g, '<span style="color:#E85D24;font-weight:500">bobba</span>');
    const time       = escapeHtml(formatTime(msg.created_at));

    // Check if the previous row is from the same sender → apply chain styling
    const rows = area.querySelectorAll('.msg-row');
    const lastRow = rows.length > 0 ? rows[rows.length - 1] : null;
    const sameAsPrev = lastRow && lastRow.classList.contains(rowClass);

    if (sameAsPrev) {
      // Previous message is no longer the last in its group — extend its chain
      const prevBubble = lastRow.querySelector('.bubble');
      if (prevBubble) prevBubble.classList.add('chain-bottom');
      // Hide previous row's timestamp (it's no longer the end of the group)
      const prevTime = lastRow.querySelector('.msg-time');
      if (prevTime) prevTime.style.display = 'none';
    }

    const row = document.createElement('div');
    row.className = 'msg-row ' + rowClass;
    row.innerHTML = `
      ${!isOwn ? (sameAsPrev ? `<div class="msg-avatar-spacer"></div>` : `<div class="msg-avatar">${senderInit}</div>`) : ''}
      <div class="bubble-wrap">
        <div class="bubble${sameAsPrev ? ' chain-top' : ''}">${text}</div>
        <span class="msg-time">${time}</span>
      </div>`;
    area.appendChild(row);
    area.scrollTop = area.scrollHeight;
  }

  // ── Meeting cards ────────────────────────────────────────────────────────────

  function renderMeetingCard(meeting) {
    const typeLabel    = meeting.type === 'video' ? '📹 Video'
                       : meeting.type === 'call'  ? '📞 Bellen'
                       : '🏢 Fysiek';
    const contactLine  = meeting.contact_info ? ` · ${escapeHtml(meeting.contact_info)}` : '';
    const isAttendee   = meeting.attendee_id === currentUser?.id;
    const isPending    = meeting.status === 'openstaand';
    const id           = escapeHtml(String(meeting.id));
    const nlDate       = meeting.proposed_date
      ? new Date(meeting.proposed_date + 'T12:00:00').toLocaleDateString('nl-NL', { day: 'numeric', month: 'long', year: 'numeric' })
      : '';

    const statusLine = (isPending && isAttendee) ? `
      <div style="display:flex;gap:8px;margin-top:.6rem;">
        <button onclick="acceptMeetingFromChat('${id}')"
          style="flex:1;padding:7px 12px;background:#1a7a48;color:#fff;border:none;
            border-radius:7px;font-size:.82rem;font-weight:600;cursor:pointer;
            font-family:'Outfit',sans-serif;">✓ Accepteren</button>
        <button onclick="declineMeetingFromChat('${id}')"
          style="flex:1;padding:7px 12px;background:#fff;color:#b82020;
            border:1.5px solid #fca5a5;border-radius:7px;font-size:.82rem;
            font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif;">✕ Afwijzen</button>
      </div>` :
      (!isPending ? `<div style="margin-top:.5rem;font-size:.78rem;font-weight:500;
        color:${meeting.status === 'bevestigd' ? '#1a7a48' : '#b82020'};">
        ${meeting.status === 'bevestigd' ? '✓ Bevestigd' : '✕ Afgewezen'}
      </div>` : '');

    return `
      <div id="mtg-card-${id}"
        style="background:var(--bg2,#f0ede8);border-radius:8px;padding:.75rem 1rem;
          font-size:.85rem;border-left:3px solid var(--accent,#e05c1a);color:#0d1520;">
        <div style="font-weight:500;margin-bottom:.25rem;">📅 Afspraak aangevraagd</div>
        <div style="color:#3a4455;">${escapeHtml(meeting.subject)} · ${escapeHtml(nlDate)} · ${escapeHtml(meeting.time_start || '')}–${escapeHtml(meeting.time_end || '')}</div>
        <div style="font-size:.78rem;color:#7a8799;margin-top:.25rem;">${typeLabel}${contactLine}</div>
        ${statusLine}
      </div>`;
  }

  function appendMeetingCardRow(meeting, isOwn) {
    const area = document.getElementById('messagesArea');
    if (!area) return;
    const empty = area.querySelector('.chat-empty');
    if (empty) empty.remove();

    const rowClass   = isOwn ? 'own' : 'other';
    const initSrc    = isOwn
      ? (currentUser?.user_metadata?.naam || currentUser?.email || 'J')
      : otherPartyName;
    const senderInit = escapeHtml(initSrc.slice(0, 2).toUpperCase());
    const timeStr    = meeting.created_at
      ? new Date(meeting.created_at).toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit' })
      : '';

    const row = document.createElement('div');
    row.className = 'msg-row ' + rowClass;
    row.dataset.meetingId = meeting.id;
    row.innerHTML = `
      ${!isOwn ? `<div class="msg-avatar">${senderInit}</div>` : ''}
      <div class="bubble-wrap">
        <div class="bubble" style="background:transparent;padding:0;max-width:340px;">
          ${renderMeetingCard(meeting)}
        </div>
        ${timeStr ? `<span class="msg-time">${timeStr}</span>` : ''}
      </div>`;
    area.appendChild(row);
    area.scrollTop = area.scrollHeight;
  }

  async function loadMeetingCards() {
    if (!matchId || !currentUser) return;
    const { data: meetings } = await db.from('meetings')
      .select('*')
      .eq('match_id', matchId)
      .or(`organizer_id.eq.${currentUser.id},attendee_id.eq.${currentUser.id}`)
      .in('status', ['openstaand', 'bevestigd', 'afgewezen'])
      .order('created_at', { ascending: true });
    if (!meetings?.length) return;
    for (const m of meetings) {
      appendMeetingCardRow(m, m.organizer_id === currentUser.id);
    }
  }

  function subscribeMeetingNotifications() {
    if (!currentUser) return;
    if (meetingNotifSub) meetingNotifSub.unsubscribe();
    meetingNotifSub = db
      .channel('mtg-notif-' + currentUser.id)
      .on(
        'postgres_changes',
        { event: 'INSERT', schema: 'public', table: 'notifications', filter: `user_id=eq.${currentUser.id}` },
        async payload => {
          const n = payload.new;
          if (n.type !== 'new_meeting' || n.ref_type !== 'meeting') return;
          const { data: meeting } = await db.from('meetings').select('*').eq('id', n.ref_id).maybeSingle();
          if (!meeting || meeting.match_id !== matchId) return;
          // Avoid duplicate cards (meeting already loaded on init)
          if (document.querySelector(`[data-meeting-id="${meeting.id}"]`)) return;
          appendMeetingCardRow(meeting, false);
        }
      )
      .subscribe((status, err) => {
        if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') {
          console.warn('[chat] meetings realtime verbinding verbroken:', err?.message);
          notify('Verbinding verbroken — ververs de pagina om door te gaan', false);
        }
      });
  }

  async function acceptMeetingFromChat(id) {
    if (!currentUser) return;
    const { error } = await db.from('meetings')
      .update({ status: 'bevestigd' })
      .eq('id', id)
      .eq('attendee_id', currentUser.id);
    if (error) { console.warn('[chat] accept meeting err:', error); return; }

    // Notificatie naar organizer
    const { data: mtg } = await db.from('meetings')
      .select('organizer_id, subject, proposed_date')
      .eq('id', id).maybeSingle();
    if (mtg?.organizer_id) {
      const nlDate = mtg.proposed_date
        ? new Date(mtg.proposed_date + 'T12:00:00').toLocaleDateString('nl-NL', { day: 'numeric', month: 'long', year: 'numeric' })
        : '';
      await createNotification(
        mtg.organizer_id,
        'meeting_accepted',
        id,
        'meeting',
        `Je afspraak "${mtg.subject}" op ${nlDate} is bevestigd.`
      );
    }

    notify('Afspraak bevestigd');
    const card = document.getElementById('mtg-card-' + id);
    if (card) {
      const btns = card.querySelector('div[style*="display:flex"]');
      if (btns) btns.remove();
      const status = document.createElement('div');
      status.style.cssText = 'margin-top:.5rem;font-size:.78rem;color:#1a7a48;font-weight:500;';
      status.textContent = '✓ Bevestigd';
      card.appendChild(status);
    }
  }

  async function declineMeetingFromChat(id) {
    if (!currentUser) return;
    const { error } = await db.from('meetings')
      .update({ status: 'afgewezen' })
      .eq('id', id)
      .eq('attendee_id', currentUser.id);
    if (error) { console.warn('[chat] decline meeting err:', error); return; }

    // Notificatie naar organizer
    const { data: mtg } = await db.from('meetings')
      .select('organizer_id, subject, proposed_date')
      .eq('id', id).maybeSingle();
    if (mtg?.organizer_id) {
      const nlDate = mtg.proposed_date
        ? new Date(mtg.proposed_date + 'T12:00:00').toLocaleDateString('nl-NL', { day: 'numeric', month: 'long', year: 'numeric' })
        : '';
      await createNotification(
        mtg.organizer_id,
        'meeting_rejected',
        id,
        'meeting',
        `Je afspraak "${mtg.subject}" op ${nlDate} is afgewezen.`
      );
    }

    notify('Afspraak afgewezen');
    const card = document.getElementById('mtg-card-' + id);
    if (card) {
      const btns = card.querySelector('div[style*="display:flex"]');
      if (btns) btns.remove();
      const status = document.createElement('div');
      status.style.cssText = 'margin-top:.5rem;font-size:.78rem;color:#b82020;font-weight:500;';
      status.textContent = '✕ Afgewezen';
      card.appendChild(status);
    }
  }

  // ── Emoji Picker ─────────────────────────────────────────────────────────────

  let _emojiPickerOpen = false;

  function toggleEmojiPicker(force) {
    const container = document.getElementById('emoji-picker-container');
    if (!container) return;
    _emojiPickerOpen = force !== undefined ? !!force : !_emojiPickerOpen;
    container.style.display = _emojiPickerOpen ? 'block' : 'none';
    const btn = document.getElementById('emojiBtn');
    if (btn) btn.classList.toggle('active', _emojiPickerOpen);
  }

  function _insertEmojiAtCursor(native) {
    const ta = document.getElementById('msgInput');
    if (!ta) return;
    const start = ta.selectionStart ?? ta.value.length;
    const end   = ta.selectionEnd   ?? ta.value.length;
    ta.value = ta.value.slice(0, start) + native + ta.value.slice(end);
    const pos = start + native.length;
    ta.setSelectionRange(pos, pos);
    ta.focus();
    ta.dispatchEvent(new Event('input')); // trigger auto-resize
  }

  function _initEmojiMart() {
    if (!window.EmojiMart) return; // graceful degradation if CDN fails
    const container = document.getElementById('emoji-picker-container');
    if (!container || container.children.length > 0) return;
    const picker = new EmojiMart.Picker({
      onEmojiSelect(emoji) {
        _insertEmojiAtCursor(emoji.native);
        toggleEmojiPicker(false);
      },
      theme:            'light',
      previewPosition:  'none',
      skinTonePosition: 'none',
      set:              'native',
      maxFrequentRows:  2,
    });
    container.appendChild(picker);
    // Only show button once picker is confirmed ready
    const btn = document.getElementById('emojiBtn');
    if (btn) btn.style.display = 'flex';
  }

  // Close picker on outside click (capture phase so it fires before other handlers)
  document.addEventListener('click', e => {
    if (!_emojiPickerOpen) return;
    const container = document.getElementById('emoji-picker-container');
    const btn       = document.getElementById('emojiBtn');
    if (container && !container.contains(e.target) && !btn?.contains(e.target)) {
      toggleEmojiPicker(false);
    }
  }, true);

  window.addEventListener('load', _initEmojiMart);

  // Close emoji picker on Escape key
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && _emojiPickerOpen) toggleEmojiPicker(false);
  });

  // ── Load ──────────────────────────────────────────────────────────────────

  async function loadConversation(mId) {
    const { data: match } = await db
      .from('matches')
      .select('id, party_a, party_b, status, internship_postings(title, company_name)')
      .eq('id', mId)
      .maybeSingle();

    if (!match) {
      document.getElementById('messagesArea').innerHTML = `
        <div class="chat-empty">
          <span class="icon">⚠️</span>Match niet gevonden.
        </div>`;
      return;
    }

    if (match.party_a !== currentUser.id && match.party_b !== currentUser.id) {
      document.getElementById('messagesArea').innerHTML = `
        <div class="chat-empty">
          <span class="icon">🔒</span>Je hebt geen toegang tot dit gesprek.
        </div>`;
      return;
    }

    const posting = match.internship_postings || {};
    document.getElementById('topbarMatchName').textContent = posting.title || 'Chat';
    document.getElementById('topbarMatchSub').textContent  = posting.company_name || '';

    // Stage Hub shortcut (topbar pill + bottom-nav tab)
    const stageHubLink = document.getElementById('match-hub-topbar-link');
    if (stageHubLink && mId) {
      stageHubLink.href = 'match-dashboard.html?match=' + encodeURIComponent(mId);
      stageHubLink.style.display = 'inline-block';
    }
    const mtHubLink = document.getElementById('mt-hub-link');
    if (mtHubLink && mId) {
      mtHubLink.href = 'match-dashboard.html?match=' + encodeURIComponent(mId);
    }

    // Resolve other party
    otherPartyId = match.party_a === currentUser.id ? match.party_b : match.party_a;
    if (otherPartyId) {
      const { data: profile } = await db
        .from('profiles')
        .select('naam, name, email, avatar_key')
        .eq('id', otherPartyId)
        .maybeSingle();
      if (profile) {
        otherPartyName  = getDisplayName(profile) || 'Gesprekspartner'; // SPRINT5 NOTE: getDisplayName checkt naam en email maar niet profile.name; 'Gesprekspartner' onbereikbaar (getDisplayName geeft altijd string)
        otherPartyEmail = profile.email || '';
        // RUN7 Cat 8 — avatar in topbar
        const _avSlot = document.getElementById('chatTopbarAvatar');
        if (_avSlot) {
          if (profile.avatar_key && typeof getAvatarSvg === 'function') {
            _avSlot.innerHTML = getAvatarSvg(profile.avatar_key, otherPartyName, 'sm');
          } else {
            const _init = (otherPartyName || '?').split(' ').map(s => s[0] || '').slice(0,2).join('').toUpperCase();
            _avSlot.innerHTML = `<div class="chat-topbar-avatar-initials">${escapeHtml(_init)}</div>`;
          }
        }
      }
    }

    // Load or create conversation
    let { data: conv } = await db
      .from('conversations')
      .select('id')
      .eq('match_id', mId)
      .maybeSingle();

    if (!conv) {
      const { data: newConv } = await db
        .from('conversations')
        .insert({ match_id: mId })
        .select('id')
        .maybeSingle();
      conv = newConv;
    }

    if (!conv) {
      document.getElementById('messagesArea').innerHTML = `
        <div class="chat-empty"><span class="icon">⚠️</span>Gesprek kon niet worden geladen.</div>`;
      return;
    }

    convId = conv.id;
    _msShowBtn();
    await loadMessages();
    subscribeRealtime();
    markMessagesRead();
    await loadMeetingCards();
    subscribeMeetingNotifications();
    if (otherPartyId) {
      InternlyCalendar.renderChatButton(otherPartyId, otherPartyEmail, otherPartyName, 'sendBtn', db, currentUser.id, matchId);
    }

    // BOL Fix: motivatie-prefill bij eerste chat-opening (student kant)
    await maybePostPendingMotivatie(mId);
  }

  // ── Chat templates — BOL Fix 30 apr 2026 ─────────────────────────────
  const CHAT_TEMPLATES = {
    student: [
      {
        title: 'Uitnodiging gesprek bevestigen',
        text:  'Hallo, bedankt voor de uitnodiging! Ik bevestig graag het gesprek. Zijn er nog dingen die ik moet voorbereiden of meenemen?'
      },
      {

      },
      {

        text:  'Hallo, ik ben beschikbaar op:\n[dag 1]: [tijdstip]\n[dag 2]: [tijdstip]\n[dag 3]: [tijdstip]\nWelk moment past u het beste?'
      }
    ],
    bedrijf: [
      {
        title: 'Uitnodiging kennismakingsgesprek',
        text:  'Hallo [naam], bedankt voor je interesse in een stageplek bij ons. We willen je graag uitnodigen voor een kennismakingsgesprek. Kunnen we [dag] om [tijdstip] afspreken?'
      },

  // ── Pending-motivatie auto-post — BOL Fix 30 apr 2026 ────────────────
  async function maybePostPendingMotivatie(mId) {
    if (!convId || !currentUser) return;
    try {
      // Alleen student aan party_a kant heeft pending motivatie geschreven
      const { data: matchRow } = await db.from('matches')
        .select('party_a, posting_id').eq('id', mId).maybeSingle();
      if (!matchRow) return;
      if (matchRow.party_a !== currentUser.id) return; // alleen student
      if (!matchRow.posting_id) return;

      const storageKey = 'internly_motiv_pending_posting_' + matchRow.posting_id;
      let motivatie = null;
      try { motivatie = localStorage.getItem(storageKey); } catch (_) {}
      if (!motivatie) return;

      // Alleen posten als er nog geen berichten zijn (eerste opening)
      const { count: existingCount } = await db.from('messages')
        .select('id', { count: 'exact', head: true })
        .eq('conversation_id', convId);
      if (existingCount && existingCount > 0) {
        // Te laat — opruimen zonder posten
        try { localStorage.removeItem(storageKey); } catch (_) {}
        return;
      }

      const body = '💬 Motivatie student: ' + motivatie;
      const { error: insErr } = await db.from('messages').insert({
        conversation_id: convId,
        sender_id:       currentUser.id,
        content:         body
      });
      if (insErr) {
        console.warn('[motivatie auto-post] insert fout:', insErr.message);
        return;
      }
      try { localStorage.removeItem(storageKey); } catch (_) {}
      await loadMessages();
    } catch (e) {
      console.warn('[motivatie auto-post] fout:', e?.message || e);
    }
  }

  async function loadMessages() {
    if (!convId) return;
    const { data: messages, error } = await db
      .from('messages')
      .select('id, sender_id, content, created_at, read')
      .eq('conversation_id', convId)
      .order('created_at', { ascending: true });

    if (error) {
      console.error('Berichten laden fout:', error?.message || 'onbekende fout');
      const area = document.getElementById('messagesArea');
      if (area) area.innerHTML = `<div class="chat-empty"><span class="icon">⚠️</span>Berichten konden niet worden geladen. Probeer de pagina te verversen.</div>`;
      return;
    }
    const annotated = (messages || []).map(m => ({
      ...m,
      _senderName: m.sender_id === currentUser?.id
        ? getDisplayName(currentUser)
        : otherPartyName,
    }));
    renderMessages(annotated);
  }

  async function markMessagesRead() {
    if (!convId || !currentUser) return;
    await db.from('messages')
      .update({ read: true })
      .eq('conversation_id', convId)
      .neq('sender_id', currentUser.id)
      .eq('read', false);
  }

  // ── Realtime ──────────────────────────────────────────────────────────────

  function subscribeRealtime() {
    if (realtimeSub) realtimeSub.unsubscribe();
    realtimeSub = db
      .channel('messages-' + convId)
      .on(
        'postgres_changes',
        { event: 'INSERT', schema: 'public', table: 'messages', filter: 'conversation_id=eq.' + convId },
        payload => {
          const msg = { ...payload.new, _senderName: otherPartyName };
          if (msg.sender_id !== currentUser?.id) {
            appendMessage(msg);
            markMessagesRead();
          }
        }
      )
      .subscribe((status, err) => {
        if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') {
          console.warn('[chat] berichten realtime verbinding verbroken:', err?.message);
          notify('Verbinding verbroken — ververs de pagina om door te gaan', false);
        }
      });
  }

  // ── Send ──────────────────────────────────────────────────────────────────

  async function sendMessage() {
    toggleEmojiPicker(false); // close picker if open
    if (!convId || !currentUser) return;
    const input = document.getElementById('msgInput');
    const content = input.value
      .replace(/[​‌‍‎‏﻿ ]/g, '')
      .trim();
    if (!content) return;

    const btn = document.getElementById('sendBtn');
    btn.disabled = true;
    const filtered = (window.Internly?.profanity?.filter(content)) ?? content;
    input.value = '';
    input.style.height = 'auto';

    const myName = getDisplayName(currentUser);

    // Optimistic append met pending-status
    const optimisticMsg = {
      id:              'opt-' + Date.now(),
      sender_id:       currentUser.id,
      _senderName:     myName,
      content:         filtered,
      created_at:      new Date().toISOString(),
      conversation_id: convId,
    };
    appendMessage(optimisticMsg);

    const area         = document.getElementById('messagesArea');
    const pendingRow   = area.querySelector('.msg-row.own:last-of-type');
    if (pendingRow) pendingRow.dataset.status = 'pending';

    const { error } = await db.from('messages').insert({
      conversation_id: convId,
      sender_id:       currentUser.id,
      content:         filtered,
    });

    btn.disabled = false;

    if (error) {
      console.error('Send error:', error?.message || 'onbekende fout');
      if (pendingRow) {
        pendingRow.dataset.status = 'failed';
        const retryBtn = document.createElement('button');
        retryBtn.className = 'msg-retry-btn';
        retryBtn.textContent = 'Opnieuw proberen';
        retryBtn.onclick = () => {
          pendingRow.remove();
          input.value = filtered;
          sendMessage();
        };
        const wrap = pendingRow.querySelector('.bubble-wrap');
        if (wrap) wrap.appendChild(retryBtn);
      }
      toast.error('Bericht kon niet worden verzonden', () => {
        if (pendingRow) pendingRow.remove();
        input.value = filtered;
        sendMessage();
      });
      return;
    }

    if (pendingRow) pendingRow.removeAttribute('data-status');

    // Notify recipient (fire-and-forget)
    if (otherPartyId) {
      createNotification(
        otherPartyId,
        'new_message',
        matchId,
        'message',
        myName + ' heeft je een bericht gestuurd'
      );
    }
  }

  async function loadBuddyConversation(pairId) {
    // 1. Haal buddy_pair op + profilenamen
    const { data: pair, error: pErr } = await db
      .from('buddy_pairs')
      .select(`
        id, type, status,
        req:profiles!buddy_pairs_requester_id_fkey(id, naam),
        rec:profiles!buddy_pairs_receiver_id_fkey(id, naam)

      document.getElementById('messagesArea').innerHTML =
        '<div class="chat-empty"><span class="icon">🔒</span>Buddy-koppeling niet gevonden.</div>';
      return;
    }

    // 2. Toegangscheck — alleen de twee betrokkenen
    const uid = currentUser.id;
    if (pair.req?.id !== uid && pair.rec?.id !== uid) {
      document.getElementById('messagesArea').innerHTML =
        '<div class="chat-empty"><span class="icon">🔒</span>Je hebt geen toegang tot dit gesprek.</div>';
      return;
    }

    // 3. Andere partij
    const isRequester = pair.req?.id === uid;
    const other = isRequester ? pair.rec : pair.req;
    otherPartyId   = other?.id || null;
    otherPartyName = other?.naam || 'Buddy';
    otherPartyEmail = null;

    // 4. Topbar invullen — buddy kleurcodering (backlog 30 apr 2026)
    const _topName = document.getElementById('topbarMatchName');
    if (_topName) {
      _topName.innerHTML = escapeHtml(otherPartyName) +
        ' <span style="background:#ede9fe;color:#7c3aed;font-size:.7rem;font-weight:500;padding:2px 8px;border-radius:20px;display:inline-block;margin-left:6px;vertical-align:middle">Buddy</span>';
    }
    document.getElementById('topbarMatchSub').textContent  = 'Buddy-chat · ' + (pair.type || 'gepensioneerd');
    // Stage Hub-pil verbergen — niet van toepassing bij buddy-chat
    const stageHubLink = document.getElementById('match-hub-topbar-link');
    if (stageHubLink) stageHubLink.style.display = 'none';

    // 5. Conversation ophalen of aanmaken (buddy_pair_id kolom)
    let conv = null;
    const { data: existing } = await db
      .from('conversations')
      .select('id')
      .eq('buddy_pair_id', pairId)
      .maybeSingle();

    if (existing) {
      conv = existing;
    } else {
      // Kolom bestaat nog niet of conversation bestaat nog niet — aanmaken
      const { data: newConv, error: cErr } = await db
        .from('conversations')
        .insert({ buddy_pair_id: pairId })
        .select('id')
        .maybeSingle();
      if (cErr) {
        // Fallback: kolom bestaat nog niet → sla op als match_id-loze conversatie
        console.warn('[chat] buddy_pair_id kolom ontbreekt');
        const { data: fb } = await db
          .from('conversations')
          .insert({ match_id: null })
          .select('id')
          .maybeSingle();
        conv = fb;
      } else {
        conv = newConv;
      }
    }

    if (!conv) {
      document.getElementById('messagesArea').innerHTML =
        '<div class="chat-empty"><span class="icon">⚠️</span>Gesprek kon niet worden geladen.</div>';
      return;
    }

    convId = conv.id;
    _msShowBtn();
    await loadMessages();
    subscribeRealtime();
    markMessagesRead();
  }

  // ── Minesweeper ───────────────────────────────────────────────────────────

  const MS = { ROWS: 15, COLS: 15, MINES: 30, MAX_PER_HOUR: 3 };
  let _msChannel = null;
  let _msState   = null;
  let _msTimer   = null;

  function mulberry32(seed) {
    return function() {
      seed |= 0; seed = seed + 0x6D2B79F5 | 0;
      let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }

  function hashString(s) {
    let h = 0x811c9dc5;
    for (let i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = (h * 0x01000193) >>> 0; }
    return h;
  }

  function _msGenBoard(seed) {
    const rng = mulberry32(hashString(seed));
    const n = MS.ROWS * MS.COLS;
    const cells = Array.from({ length: n }, (_, k) => ({
      row: Math.floor(k / MS.COLS), col: k % MS.COLS,
      mine: false, revealed: false, flagged: false, adjacent: 0
    }));
    const idx = Array.from({ length: n }, (_, k) => k);
    for (let i = n - 1; i > 0; i--) {
      const j = Math.floor(rng() * (i + 1));
      [idx[i], idx[j]] = [idx[j], idx[i]];
    }
    for (let i = 0; i < MS.MINES; i++) cells[idx[i]].mine = true;
    for (const c of cells) {
      if (c.mine) continue;
      for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
        if (!dr && !dc) continue;
        const nr = c.row + dr, nc = c.col + dc;
        if (nr >= 0 && nr < MS.ROWS && nc >= 0 && nc < MS.COLS && cells[nr * MS.COLS + nc].mine) c.adjacent++;
      }
    }
    return cells;
  }

  // Self-test: two seeds must produce different boards
  (function() {
    const m1 = _msGenBoard('seed-aaa').filter(c => c.mine).map(c => c.row * 15 + c.col).join();
    const m2 = _msGenBoard('seed-bbb').filter(c => c.mine).map(c => c.row * 15 + c.col).join();
    if (m1 === m2) console.error('[Mijnenveger] PRNG self-test FAIL: identical boards for different seeds');
  })();

  function _msRateOk() {
    const key = 'msw_' + (convId || 'x');
    const now = Date.now();
    const arr = JSON.parse(localStorage.getItem(key) || '[]').filter(t => now - t < 3600000);
    if (arr.length >= MS.MAX_PER_HOUR) { notify('Max 3 potjes per uur per gesprek bereikt'); return false; }
    arr.push(now);
    localStorage.setItem(key, JSON.stringify(arr));
    return true;
  }

  function _msCh() {
    if (_msChannel || !convId) return _msChannel;
    _msChannel = db.channel('minesweeper-' + convId, { config: { broadcast: { self: false } } })
      .on('broadcast', { event: 'invite' },          e => _msOnInvite(e.payload))
      .on('broadcast', { event: 'invite_accepted' }, e => _msOnAccepted(e.payload))
      .on('broadcast', { event: 'invite_declined' }, () => _msOnDeclined())
      .on('broadcast', { event: 'invite_timeout' },  () => _msOnTimeout())
      .on('broadcast', { event: 'move' },            e => _msOnMove(e.payload))
      .on('broadcast', { event: 'mine_hit' },        e => _msOnMineHit(e.payload))
      .on('broadcast', { event: 'board_done' },      e => _msOnBoardDone(e.payload))
      .on('broadcast', { event: 'quit' },            e => _msOnQuit(e.payload))
      .subscribe();
    return _msChannel;
  }

  function _msShowBtn() {
    const btn = document.getElementById('mineBtn');
    if (!btn || !convId) return;
    db.from('conversations')
      .select('match_id, matches(type)')
      .eq('id', convId)
      .maybeSingle()
      .then(({ data: conv }) => {
        const mType = conv?.matches?.type;
        const blocked = ['school_bedrijf', 'school_posting'];
        if (!mType || !blocked.includes(mType)) btn.style.display = 'flex';
      });
  }

  function openMinesweeperInvite() {
    _msCh();
    _msShow(`<div class="mine-invite-box">
      <div style="font-size:2rem">💣</div>
      <div style="font-weight:600;margin:8px 0">Mijnenveger</div>
      <div style="font-size:.82rem;color:#555;margin-bottom:14px">Beurten · 15×15 · 30 mijnen · 1 pt per veilige cel</div>
      <button onclick="_msSendInvite()" style="background:#000080;color:#fff;border:none;padding:7px 18px;font-size:.88rem;cursor:pointer;font-family:'Outfit',sans-serif">Uitdagen 🎮</button>
      <button onclick="closeMinesweeper()" style="background:#c0c0c0;border-top:2px solid #fff;border-left:2px solid #fff;border-right:2px solid #808080;border-bottom:2px solid #808080;padding:6px 14px;margin-left:8px;cursor:pointer;font-family:'Outfit',sans-serif">Annuleren</button>
    </div>`);
  }

  function _msSendInvite() {
    if (!_msRateOk()) { closeMinesweeper(); return; }
    _msCh().send({ type: 'broadcast', event: 'invite', payload: { name: getDisplayName(currentUser) } });
    _msState = { role: 'inviter', myTurn: true, scores: { inviter: 0, receiver: 0 }, board: null, seed: null, flagMode: false, done: false };
    let s = 60;
    _msShow(`<div class="mine-invite-box">
      <div style="font-size:1.5rem">⏳</div>
      <div style="font-weight:600;margin:8px 0">Wacht op ${escapeHtml(otherPartyName)}…</div>
      <div id="ms-cd" style="font-size:.82rem;color:#555">Verloopt over <b>${s}</b>s</div>
      <button onclick="_msCancelInvite()" style="margin-top:10px;background:#c0c0c0;border-top:2px solid #fff;border-left:2px solid #fff;border-right:2px solid #808080;border-bottom:2px solid #808080;padding:5px 12px;cursor:pointer;font-family:'Outfit',sans-serif">Annuleren</button>
    </div>`);
    _msTimer = setInterval(() => {
      const el = document.getElementById('ms-cd');
      if (el) el.innerHTML = `Verloopt over <b>${--s}</b>s`;
      if (s <= 0) { clearInterval(_msTimer); _msCh().send({ type: 'broadcast', event: 'invite_timeout', payload: {} }); closeMinesweeper(); }
    }, 1000);
  }

  function _msCancelInvite() {
    clearInterval(_msTimer);
    _msCh().send({ type: 'broadcast', event: 'invite_timeout', payload: {} });
    closeMinesweeper();
  }

  function _msOnInvite(p) {
    _msCh();
    _msState = { role: 'receiver', myTurn: false, scores: { inviter: 0, receiver: 0 }, board: null, seed: null, flagMode: false, done: false };
    _msShow(`<div class="mine-invite-box">
      <div style="font-size:1.5rem">💣</div>
      <div style="font-weight:600;margin:8px 0">${escapeHtml(p.name)} daagt je uit!</div>
      <div style="font-size:.82rem;color:#555;margin-bottom:12px">Beurt-gebaseerd Mijnenveger · 15×15 · 30 mijnen</div>
      <button onclick="_msAcceptInvite()" style="background:#000080;color:#fff;border:none;padding:7px 16px;font-size:.88rem;cursor:pointer;font-family:'Outfit',sans-serif;margin-right:8px">✓ Accepteren</button>
      <button onclick="_msDeclineInvite()" style="background:#c0c0c0;border-top:2px solid #fff;border-left:2px solid #fff;border-right:2px solid #808080;border-bottom:2px solid #808080;padding:6px 14px;cursor:pointer;font-family:'Outfit',sans-serif">✕ Weigeren</button>
    </div>`);
  }

  function _msAcceptInvite() {
    const seed = convId + '-' + Date.now();
    _msCh().send({ type: 'broadcast', event: 'invite_accepted', payload: { seed } });
    _msState.board = _msGenBoard(seed);
    _msState.seed  = seed;
    _msState.myTurn = false;
    _msRenderGame();
  }

  function _msDeclineInvite() {
    _msCh().send({ type: 'broadcast', event: 'invite_declined', payload: {} });
    closeMinesweeper();
  }

  function _msOnAccepted(p) {
    clearInterval(_msTimer);
    _msState.board  = _msGenBoard(p.seed);
    _msState.seed   = p.seed;
    _msState.myTurn = true;
    _msRenderGame();
  }

  function _msOnDeclined() {
    clearInterval(_msTimer);
    notify(escapeHtml(otherPartyName) + ' heeft de uitdaging afgewezen');
    closeMinesweeper();
  }

  function _msOnTimeout() { notify('Uitdaging verlopen'); closeMinesweeper(); }

  function _msRenderGame() {
    const s = _msState;
    if (!s || !s.board) return;
    const theirRole = s.role === 'inviter' ? 'receiver' : 'inviter';
    const myScore    = s.scores[s.role];
    const theirScore = s.scores[theirRole];
    const flagsLeft  = MS.MINES - s.board.filter(c => c.flagged).length;
    const face       = s.done ? (myScore >= theirScore ? '😎' : '😵') : '🙂';

    const hud = `
      <div class="mine-hud">
        <div class="mine-led">${String(Math.max(0, flagsLeft)).padStart(3, '0')}</div>
        <button class="mine-face-btn" onclick="_msQuit()" title="Opgeven">${face}</button>
        <div class="mine-led">${myScore}-${theirScore}</div>
      </div>
      <div class="mine-turn-bar" style="color:${s.myTurn && !s.done ? '#1a7a48' : '#b82020'}">
        ${s.done ? '🏁 Spel voorbij' : s.myTurn ? '🟢 Jouw beurt' : `🔴 Beurt van ${escapeHtml(otherPartyName)}`}
      </div>
      <div style="display:flex;justify-content:center;margin:3px 0">
        <button class="mine-flag-btn${s.flagMode ? ' active' : ''}" onclick="_msFlagToggle()">🚩 Vlag-modus</button>
        ${s.flagMode ? '<span style="font-size:.68rem;color:#9ca3af;margin-left:6px;">vlaggen kost een beurt</span>' : ''}
      </div>`;

    const grid = `<div class="mine-grid" id="ms-grid" style="grid-template-columns:repeat(${MS.COLS},1fr)">${
      s.board.map((c, i) => {
        let cls = 'mine-cell', content = '', dn = '';
        if (c.revealed) {
          cls += ' revealed';
          if (c.mine) { cls += ' mine-explode'; content = '💥'; }
          else if (c.adjacent) { content = c.adjacent; dn = ` data-n="${c.adjacent}"`; }
        } else if (c.flagged) { cls += ' flagged'; content = '🚩'; }
        const canClick = s.myTurn && !s.done && !c.revealed;
        const onclick  = canClick ? `onclick="_msReveal(${i})"` : '';
        return `<div class="${cls}"${dn} ${onclick} oncontextmenu="_msFlag(event,${i})">${content}</div>`;
      }).join('')
    }</div>`;

    _msShow(hud + grid);
    _msAttachLongPress();
  }

  function _msFlagToggle() {
    if (_msState) { _msState.flagMode = !_msState.flagMode; _msRenderGame(); }
  }

  function _msReveal(i) {
    const s = _msState;
    if (!s || !s.myTurn || s.done || s.board[i].revealed || s.board[i].flagged) return;
    if (s.flagMode) { _msFlag(null, i); return; }

    if (s.board[i].mine) {
      s.board[i].revealed = true;
      _msRevealMines();
      s.done = true;
      _msRenderGame();
      _msCh().send({ type: 'broadcast', event: 'mine_hit', payload: { scores: s.scores } });
      const theirRole = s.role === 'inviter' ? 'receiver' : 'inviter';
      _msSendChat(`💣 ${escapeHtml(getDisplayName(currentUser))} raapte een mijn op! ${escapeHtml(otherPartyName)} wint ${s.scores[theirRole]}-${s.scores[s.role]}.`);
      setTimeout(closeMinesweeper, 3000);
      return;
    }

    const pts = _msCascade(s.board, i);
    s.scores[s.role] += pts;
    const revealedIdxs = s.board.map((c, j) => c.revealed ? j : -1).filter(j => j >= 0);
    const safeLeft = s.board.filter(c => !c.mine && !c.revealed).length;

    if (safeLeft === 0) {
      s.done = true;
      _msRenderGame();
      _msCh().send({ type: 'broadcast', event: 'board_done', payload: { scores: s.scores } });
      _msEndMessage(s.scores, s.role);
      setTimeout(closeMinesweeper, 3000);
      return;
    }

    _msCh().send({ type: 'broadcast', event: 'move', payload: { revealed: revealedIdxs, scores: s.scores } });
    s.myTurn = false;
    _msRenderGame();
  }

  function _msCascade(board, i) {
    if (board[i].revealed || board[i].mine || board[i].flagged) return 0;
    board[i].revealed = true;
    let n = 1;
    if (board[i].adjacent === 0) {
      const r = board[i].row, c = board[i].col;
      for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
        if (!dr && !dc) continue;
        const nr = r + dr, nc = c + dc;
        if (nr >= 0 && nr < MS.ROWS && nc >= 0 && nc < MS.COLS) n += _msCascade(board, nr * MS.COLS + nc);
      }
    }
    return n;
  }

  function _msRevealMines() { _msState.board.forEach(c => { if (c.mine) c.revealed = true; }); }

  function _msFlag(e, i) {
    if (e) e.preventDefault();
    const s = _msState;
    if (!s || !s.myTurn || s.done || s.board[i].revealed) return;
    s.board[i].flagged = !s.board[i].flagged;
    s.myTurn = false;
    _msCh().send({ type: 'broadcast', event: 'move', payload: { revealed: [], flagged: i, scores: s.scores } });
    _msRenderGame();
  }

  function _msOnMove(p) {
    const s = _msState;
    if (!s) return;
    p.revealed.forEach(i => { if (s.board[i]) s.board[i].revealed = true; });
    if (typeof p.flagged === 'number' && s.board[p.flagged]) {
      s.board[p.flagged].flagged = !s.board[p.flagged].flagged;
    }
    s.scores = p.scores;
    s.myTurn = true;
    _msRenderGame();
  }

  function _msOnMineHit(p) {
    const s = _msState;
    if (!s) return;
    s.scores = p.scores; s.done = true;
    _msRevealMines(); _msRenderGame();
    notify(escapeHtml(otherPartyName) + ' raapte een mijn op — jij wint! 🎉');
    setTimeout(closeMinesweeper, 3000);
  }

  function _msOnBoardDone(p) {
    const s = _msState;
    if (!s) return;
    s.scores = p.scores; s.done = true;
    _msRenderGame();
    setTimeout(closeMinesweeper, 3000);
  }

  function _msEndMessage(scores, myRole) {
    const theirRole = myRole === 'inviter' ? 'receiver' : 'inviter';
    const mine = scores[myRole], theirs = scores[theirRole];
    let msg;
    if (mine > theirs)       msg = `🏆 ${escapeHtml(getDisplayName(currentUser))} wint Mijnenveger! ${mine}-${theirs}.`;
    else if (theirs > mine)  msg = `🏆 ${escapeHtml(otherPartyName)} wint Mijnenveger! ${theirs}-${mine}.`;
    else                     msg = `🤝 Gelijkspel in Mijnenveger! ${mine}-${theirs}.`;
    _msSendChat(msg);
  }

  function _msQuit() {
    if (_msState && !_msState.done) {
      _msCh().send({ type: 'broadcast', event: 'quit', payload: { name: getDisplayName(currentUser) } });
      _msSendChat(`🏳️ ${escapeHtml(getDisplayName(currentUser))} heeft de Mijnenveger opgegeven.`);
    }
    closeMinesweeper();
  }

  function _msOnQuit(p) {
    notify(escapeHtml(p.name || 'Tegenstander') + ' heeft opgegeven');
    closeMinesweeper();
  }

  async function _msSendChat(text) {
    if (!convId || !currentUser) return;
    await db.from('messages').insert({ conversation_id: convId, sender_id: currentUser.id, content: text });
  }

  function _msShow(html) {
    const body = document.getElementById('mine-body');
    if (body) body.innerHTML = html;
    document.getElementById('mine-panel').style.display = 'flex';
  }

  function closeMinesweeper() {
    clearInterval(_msTimer);
    _msState = null;
    const p = document.getElementById('mine-panel');
    if (p) p.style.display = 'none';
  }

  function _msAttachLongPress() {
    if (window.innerWidth > 480) return;
    const grid = document.getElementById('ms-grid');
    if (!grid) return;
    let lt = null;
    grid.addEventListener('touchstart', e => {
      const cell = e.target.closest('.mine-cell');
      if (!cell) return;
      const i = [...grid.children].indexOf(cell);
      lt = setTimeout(() => _msFlag(null, i), 500);
    }, { passive: true });
    grid.addEventListener('touchend',  () => clearTimeout(lt));
    grid.addEventListener('touchmove', () => clearTimeout(lt));
  }
</script>

<!-- Minesweeper panel -->
<div id="mine-panel" class="mine-panel" style="display:none">
  <div class="mine-chrome">
    <div class="mine-titlebar">
      <span>💣 Mijnenveger</span>
      <button class="mine-close-x" onclick="closeMinesweeper()">✕</button>
    </div>
    <div id="mine-body"></div>
  </div>
</div>

<script src="js/calendar.js"></script>

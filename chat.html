<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a7a48">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/favicon_180x180.png">
  <link rel="manifest" href="/manifest.json">
  <title>Berichten — Internly</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="js/utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/emoji-mart@5.5.2/dist/browser.js"></script>
  <script src="js/telemetry.js"></script>
  <link rel="stylesheet" href="css/style.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', sans-serif;
      background: #f4f3ef;
      -webkit-font-smoothing: antialiased;
      display: flex; flex-direction: column;
      /* iOS Safari fallback, then dvh for modern browsers */
      height: 100vh;
      height: -webkit-fill-available;
      height: 100dvh;
      overflow: hidden;
    }

    /* ── Topbar ── */
    .topbar {
      background: linear-gradient(135deg, #1a7a48, #0f5c36);
      padding: 0 24px; height: 56px; flex-shrink: 0;
      display: flex; align-items: center; gap: 14px;
    }
    .topbar-logo {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 1.2rem; font-weight: 700; color: #fff;
      letter-spacing: -.02em; text-decoration: none;
    }
    .topbar-logo span { color: #FF7E42; }
    .back-btn {
      background: rgba(255,255,255,.15); border: none; color: #fff;
      padding: 5px 12px; border-radius: 20px; font-family: 'Outfit', sans-serif;
      font-size: .82rem; font-weight: 500; cursor: pointer;
      transition: background .15s; text-decoration: none; display: inline-flex; align-items: center; gap: 5px;
      min-height: 44px;
    }
    .back-btn:hover { background: rgba(255,255,255,.25); }
    .topbar-match-info { flex: 1; min-width: 0; }
    .topbar-match-name {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 1rem; font-weight: 700; color: #fff;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .topbar-match-sub { font-size: .78rem; color: rgba(255,255,255,.65); }

    /* ── Chat layout ── */
    .chat-wrap {
      flex: 1; display: flex; flex-direction: column;
      max-width: 720px; width: 100%; margin: 0 auto;
      overflow: hidden;
      /* Safe area inset for iPhone notch */
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }

    /* ── Messages area ── */
    .messages-area {
      flex: 1; overflow-y: auto; padding: 20px 16px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .messages-area::-webkit-scrollbar { width: 5px; }
    .messages-area::-webkit-scrollbar-thumb { background: #c9e8d5; border-radius: 3px; }
    .messages-area::-webkit-scrollbar-track { background: transparent; }

    /* Day separator */
    .day-sep {
      text-align: center; font-size: .73rem; color: #9ca3af;
      margin: 6px 0; position: relative;
    }
    .day-sep::before, .day-sep::after {
      content: ''; position: absolute; top: 50%;
      width: calc(50% - 50px); height: 1px; background: #f0f0ee;
    }
    .day-sep::before { left: 0; }
    .day-sep::after  { right: 0; }

    /* Message bubbles */
    .msg-row {
      display: flex; align-items: flex-end; gap: 8px;
    }
    .msg-row.own  { justify-content: flex-end; }
    .msg-row.other { justify-content: flex-start; }

    .msg-avatar {
      width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
      background: #e8f5ee; color: #1a7a48;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Bricolage Grotesque', sans-serif; font-size: .68rem; font-weight: 700;
    }
    .msg-row.own .msg-avatar { display: none; }

    .bubble-wrap { max-width: 72%; display: flex; flex-direction: column; }
    .msg-row.own  .bubble-wrap { align-items: flex-end; }
    .msg-row.other .bubble-wrap { align-items: flex-start; }

    .bubble {
      padding: 10px 14px; border-radius: 16px; font-size: .9rem; line-height: 1.5;
      word-break: break-word; white-space: pre-wrap;
    }
    .msg-row.own   .bubble { background: #1a7a48; color: #fff; border-bottom-right-radius: 4px; }
    .msg-row.other .bubble { background: #fff; color: #0d1520; border: 1px solid #f0f0ee; border-bottom-left-radius: 4px; }

    .msg-time {
      font-size: .7rem; color: #9ca3af; margin-top: 3px; padding: 0 2px;
    }

    /* ── Input bar ── */
    .input-bar {
      background: #fff; border-top: 1px solid #e2e8f0;
      padding: 12px 16px; flex-shrink: 0;
      display: flex; align-items: flex-end; gap: 10px;
    }
    @media (max-width: 768px) {
      .input-bar { padding-bottom: 68px; } /* 56px mobile nav + 12px base */
    }
    .msg-textarea {
      flex: 1; resize: none; border: 1.5px solid #e2e8f0; border-radius: 12px;
      padding: 10px 14px; font-family: 'Outfit', sans-serif;
      font-size: 16px; /* prevents iOS zoom */
      color: #0d1520; line-height: 1.45; max-height: 120px; overflow-y: auto;
      outline: none; transition: border-color .15s;
    }
    .msg-textarea:focus { border-color: #1a7a48; }
    .send-btn {
      background: #1a7a48; color: #fff; border: none;
      width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 1.1rem;
      transition: background .15s, transform .1s;
    }
    .send-btn:hover { background: #0f5c36; }
    .send-btn:active { transform: scale(.94); }
    .send-btn:disabled { background: #d1d5db; cursor: not-allowed; }

    /* ── Empty / Loading ── */
    .chat-empty {
      flex: 1; display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 10px; color: #9ca3af; font-size: .9rem;
      text-align: center; padding: 40px 20px;
    }
    .chat-empty .icon { font-size: 2.5rem; }

    /* ── Notif ── */
    .notif {
      position: fixed; bottom: 80px; left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: #0d1520; color: #fff; padding: 10px 20px;
      border-radius: 10px; font-size: .88rem;
      box-shadow: 0 6px 20px rgba(0,0,0,.2); z-index: 9999;
      opacity: 0; transition: opacity .25s, transform .25s;
      pointer-events: none; white-space: nowrap;
    }
    .notif.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    :focus-visible { outline: 2px solid #FF7E42; outline-offset: 2px; }

    /* ── Input bar lift ── */
    .input-bar { position: relative; box-shadow: 0 -2px 12px rgba(0,0,0,.05); }

    /* ── Emoji button ── */
    .emoji-btn {
      background: none; border: none; font-size: 1.22rem;
      width: 36px; height: 44px; flex-shrink: 0;
      display: none; align-items: center; justify-content: center;
      border-radius: 8px; cursor: pointer; transition: background .15s;
      color: #9ca3af; padding: 0;
    }
    .emoji-btn:hover, .emoji-btn.active { background: #f4f3ef; color: #374151; }

    /* ── Emoji picker container ── */
    #emoji-picker-container {
      position: absolute;
      bottom: calc(100% + 8px);
      right: 60px;
      z-index: 1000;
      filter: drop-shadow(0 8px 24px rgba(0,0,0,.15));
    }
    #emoji-picker-container em-emoji-picker {
      --border-radius: 14px;
      --font-family: 'Outfit', sans-serif;
      max-width: min(352px, calc(100vw - 32px));
    }

    /* ── Bubble chain (consecutive messages same sender) ── */
    .msg-row.own   .bubble.chain-top    { border-top-right-radius: 4px; }
    .msg-row.own   .bubble.chain-bottom { border-bottom-right-radius: 16px; }
    .msg-row.other .bubble.chain-top    { border-top-left-radius: 4px; }
    .msg-row.other .bubble.chain-bottom { border-bottom-left-radius: 16px; }

    /* Spacer keeps alignment when avatar is hidden for chained messages */
    .msg-avatar-spacer { width: 28px; flex-shrink: 0; }
  </style>
</head>

<div class="notif" id="notif"></div>

<div class="topbar">

  <a id="match-hub-topbar-link" href="match-dashboard.html" style="display:none;font-size:.78rem;font-weight:700;color:#e05c1a;background:#fdf0e8;padding:5px 11px;border-radius:20px;text-decoration:none;white-space:nowrap;flex-shrink:0;">📊 Stage Hub</a>

  <button onclick="db.auth.signOut().then(()=>{sessionStorage.removeItem('internly_role');setApplying(false);window.location.href='auth.html';})" style="

<!-- CHAT WRAP -->
<div class="chat-wrap" id="chatWrap">

  <div class="messages-area" id="messagesArea">

      <span class="icon">⏳</span>
      Berichten laden…
    </div>
  </div>

  <div class="input-bar">

            onclick="toggleEmojiPicker()"
            aria-label="Emoji toevoegen"
            title="Emoji toevoegen">😊</button>
    <div id="emoji-picker-container" style="display:none"></div>

      class="msg-textarea"
      id="msgInput"
      placeholder="Typ een bericht… (Enter om te verzenden, Shift+Enter voor nieuwe regel)"
      rows="1"
    ></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Versturen">➤</button>

<script>

  let currentUser    = null;
  let convId         = null;
  let matchId        = null;
  let realtimeSub    = null;
  let meetingNotifSub = null;
  let otherPartyId    = null;  // used for notification trigger
  let otherPartyName  = 'Gesprekspartner';
  let otherPartyEmail = '';


  // ── Helpers ──────────────────────────────────────────────────────────────────

  function formatTime(iso) {
    return new Date(iso).toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit' });
  }

  function formatDay(iso) {
    const d = new Date(iso);
    const today = new Date();
    const yesterday = new Date(today);
    yesterday.setDate(today.getDate() - 1);
    if (d.toDateString() === today.toDateString()) return 'Vandaag';
    if (d.toDateString() === yesterday.toDateString()) return 'Gisteren';
    return d.toLocaleDateString('nl-NL', { day: 'numeric', month: 'long', year: 'numeric' });
  }

  function showLoading(containerId, tekst) {
    const el = document.getElementById(containerId);
    if (!el) return;
    el.innerHTML = `<div style="text-align:center;padding:2rem;color:var(--ink3,#888)"><div style="font-size:.88rem">${tekst || 'Laden...'}</div></div>`;
  }

  // Offline/online listeners
  window.addEventListener('offline', () => notify('Geen internetverbinding — wijzigingen worden niet opgeslagen'));
  window.addEventListener('online',  () => { notify('Verbinding hersteld'); location.reload(); });

  // ── Auto-resize textarea ──────────────────────────────────────────────────

  const msgInput = document.getElementById('msgInput');
  msgInput.addEventListener('input', () => {
    msgInput.style.height = 'auto';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
  });
  msgInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // ── iOS keyboard: resize chat-wrap to keep input visible ─────────────────

  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', () => {
      const chatWrap = document.getElementById('chatWrap');
      if (chatWrap) {
        const availableHeight = window.visualViewport.height - 56; // minus topbar
        chatWrap.style.height = availableHeight + 'px';
      }
      // Scroll to bottom so latest message stays visible
      const area = document.getElementById('messagesArea');
      if (area) area.scrollTop = area.scrollHeight;
    });
  }

  // ── Render messages ───────────────────────────────────────────────────────

  function renderMessages(messages) {
    const area = document.getElementById('messagesArea');

    if (!messages || messages.length === 0) {
      area.innerHTML = `
        <div class="chat-empty">
          <span class="icon">💬</span>
          Nog geen berichten. Stuur een bericht om het gesprek te starten!
        </div>`;
      return;
    }

    let html = '';
    let lastDay = '';

    messages.forEach((msg, i) => {
      const day = formatDay(msg.created_at);
      if (day !== lastDay) {
        html += `<div class="day-sep">${escapeHtml(day)}</div>`;
        lastDay = day;
      }

      const isOwn      = msg.sender_id === currentUser?.id;
      const rowClass   = isOwn ? 'own' : 'other';
      const senderInit = escapeHtml((msg._senderName || 'X').slice(0, 2).toUpperCase());
      const text       = escapeHtml(msg.content || '');
      const time       = escapeHtml(formatTime(msg.created_at));

      // Consecutive bubble detection — don't chain across day separators
      const prev = i > 0 ? messages[i - 1] : null;
      const next = i < messages.length - 1 ? messages[i + 1] : null;
      const sameDay = (a, b) => formatDay(a.created_at) === formatDay(b.created_at);
      const sameAsPrev = prev && prev.sender_id === msg.sender_id && sameDay(prev, msg);
      const sameAsNext = next && next.sender_id === msg.sender_id && sameDay(msg, next);

      let chainClass = '';
      if (sameAsPrev) chainClass += ' chain-top';
      if (sameAsNext) chainClass += ' chain-bottom';

      html += `
        <div class="msg-row ${rowClass}">
          ${!isOwn ? (sameAsPrev ? `<div class="msg-avatar-spacer"></div>` : `<div class="msg-avatar">${senderInit}</div>`) : ''}
          <div class="bubble-wrap">
            <div class="bubble${chainClass}">${text}</div>
            ${!sameAsNext ? `<span class="msg-time">${time}</span>` : ''}
          </div>
        </div>`;
    });

    area.innerHTML = html;
    area.scrollTop = area.scrollHeight;
  }

  function appendMessage(msg) {
    const area = document.getElementById('messagesArea');
    const empty = area.querySelector('.chat-empty');
    if (empty) empty.remove();

    const isOwn      = msg.sender_id === currentUser?.id;
    const rowClass   = isOwn ? 'own' : 'other';
    const senderInit = escapeHtml((msg._senderName || 'X').slice(0, 2).toUpperCase());
    const text       = escapeHtml(msg.content || '');
    const time       = escapeHtml(formatTime(msg.created_at));

    // Check if the previous row is from the same sender → apply chain styling
    const rows = area.querySelectorAll('.msg-row');
    const lastRow = rows.length > 0 ? rows[rows.length - 1] : null;
    const sameAsPrev = lastRow && lastRow.classList.contains(rowClass);

    if (sameAsPrev) {
      // Previous message is no longer the last in its group — extend its chain
      const prevBubble = lastRow.querySelector('.bubble');
      if (prevBubble) prevBubble.classList.add('chain-bottom');
      // Hide previous row's timestamp (it's no longer the end of the group)
      const prevTime = lastRow.querySelector('.msg-time');
      if (prevTime) prevTime.style.display = 'none';
    }

    const row = document.createElement('div');
    row.className = 'msg-row ' + rowClass;
    row.innerHTML = `
      ${!isOwn ? (sameAsPrev ? `<div class="msg-avatar-spacer"></div>` : `<div class="msg-avatar">${senderInit}</div>`) : ''}
      <div class="bubble-wrap">
        <div class="bubble${sameAsPrev ? ' chain-top' : ''}">${text}</div>
        <span class="msg-time">${time}</span>
      </div>`;
    area.appendChild(row);
    area.scrollTop = area.scrollHeight;
  }

  // ── Meeting cards ────────────────────────────────────────────────────────────

  function renderMeetingCard(meeting) {
    const typeLabel    = meeting.type === 'video' ? '📹 Video'
                       : meeting.type === 'call'  ? '📞 Bellen'
                       : '🏢 Fysiek';
    const contactLine  = meeting.contact_info ? ` · ${escapeHtml(meeting.contact_info)}` : '';
    const isAttendee   = meeting.attendee_id === currentUser?.id;
    const isPending    = meeting.status === 'openstaand';
    const id           = escapeHtml(String(meeting.id));
    const nlDate       = meeting.proposed_date
      ? new Date(meeting.proposed_date + 'T12:00:00').toLocaleDateString('nl-NL', { day: 'numeric', month: 'long', year: 'numeric' })
      : '';

    const statusLine = (isPending && isAttendee) ? `
      <div style="display:flex;gap:8px;margin-top:.6rem;">
        <button onclick="acceptMeetingFromChat('${id}')"
          style="flex:1;padding:7px 12px;background:#1a7a48;color:#fff;border:none;
            border-radius:7px;font-size:.82rem;font-weight:600;cursor:pointer;
            font-family:'Outfit',sans-serif;">✓ Accepteren</button>
        <button onclick="declineMeetingFromChat('${id}')"
          style="flex:1;padding:7px 12px;background:#fff;color:#b82020;
            border:1.5px solid #fca5a5;border-radius:7px;font-size:.82rem;
            font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif;">✕ Afwijzen</button>
      </div>` :
      (!isPending ? `<div style="margin-top:.5rem;font-size:.78rem;font-weight:500;
        color:${meeting.status === 'bevestigd' ? '#1a7a48' : '#b82020'};">
        ${meeting.status === 'bevestigd' ? '✓ Bevestigd' : '✕ Afgewezen'}
      </div>` : '');

    return `
      <div id="mtg-card-${id}"
        style="background:var(--bg2,#f0ede8);border-radius:8px;padding:.75rem 1rem;
          font-size:.85rem;border-left:3px solid var(--accent,#e05c1a);color:#0d1520;">
        <div style="font-weight:500;margin-bottom:.25rem;">📅 Afspraak aangevraagd</div>
        <div style="color:#3a4455;">${escapeHtml(meeting.subject)} · ${escapeHtml(nlDate)} · ${escapeHtml(meeting.time_start || '')}–${escapeHtml(meeting.time_end || '')}</div>
        <div style="font-size:.78rem;color:#7a8799;margin-top:.25rem;">${typeLabel}${contactLine}</div>
        ${statusLine}
      </div>`;
  }

  function appendMeetingCardRow(meeting, isOwn) {
    const area = document.getElementById('messagesArea');
    if (!area) return;
    const empty = area.querySelector('.chat-empty');
    if (empty) empty.remove();

    const rowClass   = isOwn ? 'own' : 'other';
    const initSrc    = isOwn
      ? (currentUser?.user_metadata?.naam || currentUser?.email || 'J')
      : otherPartyName;
    const senderInit = escapeHtml(initSrc.slice(0, 2).toUpperCase());
    const timeStr    = meeting.created_at
      ? new Date(meeting.created_at).toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit' })
      : '';

    const row = document.createElement('div');
    row.className = 'msg-row ' + rowClass;
    row.dataset.meetingId = meeting.id;
    row.innerHTML = `
      ${!isOwn ? `<div class="msg-avatar">${senderInit}</div>` : ''}
      <div class="bubble-wrap">
        <div class="bubble" style="background:transparent;padding:0;max-width:340px;">
          ${renderMeetingCard(meeting)}
        </div>
        ${timeStr ? `<span class="msg-time">${timeStr}</span>` : ''}
      </div>`;
    area.appendChild(row);
    area.scrollTop = area.scrollHeight;
  }

  async function loadMeetingCards() {
    if (!matchId || !currentUser) return;
    const { data: meetings } = await db.from('meetings')
      .select('*')
      .eq('match_id', matchId)
      .or(`organizer_id.eq.${currentUser.id},attendee_id.eq.${currentUser.id}`)
      .in('status', ['openstaand', 'bevestigd', 'afgewezen'])
      .order('created_at', { ascending: true });
    if (!meetings?.length) return;
    for (const m of meetings) {
      appendMeetingCardRow(m, m.organizer_id === currentUser.id);
    }
  }

  function subscribeMeetingNotifications() {
    if (!currentUser) return;
    if (meetingNotifSub) meetingNotifSub.unsubscribe();
    meetingNotifSub = db
      .channel('mtg-notif-' + currentUser.id)
      .on(
        'postgres_changes',
        { event: 'INSERT', schema: 'public', table: 'notifications', filter: `user_id=eq.${currentUser.id}` },
        async payload => {
          const n = payload.new;
          if (n.type !== 'new_meeting' || n.ref_type !== 'meeting') return;
          const { data: meeting } = await db.from('meetings').select('*').eq('id', n.ref_id).maybeSingle();
          if (!meeting || meeting.match_id !== matchId) return;
          // Avoid duplicate cards (meeting already loaded on init)
          if (document.querySelector(`[data-meeting-id="${meeting.id}"]`)) return;
          appendMeetingCardRow(meeting, false);
        }
      )
      .subscribe((status, err) => {
        if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') {
          console.warn('[chat] meetings realtime verbinding verbroken:', err?.message);
          notify('Verbinding verbroken — ververs de pagina om door te gaan', false);
        }
      });
  }

  async function acceptMeetingFromChat(id) {
    if (!currentUser) return;
    const { error } = await db.from('meetings')
      .update({ status: 'bevestigd' })
      .eq('id', id)
      .eq('attendee_id', currentUser.id);
    if (error) { console.warn('[chat] accept meeting err:', error); return; }

    // Notificatie naar organizer
    const { data: mtg } = await db.from('meetings')
      .select('organizer_id, subject, proposed_date')
      .eq('id', id).maybeSingle();
    if (mtg?.organizer_id) {
      const nlDate = mtg.proposed_date
        ? new Date(mtg.proposed_date + 'T12:00:00').toLocaleDateString('nl-NL', { day: 'numeric', month: 'long', year: 'numeric' })
        : '';
      await createNotification(
        mtg.organizer_id,
        'meeting_accepted',
        id,
        'meeting',
        `Je afspraak "${mtg.subject}" op ${nlDate} is bevestigd.`
      );
    }

    notify('Afspraak bevestigd');
    const card = document.getElementById('mtg-card-' + id);
    if (card) {
      const btns = card.querySelector('div[style*="display:flex"]');
      if (btns) btns.remove();
      const status = document.createElement('div');
      status.style.cssText = 'margin-top:.5rem;font-size:.78rem;color:#1a7a48;font-weight:500;';
      status.textContent = '✓ Bevestigd';
      card.appendChild(status);
    }
  }

  async function declineMeetingFromChat(id) {
    if (!currentUser) return;
    const { error } = await db.from('meetings')
      .update({ status: 'afgewezen' })
      .eq('id', id)
      .eq('attendee_id', currentUser.id);
    if (error) { console.warn('[chat] decline meeting err:', error); return; }

    // Notificatie naar organizer
    const { data: mtg } = await db.from('meetings')
      .select('organizer_id, subject, proposed_date')
      .eq('id', id).maybeSingle();
    if (mtg?.organizer_id) {
      const nlDate = mtg.proposed_date
        ? new Date(mtg.proposed_date + 'T12:00:00').toLocaleDateString('nl-NL', { day: 'numeric', month: 'long', year: 'numeric' })
        : '';
      await createNotification(
        mtg.organizer_id,
        'meeting_rejected',
        id,
        'meeting',
        `Je afspraak "${mtg.subject}" op ${nlDate} is afgewezen.`
      );
    }

    notify('Afspraak afgewezen');
    const card = document.getElementById('mtg-card-' + id);
    if (card) {
      const btns = card.querySelector('div[style*="display:flex"]');
      if (btns) btns.remove();
      const status = document.createElement('div');
      status.style.cssText = 'margin-top:.5rem;font-size:.78rem;color:#b82020;font-weight:500;';
      status.textContent = '✕ Afgewezen';
      card.appendChild(status);
    }
  }

  // ── Emoji Picker ─────────────────────────────────────────────────────────────

  let _emojiPickerOpen = false;

  function toggleEmojiPicker(force) {
    const container = document.getElementById('emoji-picker-container');
    if (!container) return;
    _emojiPickerOpen = force !== undefined ? !!force : !_emojiPickerOpen;
    container.style.display = _emojiPickerOpen ? 'block' : 'none';
    const btn = document.getElementById('emojiBtn');
    if (btn) btn.classList.toggle('active', _emojiPickerOpen);
  }

  function _insertEmojiAtCursor(native) {
    const ta = document.getElementById('msgInput');
    if (!ta) return;
    const start = ta.selectionStart ?? ta.value.length;
    const end   = ta.selectionEnd   ?? ta.value.length;
    ta.value = ta.value.slice(0, start) + native + ta.value.slice(end);
    const pos = start + native.length;
    ta.setSelectionRange(pos, pos);
    ta.focus();
    ta.dispatchEvent(new Event('input')); // trigger auto-resize
  }

  function _initEmojiMart() {
    if (!window.EmojiMart) return; // graceful degradation if CDN fails
    const container = document.getElementById('emoji-picker-container');
    if (!container || container.children.length > 0) return;
    const picker = new EmojiMart.Picker({
      onEmojiSelect(emoji) {
        _insertEmojiAtCursor(emoji.native);
        toggleEmojiPicker(false);
      },
      theme:            'light',
      previewPosition:  'none',
      skinTonePosition: 'none',
      set:              'native',
      maxFrequentRows:  2,
    });
    container.appendChild(picker);
    // Only show button once picker is confirmed ready
    const btn = document.getElementById('emojiBtn');
    if (btn) btn.style.display = 'flex';
  }

  // Close picker on outside click (capture phase so it fires before other handlers)
  document.addEventListener('click', e => {
    if (!_emojiPickerOpen) return;
    const container = document.getElementById('emoji-picker-container');
    const btn       = document.getElementById('emojiBtn');
    if (container && !container.contains(e.target) && !btn?.contains(e.target)) {
      toggleEmojiPicker(false);
    }
  }, true);

  window.addEventListener('load', _initEmojiMart);

  // Close emoji picker on Escape key
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && _emojiPickerOpen) toggleEmojiPicker(false);
  });

  // ── Load ──────────────────────────────────────────────────────────────────

  async function loadConversation(mId) {
    const { data: match } = await db
      .from('matches')
      .select('id, party_a, party_b, status, internship_postings(title, company_name)')
      .eq('id', mId)
      .maybeSingle();

    if (!match) {
      document.getElementById('messagesArea').innerHTML = `
        <div class="chat-empty">
          <span class="icon">⚠️</span>Match niet gevonden.
        </div>`;
      return;
    }

    if (match.party_a !== currentUser.id && match.party_b !== currentUser.id) {
      document.getElementById('messagesArea').innerHTML = `
        <div class="chat-empty">
          <span class="icon">🔒</span>Je hebt geen toegang tot dit gesprek.
        </div>`;
      return;
    }

    const posting = match.internship_postings || {};
    document.getElementById('topbarMatchName').textContent = posting.title || 'Chat';
    document.getElementById('topbarMatchSub').textContent  = posting.company_name || '';

    // Stage Hub shortcut (topbar pill + bottom-nav tab)
    const stageHubLink = document.getElementById('match-hub-topbar-link');
    if (stageHubLink && mId) {
      stageHubLink.href = 'match-dashboard.html?match=' + encodeURIComponent(mId);
      stageHubLink.style.display = 'inline-block';
    }
    const mtHubLink = document.getElementById('mt-hub-link');
    if (mtHubLink && mId) {
      mtHubLink.href = 'match-dashboard.html?match=' + encodeURIComponent(mId);
    }

    // Resolve other party
    otherPartyId = match.party_a === currentUser.id ? match.party_b : match.party_a;
    if (otherPartyId) {
      const { data: profile } = await db
        .from('profiles')
        .select('naam, name, email')
        .eq('id', otherPartyId)
        .maybeSingle();
      if (profile) {
        otherPartyName  = profile.naam || profile.name || profile.email?.split('@')?.[0] || 'Gesprekspartner';
        otherPartyEmail = profile.email || '';
      }
    }

    // Load or create conversation
    let { data: conv } = await db
      .from('conversations')
      .select('id')
      .eq('match_id', mId)
      .maybeSingle();

    if (!conv) {
      const { data: newConv } = await db
        .from('conversations')
        .insert({ match_id: mId })
        .select('id')
        .maybeSingle();
      conv = newConv;
    }

    if (!conv) {
      document.getElementById('messagesArea').innerHTML = `
        <div class="chat-empty"><span class="icon">⚠️</span>Gesprek kon niet worden geladen.</div>`;
      return;
    }

    convId = conv.id;
    await loadMessages();
    subscribeRealtime();
    markMessagesRead();
    await loadMeetingCards();
    subscribeMeetingNotifications();
    if (otherPartyId) {
      InternlyCalendar.renderChatButton(otherPartyId, otherPartyEmail, otherPartyName, 'sendBtn', db, currentUser.id, matchId);
    }
  }

  async function loadMessages() {
    if (!convId) return;
    const { data: messages, error } = await db
      .from('messages')
      .select('id, sender_id, content, created_at, read')
      .eq('conversation_id', convId)
      .order('created_at', { ascending: true });

    if (error) {
      console.error('Berichten laden fout:', error?.message || 'onbekende fout');
      const area = document.getElementById('messagesArea');
      if (area) area.innerHTML = `<div class="chat-empty"><span class="icon">⚠️</span>Berichten konden niet worden geladen. Probeer de pagina te verversen.</div>`;
      return;
    }
    const annotated = (messages || []).map(m => ({
      ...m,
      _senderName: m.sender_id === currentUser?.id
        ? (currentUser.user_metadata?.naam || currentUser.user_metadata?.name || currentUser.email?.split('@')?.[0] || 'Jij')
        : otherPartyName,
    }));
    renderMessages(annotated);
  }

  async function markMessagesRead() {
    if (!convId || !currentUser) return;
    await db.from('messages')
      .update({ read: true })
      .eq('conversation_id', convId)
      .neq('sender_id', currentUser.id)
      .eq('read', false);
  }

  // ── Realtime ──────────────────────────────────────────────────────────────

  function subscribeRealtime() {
    if (realtimeSub) realtimeSub.unsubscribe();
    realtimeSub = db
      .channel('messages-' + convId)
      .on(
        'postgres_changes',
        { event: 'INSERT', schema: 'public', table: 'messages', filter: 'conversation_id=eq.' + convId },
        payload => {
          const msg = { ...payload.new, _senderName: otherPartyName };
          if (msg.sender_id !== currentUser?.id) {
            appendMessage(msg);
            markMessagesRead();
          }
        }
      )
      .subscribe((status, err) => {
        if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') {
          console.warn('[chat] berichten realtime verbinding verbroken:', err?.message);
          notify('Verbinding verbroken — ververs de pagina om door te gaan', false);
        }
      });
  }

  // ── Send ──────────────────────────────────────────────────────────────────

  async function sendMessage() {
    toggleEmojiPicker(false); // close picker if open
    if (!convId || !currentUser) return;
    const input = document.getElementById('msgInput');
    const content = input.value.trim();
    if (!content) return;

    const btn = document.getElementById('sendBtn');
    btn.disabled = true;
    input.value = '';
    input.style.height = 'auto';

    const myName = currentUser.user_metadata?.naam
      || currentUser.user_metadata?.name
      || currentUser.email?.split('@')?.[0]
      || 'Gebruiker';

    // Optimistic append
    const optimistic = {
      id:              'opt-' + Date.now(),
      sender_id:       currentUser.id,
      _senderName:     myName,
      content,
      created_at:      new Date().toISOString(),
      conversation_id: convId,
    };
    appendMessage(optimistic);

    const { error } = await db.from('messages').insert({
      conversation_id: convId,
      sender_id:       currentUser.id,
      content,
    });

    btn.disabled = false;

    if (error) {
      notify('Fout bij verzenden: ' + (error?.message || 'onbekende fout'));
      console.error('Send error:', error?.message || 'onbekende fout');
      return;
    }

    // Notify recipient (fire-and-forget)
    if (otherPartyId) {
      createNotification(
        otherPartyId,
        'new_message',
        matchId,
        'message',
        myName + ' heeft je een bericht gestuurd'
      );
    }
  }

  // ── All-conversations view ────────────────────────────────────────────────

  async function loadAllConversations(userId) {
    const main = document.getElementById('messagesArea');
    if (main) main.innerHTML = '<div class="chat-empty"><span class="icon">⏳</span>Gesprekken laden…</div>';

    // Step 1: fetch only match IDs for this user — DB-level filter so we never
    // receive other users' conversations even if RLS on conversations is absent.
    const { data: userMatches, error: matchErr } = await db
      .from('matches')
      .select('id')
      .or(`party_a.eq.${userId},party_b.eq.${userId}`);

    if (matchErr || !userMatches || userMatches.length === 0) {
      showEmptyState();
      return;
    }

    const matchIds = userMatches.map(m => m.id);

    // Step 2: fetch conversations scoped to those match IDs
    const { data, error } = await db
      .from('conversations')
      .select(`
        id,
        created_at,
        match_id,
        matches (
          id, party_a, party_b, type, status, posting_id,
          internship_postings ( title, company_name )
        )
      `)
      .in('match_id', matchIds)
      .order('created_at', { ascending: false });

    if (error || !data || data.length === 0) {
      showEmptyState();
      return;
    }

    renderConversationList(data, userId);
  }

  function showEmptyState() {
    const main = document.getElementById('messagesArea');
    if (!main) return;
    main.innerHTML = `
      <div style="
        display:flex; flex-direction:column; align-items:center;
        justify-content:center; height:100%; padding:48px 24px;
        text-align:center;
      ">
        <div style="font-size:3rem; margin-bottom:16px;">💬</div>
        <div style="
          font-family:'Bricolage Grotesque',sans-serif;
          font-size:1.2rem; font-weight:700;
          color:#0d1520; margin-bottom:8px;
        ">Nog geen gesprekken</div>
        <div style="
          font-size:.9rem; color:#6b7280;
          max-width:300px; line-height:1.6; margin-bottom:24px;
        ">
          Chat is beschikbaar zodra je een match hebt gemaakt.
          Ga naar Matches om te beginnen.
        </div>
        <a href="matches.html" style="
          background:#FF7E42; color:#fff; text-decoration:none;
          padding:11px 28px; border-radius:50px;
          font-family:'Outfit',sans-serif; font-size:.9rem; font-weight:700;
        ">Ga naar Matches →</a>
      </div>
    `;
  }

  async function renderConversationList(conversations, userId) {
    const main = document.getElementById('messagesArea');
    if (!main) return;

    const items = await Promise.all(conversations.map(async (conv) => {
      const match = conv.matches;
      const otherPartyId = match.party_a === userId ? match.party_b : match.party_a;

      const { data: profile } = await db
        .from('profiles')
        .select('naam, role')
        .eq('id', otherPartyId)
        .maybeSingle();

      const { data: lastMsg } = await db
        .from('messages')
        .select('content, created_at, read, sender_id')
        .eq('conversation_id', conv.id)
        .order('created_at', { ascending: false })
        .limit(1)
        .maybeSingle();

      const unread = lastMsg && !lastMsg.read && lastMsg.sender_id !== userId ? 1 : 0;

      return { conv, profile, lastMsg, unread };
    }));

    const naam = (n) => (n || '?').replace(/'/g, "\\'");

    main.innerHTML = `
      <div style="padding:16px;">
        <div style="
          font-family:'Bricolage Grotesque',sans-serif;
          font-size:1.1rem; font-weight:700;
          color:#0d1520; margin-bottom:16px;
        ">Gesprekken</div>
        ${items.map(({ conv, profile, lastMsg, unread }) => `
          <div onclick="window.location.href='chat.html?match=${conv.match_id}'"
            style="
              background:#fff; border:1.5px solid ${unread ? '#1a7a48' : '#f0f0ee'};
              border-radius:12px; padding:14px 16px; margin-bottom:10px;
              cursor:pointer; display:flex; align-items:center; gap:12px;
              transition:border-color .15s, box-shadow .15s;
              min-height:44px;
            "
            onmouseover="this.style.boxShadow='0 2px 12px rgba(0,0,0,.08)'"
            onmouseout="this.style.boxShadow='none'">
            <div style="
              width:42px; height:42px; border-radius:50%;
              background:${unread ? '#e8f5ee' : '#f4f3ef'};
              display:flex; align-items:center; justify-content:center;
              font-family:'Bricolage Grotesque',sans-serif;
              font-size:.9rem; font-weight:700;
              color:${unread ? '#1a7a48' : '#6b7280'};
              flex-shrink:0;
            ">
              ${escapeHtml((profile?.naam || '?').split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2))}
            </div>
            <div style="flex:1; min-width:0;">
              <div style="
                font-weight:600; font-size:.92rem; color:#0d1520;
                white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
              ">${escapeHtml(profile?.naam || 'Onbekend')}</div>
              <div style="
                font-size:.8rem; color:#6b7280;
                white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
              ">${lastMsg ? escapeHtml(lastMsg.content.slice(0, 50)) + (lastMsg.content.length > 50 ? '…' : '') : 'Nog geen berichten'}</div>
            </div>
            ${unread ? `<div style="
              width:10px; height:10px; border-radius:50%;
              background:#1a7a48; flex-shrink:0;
            "></div>` : ''}
          </div>
        `).join('')}
      </div>
    `;
  }

  // ── Buddy pair chat ───────────────────────────────────────────────────────
  // Vereist SQL-migratie: ALTER TABLE conversations ADD COLUMN IF NOT EXISTS
  //   buddy_pair_id UUID REFERENCES buddy_pairs(id);
  // Totdat die kolom bestaat valt de INSERT terug op match_id = null.

  async function loadBuddyConversation(pairId) {
    // 1. Haal buddy_pair op + profilenamen
    const { data: pair, error: pErr } = await db
      .from('buddy_pairs')
      .select(`
        id, type, status,
        req:profiles!buddy_pairs_requester_id_fkey(id, naam),
        rec:profiles!buddy_pairs_receiver_id_fkey(id, naam)
      `)
      .eq('id', pairId)
      .maybeSingle();

    if (pErr || !pair) {
      document.getElementById('messagesArea').innerHTML =
        '<div class="chat-empty"><span class="icon">🔒</span>Buddy-koppeling niet gevonden.</div>';
      return;
    }

    // 2. Toegangscheck — alleen de twee betrokkenen
    const uid = currentUser.id;
    if (pair.req?.id !== uid && pair.rec?.id !== uid) {
      document.getElementById('messagesArea').innerHTML =
        '<div class="chat-empty"><span class="icon">🔒</span>Je hebt geen toegang tot dit gesprek.</div>';
      return;
    }

    // 3. Andere partij
    const isRequester = pair.req?.id === uid;
    const other = isRequester ? pair.rec : pair.req;
    otherPartyId   = other?.id || null;
    otherPartyName = other?.naam || 'Buddy';
    otherPartyEmail = null;

    // 4. Topbar invullen
    document.getElementById('topbarMatchName').textContent = otherPartyName;
    document.getElementById('topbarMatchSub').textContent  = 'Buddy-chat · ' + (pair.type || 'gepensioneerd');
    // Stage Hub-pil verbergen — niet van toepassing bij buddy-chat
    const stageHubLink = document.getElementById('match-hub-topbar-link');
    if (stageHubLink) stageHubLink.style.display = 'none';

    // 5. Conversation ophalen of aanmaken (buddy_pair_id kolom)
    let conv = null;
    const { data: existing } = await db
      .from('conversations')
      .select('id')
      .eq('buddy_pair_id', pairId)
      .maybeSingle();

    if (existing) {
      conv = existing;
    } else {
      // Kolom bestaat nog niet of conversation bestaat nog niet — aanmaken
      const { data: newConv, error: cErr } = await db
        .from('conversations')
        .insert({ buddy_pair_id: pairId })
        .select('id')
        .maybeSingle();
      if (cErr) {
        // Fallback: kolom bestaat nog niet → sla op als match_id-loze conversatie
        console.warn('[chat] buddy_pair_id kolom ontbreekt');
        const { data: fb } = await db
          .from('conversations')
          .insert({ match_id: null })
          .select('id')
          .maybeSingle();
        conv = fb;
      } else {
        conv = newConv;
      }
    }

    if (!conv) {
      document.getElementById('messagesArea').innerHTML =
        '<div class="chat-empty"><span class="icon">⚠️</span>Gesprek kon niet worden geladen.</div>';
      return;
    }

    convId = conv.id;
    await loadMessages();
    subscribeRealtime();
    markMessagesRead();
  }

  // Session expiry guard — vang verlopen JWT op bij elke DB-aanroep
  window.addEventListener('unhandledrejection', function(e) {
    if (e.reason && (
      e.reason.message?.includes('JWT') ||
      e.reason.message?.includes('session') ||
      e.reason.code === 'PGRST301'
    )) {
      sessionStorage.clear();
      window.location.replace('auth.html?expired=1');
    }
  });

  // ── Init ──────────────────────────────────────────────────────────────────

  window.addEventListener('DOMContentLoaded', async () => {
    // ── Laag 1: rol guard ──
    const hasValidRole = await requireRole('student', 'bedrijf', 'school');
    if (!hasValidRole) return;

    const { data: { user } } = await db.auth.getUser();
    if (!user) { window.location.replace('auth.html'); return; }
    currentUser = user;

    const params = new URLSearchParams(window.location.search);
    matchId = params.get('match');
    const buddyPairId = params.get('buddy_pair_id');

    // ── Laag 2: match partij guard (alleen bij directe match URL) ──
    if (matchId && !buddyPairId) {
      const { data: matchRow, error: mErr } = await db.from('matches')
        .select('party_a, party_b')
        .eq('id', matchId)
        .maybeSingle();
      if (mErr || !matchRow) {
        console.error('[chat.html] match niet gevonden:', mErr);
        window.location.replace('index.html');
        return;
      }
      if (matchRow.party_a !== user.id && matchRow.party_b !== user.id) {
        console.warn('[chat.html] user is geen match partij');
        notify('Je hebt geen toegang tot dit gesprek', false);
        setTimeout(() => window.location.replace(getRoleLanding(__cachedUserRole || 'student')), 1500);
        return;
      }
    }

    if (buddyPairId) {
      await loadBuddyConversation(buddyPairId);
    } else if (matchId) {
      await loadConversation(matchId);
    } else {
      // List view — hide the input bar, update topbar title
      const inputBar = document.querySelector('.input-bar');
      if (inputBar) inputBar.style.display = 'none';
      document.getElementById('topbarMatchName').textContent = 'Berichten';
      document.getElementById('topbarMatchSub').textContent  = '';
      await loadAllConversations(user.id);
    }
  });

  window.addEventListener('beforeunload', () => {
    if (realtimeSub)     realtimeSub.unsubscribe();
    if (meetingNotifSub) meetingNotifSub.unsubscribe();
  });
</script>

<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/favicon_180x180.png">
  <link rel="manifest" href="/manifest.json">
  <title>Welkom — Internly</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">

  <style>
  body[data-auth-pending] .sh-main { opacity: 0; }
  body:not([data-auth-pending]) .sh-main { opacity: 1; transition: opacity .2s; }

  .sh-main {
    max-width: 600px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
  }

  .sh-hero {
    margin-bottom: 2rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border, rgba(13,21,32,.09));
  }
  .sh-greeting {
    font-size: 1.05rem;
    color: var(--ink2, #3a4455);
    margin-bottom: .2rem;
  }
  .sh-name {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 1.75rem;
    font-weight: 700;
    color: var(--ink, #0d1520);
    letter-spacing: -.025em;
    margin-bottom: .25rem;
  }
  .sh-meta {
    font-size: .85rem;
    color: var(--ink3, #7a8799);
  }

  .sh-progress-wrap {
    margin-bottom: 1.75rem;
  }
  .sh-progress-label {
    font-size: .82rem;
    color: var(--ink2, #3a4455);
    margin-bottom: .4rem;
  }
  .sh-progress-track {
    height: 5px;
    background: var(--bg2, #eceae4);
    border-radius: 3px;
    overflow: hidden;
  }
  .sh-progress-fill {
    height: 100%;
    background: var(--green, #1a7a48);
    border-radius: 3px;
    transition: width .4s ease;
  }

  .sh-suggesties {
    margin-top: .65rem;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .sh-suggestie {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: .5rem .85rem;
    border-radius: 8px;
    background: rgba(26,122,72,.08);
    border: 1px solid rgba(26,122,72,.15);
    text-decoration: none;
    font-size: .82rem;
    color: #1a7a48;
    font-weight: 500;
    transition: background .12s;
  }
  .sh-suggestie:hover { background: rgba(26,122,72,.15); }

  .sh-cards {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 1.5rem;
  }
  .sh-card {
    background: #fff;
    border: 1px solid var(--border, rgba(13,21,32,.09));
    border-radius: 12px;
    padding: 1.1rem 1.25rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    text-decoration: none;
    color: inherit;
    transition: border-color .12s, box-shadow .12s, transform .1s;
  }
  .sh-card:hover {
    border-color: rgba(13,21,32,.18);
    box-shadow: 0 2px 10px rgba(0,0,0,.06);
    transform: translateY(-1px);
  }
  .sh-card-icon { font-size: 1.5rem; flex-shrink: 0; }
  .sh-card-body { flex: 1; }
  .sh-card-title {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: .98rem;
    font-weight: 600;
    color: var(--ink, #0d1520);
    margin-bottom: .15rem;
  }
  .sh-card-sub { font-size: .82rem; color: var(--ink3, #7a8799); }
  .sh-card-arrow { color: var(--ink3, #7a8799); font-size: 1rem; }

  .sh-hub-card {
    background: var(--green, #1a7a48);
    border-radius: 12px;
    padding: 1.25rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    text-decoration: none;
    color: #fff;
    transition: opacity .12s;
  }
  .sh-hub-card:hover { opacity: .9; }
  .sh-hub-icon { font-size: 1.5rem; flex-shrink: 0; }
  .sh-hub-body { flex: 1; }
  .sh-hub-title {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: .1rem;
  }
  .sh-hub-stage { font-size: .82rem; opacity: .75; }
  .sh-hub-badge {
    background: rgba(255,255,255,.2);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: .8rem;
    font-weight: 600;
    white-space: nowrap;
  }
  </style>
</head>
<body data-role="student" data-auth-pending="true">

  <div id="student-header"></div>

  <main class="sh-main">

    <section class="sh-hero">
      <div class="sh-greeting" id="sh-greeting">Goedemorgen 👋</div>
      <div class="sh-name" id="sh-name">Welkom terug</div>
      <div class="sh-meta" id="sh-meta">Internly · Jouw stageplek</div>
    </section>

    <section class="sh-progress-wrap" id="sh-progress-wrap" style="display:none">
      <div class="sh-progress-label">Profiel <span id="sh-pct">0</span>% compleet</div>
      <div class="sh-progress-track">
        <div class="sh-progress-fill" id="sh-progress-fill"></div>
      </div>
      <div id="sh-suggesties" class="sh-suggesties" style="display:none"></div>
    </section>

    <section class="sh-cards">

      <a href="discover.html" class="sh-card">
        <div class="sh-card-icon">🔍</div>
        <div class="sh-card-body">
          <div class="sh-card-title">Ontdek stages</div>
          <div class="sh-card-sub">Bekijk alle vacatures en vind jouw match</div>
        </div>
        <div class="sh-card-arrow">→</div>
      </a>

      <a href="student-profile.html" class="sh-card" id="sh-profiel-card">
        <div class="sh-card-icon">👤</div>
        <div class="sh-card-body">
          <div class="sh-card-title">Profiel aanvullen</div>
          <div class="sh-card-sub">Hoe meer je invult, hoe beter de matches</div>
        </div>
        <div class="sh-card-arrow">→</div>
      </a>

      <a href="mijn-sollicitaties.html" class="sh-card">
        <div class="sh-card-icon">📋</div>
        <div class="sh-card-body">
          <div class="sh-card-title">Mijn sollicitaties</div>
          <div class="sh-card-sub" id="sh-sol-sub">Bekijk de status van je aanmeldingen</div>
        </div>
        <div class="sh-card-arrow">→</div>
      </a>

    </section>

    <section class="sh-hub-wrap" id="sh-hub-wrap" style="display:none">
      <a href="match-dashboard.html" class="sh-hub-card" id="sh-hub-link">
        <div class="sh-hub-icon">📈</div>
        <div class="sh-hub-body">
          <div class="sh-hub-title">Stage Hub</div>
          <div class="sh-hub-stage" id="sh-hub-stage">Actieve stage</div>
        </div>
        <div class="sh-hub-badge">Actief →</div>
      </a>
    </section>

  </main>

  <script src="js/utils.js"></script>
  <script src="js/roles.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script>
  (async () => {
    try {
      const hasValidRole = await requireRole('student');
      if (!hasValidRole) return;

      const { data: { user } } = await db.auth.getUser();
      if (!user) { window.location.replace('auth.html'); return; }

      const { data: sp } = await db
        .from('student_profiles')
        .select('naam, opleiding, school, bbl_mode, opdracht_domein, postcode, motivatie, skills')
        .eq('profile_id', user.id)
        .maybeSingle();

      if (!sp?.naam) {
        window.location.replace('bol-profile.html');
        return;
      }

      const uur = new Date().getHours();
      const groet = uur < 12 ? 'Goedemorgen' : uur < 18 ? 'Goedemiddag' : 'Goedenavond';
      document.getElementById('sh-greeting').textContent = groet + ' 👋';
      document.getElementById('sh-name').textContent = sp.naam;
      document.getElementById('sh-meta').textContent =
        [sp.opleiding, sp.school].filter(Boolean).join(' · ') || 'Internly · Jouw stageplek';

      // Gewogen completeness — verplichte velden tellen mee maar geven geen suggestie.
      // Optionele velden hebben impact-tekst die als aanvulsuggestie wordt getoond.
      const _cVelden = [
        { key: 'naam',            gewicht: 10, impact: null },
        { key: 'opleiding',       gewicht: 10, impact: null },
        { key: 'school',          gewicht: 10, impact: null },
        { key: 'opdracht_domein', gewicht: 30, impact: 'Bepaalt jouw matches' },
        { key: 'postcode',        gewicht: 15, impact: 'Schakelt reistijd-filter in' },
        { key: 'motivatie',       gewicht: 15, impact: 'Bedrijven lezen dit als eerste' },
        { key: 'skills',          gewicht: 10, impact: 'Toont jouw vaardigheden' },
      ];
      const _heeftWaarde = (v) => v &&
        (Array.isArray(v) ? v.length > 0 : String(v).trim().length > 0);
      const _totaal  = _cVelden.reduce((s, v) => s + v.gewicht, 0);
      const _behaald = _cVelden
        .filter(v => _heeftWaarde(sp[v.key]))
        .reduce((s, v) => s + v.gewicht, 0);
      const pct = Math.round((_behaald / _totaal) * 100);

      if (pct < 100) {
        document.getElementById('sh-pct').textContent = pct;
        document.getElementById('sh-progress-fill').style.width = pct + '%';
        document.getElementById('sh-progress-wrap').style.display = '';
      }

      const _ontbrekend = _cVelden.filter(v => v.impact && !_heeftWaarde(sp[v.key]));
      if (_ontbrekend.length > 0) {
        const _sugEl = document.getElementById('sh-suggesties');
        if (_sugEl) {
          _sugEl.style.display = '';
          _sugEl.innerHTML = _ontbrekend.slice(0, 2).map(v => `
            <a href="bol-profile.html" class="sh-suggestie">
              <span>+ ${v.impact}</span><span>→</span>
            </a>
          `).join('');
        }
      }

      // Parallel: header rendering + actieve match + sollicitatie-teller.
      // Drie onafhankelijke calls — geen sequentiële afhankelijkheid.
      const [, matchRes, solRes] = await Promise.all([
        renderStudentHeader({ activeTab: 'home' }),
        db.from('matches')
          .select('id, internship_postings(title, company_name)')
          .eq('party_a', user.id)
          .eq('status', 'accepted')
          .limit(1)
          .maybeSingle(),
        db.from('matches')
          .select('id', { count: 'exact', head: true })
          .eq('party_a', user.id)
          .in('status', ['pending','accepted']),
      ]);

      const match = matchRes?.data;
      if (match) {
        const stageEl = document.getElementById('sh-hub-stage');
        const posting = match.internship_postings;
        if (posting?.title) {
          stageEl.textContent = posting.title +
            (posting.company_name ? ' · ' + posting.company_name : '');
        }
        document.getElementById('sh-hub-wrap').style.display = '';
        document.getElementById('sh-hub-link').href =
          'match-dashboard.html?match=' + match.id;
      }

      const solCount = solRes?.count || 0;
      if (solCount > 0) {
        document.getElementById('sh-sol-sub').textContent =
          solCount + ' openstaande sollicitatie' + (solCount !== 1 ? 's' : '');
      }
    } catch (e) {
      console.error('[student-home] init error:', e);
    } finally {
      // Anti-flicker garanderen: pagina mag NOOIT permanent onzichtbaar blijven
      document.body.removeAttribute('data-auth-pending');
    }
  })();
  </script>

  <script src="js/consent.js" defer></script>
  <script>
  (function() {
    function _loadTel() {
      var s = document.createElement('script');
      s.src = 'js/telemetry.js';
      s.setAttribute('data-internly-tel', '1');
      document.head.appendChild(s);
    }
    if (typeof window.InternlyConsent !== 'undefined') {
      if (window.InternlyConsent.hasConsent('analytics')) {
        _loadTel();
      } else {
        window.InternlyConsent.onAccept('analytics', _loadTel);
      }
    } else {
      document.addEventListener('DOMContentLoaded', function() {
        if (typeof window.InternlyConsent !== 'undefined') {
          if (window.InternlyConsent.hasConsent('analytics')) {
            _loadTel();
          } else {
            window.InternlyConsent.onAccept('analytics', _loadTel);
          }
        }
      });
    }
  })();
  </script>
</body>
</html>

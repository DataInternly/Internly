<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inloggen — Internly (voorbeeld)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;600;700;800&family=Outfit:wght@300;400;500;600&family=Caveat:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --c-green-deep: #0f5c36; --c-green: #1a7a48; --c-orange: #FF7E42; --c-orange-deep: #e05c1a;
  --c-cream: #f4f3ef; --c-cream-warm: #fdfaf6; --c-ink: #0d1520;
  --fg-primary: #0d1520; --fg-secondary: #2e4038; --fg-tertiary: #6b8070;
  --line-subtle: rgba(13,26,16,.09); --line-default: rgba(13,26,16,.14);
  --r-md: 12px; --r-lg: 20px; --r-pill: 999px;
  --s2: 8px; --s3: 12px; --s4: 16px; --s5: 24px; --s6: 32px; --s7: 48px;
  --font-display: 'Bricolage Grotesque', sans-serif;
  --font-body: 'Outfit', sans-serif;
  --font-script: 'Caveat', cursive;
}
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-body);
  color: var(--fg-primary);
  background-color: var(--c-cream-warm);
  background-image:
    /* subtiele dotted hoek rechtsboven (auth-pagina = focus + warmte) */
    radial-gradient(circle, rgba(224, 92, 26, 0.05) 1px, transparent 1px),
    /* zachte oranje glow rechtsboven */
    radial-gradient(ellipse 60% 60% at 100% 0%, rgba(255, 126, 66, 0.10), transparent 60%),
    /* zachte groene glow linksonder */
    radial-gradient(ellipse 60% 60% at 0% 100%, rgba(26, 122, 72, 0.06), transparent 60%);
  background-size: 24px 24px, 100% 100%, 100% 100%;
  background-attachment: fixed;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  display: flex; flex-direction: column;
}

/* ── Topbar ── */
.auth-topbar {
  padding: var(--s5);
  display: flex; align-items: center; justify-content: space-between;
}
.logo {
  font-family: var(--font-display); font-weight: 700; font-size: 1.4rem;
  letter-spacing: -.03em; color: var(--c-green-deep);
  text-decoration: none;
}
.logo span { color: var(--c-orange-deep); }
.topbar-link {
  font-size: .88rem; color: var(--fg-tertiary);
  text-decoration: none; padding: 8px 14px; border-radius: var(--r-pill);
  transition: background 120ms, color 120ms;
}
.topbar-link:hover { background: var(--c-cream); color: var(--fg-primary); }

/* ── Center the card ── */
.auth-frame {
  flex: 1;
  display: flex; align-items: center; justify-content: center;
  padding: var(--s5);
}

/* ── Auth card ── */
.auth-card {
  width: 100%; max-width: 460px;
  background: #fff;
  border: 1px solid var(--line-subtle);
  border-radius: var(--r-lg);
  padding: var(--s7) var(--s6);
  box-shadow: 0 18px 40px rgba(0,0,0,.10);
  position: relative;
}
.auth-eyebrow {
  font-family: var(--font-script);
  font-size: 1.1rem; color: var(--c-orange-deep);
  margin-bottom: 6px; transform: rotate(-1deg); display: inline-block;
}
.auth-title {
  font-family: var(--font-display); font-weight: 800;
  font-size: clamp(1.7rem, 3vw, 2.1rem);
  color: var(--fg-primary);
  letter-spacing: -.02em; line-height: 1.15;
  margin-bottom: 8px;
}
.auth-sub {
  color: var(--fg-tertiary); font-size: .92rem;
  line-height: 1.6; margin-bottom: var(--s6);
}

/* ── Tabs login / signup ── */
.auth-tabs {
  display: grid; grid-template-columns: 1fr 1fr;
  background: var(--c-cream);
  border-radius: var(--r-pill);
  padding: 4px;
  margin-bottom: var(--s5);
}
.auth-tab {
  font-family: var(--font-body);
  font-size: .88rem; font-weight: 600;
  padding: 9px;
  border: none; background: transparent;
  color: var(--fg-tertiary);
  border-radius: var(--r-pill);
  cursor: pointer;
  transition: background 120ms, color 120ms;
}
.auth-tab.active {
  background: #fff; color: var(--fg-primary);
  box-shadow: 0 2px 8px rgba(0,0,0,.06);
}

/* ── Form ── */
.field { margin-bottom: var(--s4); }
.field-label {
  display: block; font-size: .82rem; font-weight: 600;
  color: var(--fg-secondary); margin-bottom: 6px;
}
.input {
  width: 100%;
  font-family: var(--font-body); font-size: .95rem;
  padding: 12px 18px;
  border: 1.5px solid #e2e8f0;
  border-radius: var(--r-pill);
  outline: none;
  transition: border-color 120ms;
}
.input:focus { border-color: var(--c-green); }

.field-help {
  font-size: .76rem; color: var(--fg-tertiary);
  margin-top: 6px;
}

.btn-primary {
  width: 100%;
  font-family: var(--font-body); font-size: .98rem; font-weight: 600;
  padding: 13px;
  background: var(--c-orange-deep); color: #fff;
  border: none; border-radius: var(--r-pill);
  cursor: pointer;
  box-shadow: 0 10px 30px rgba(255,126,66,.32);
  transition: background 120ms, transform 120ms;
  margin-top: var(--s4);
}
.btn-primary:hover { background: #b94613; transform: translateY(-1px); }

.btn-divider {
  text-align: center; font-size: .78rem; color: var(--fg-tertiary);
  margin: var(--s5) 0; position: relative;
}
.btn-divider::before, .btn-divider::after {
  content: ''; position: absolute; top: 50%; width: 35%; height: 1px;
  background: var(--line-subtle);
}
.btn-divider::before { left: 0; }
.btn-divider::after { right: 0; }

.btn-secondary {
  width: 100%;
  font-family: var(--font-body); font-size: .92rem; font-weight: 500;
  padding: 11px;
  background: transparent; color: var(--fg-primary);
  border: 1.5px solid var(--line-default); border-radius: var(--r-pill);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  transition: background 120ms, border-color 120ms;
}
.btn-secondary:hover { background: var(--c-cream); border-color: var(--fg-tertiary); }

.auth-footer-note {
  margin-top: var(--s5); font-size: .8rem; color: var(--fg-tertiary);
  text-align: center; line-height: 1.6;
}
.auth-footer-note a { color: var(--c-green); text-decoration: underline; }

/* Caveat — kanttekening naast de signup-titel */
.caveat-corner {
  position: absolute; top: 18px; right: 24px;
  font-family: var(--font-script); font-size: 1rem;
  color: var(--c-orange-deep); transform: rotate(4deg);
  opacity: .8;
}

/* ── Bodem-strip met trust-elementen ── */
.trust-strip {
  display: flex; justify-content: center; gap: var(--s5);
  padding: var(--s4) var(--s5);
  font-size: .76rem; color: var(--fg-tertiary);
}
.trust-item { display: flex; align-items: center; gap: 6px; }
.trust-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--c-green-deep);
}
</style>
</head>
<body>

<header class="auth-topbar">
  <a href="/" class="logo">intern<span>ly</span></a>
  <a href="/" class="topbar-link">← terug naar home</a>
</header>

<main class="auth-frame">

  <div class="auth-card">

    <span class="caveat-corner">welkom terug</span>

    <span class="auth-eyebrow">eerlijk stages</span>
    <h1 class="auth-title">Welkom op Internly</h1>
    <p class="auth-sub">
      Log in of maak een profiel aan. Studenten blijven gratis — altijd.
    </p>

    <div class="auth-tabs">
      <button class="auth-tab active">Inloggen</button>
      <button class="auth-tab">Account aanmaken</button>
    </div>

    <form>
      <div class="field">
        <label class="field-label" for="email">E-mailadres</label>
        <input type="email" class="input" id="email" placeholder="jouw@email.nl" autocomplete="email">
      </div>

      <div class="field">
        <label class="field-label" for="password">Wachtwoord</label>
        <input type="password" class="input" id="password" placeholder="••••••••" autocomplete="current-password">
        <div class="field-help">
          <a href="/wachtwoord-vergeten.html" style="color:var(--c-green);text-decoration:none;">
            Wachtwoord vergeten?
          </a>
        </div>
      </div>

      <button type="submit" class="btn-primary">Log in →</button>

      <div class="btn-divider">of</div>

      <button type="button" class="btn-secondary">
        <span style="font-weight:700;">G</span>
        Doorgaan met Google
      </button>
    </form>

    <p class="auth-footer-note">
      Door in te loggen ga je akkoord met onze
      <a href="/privacybeleid.html">privacyvoorwaarden</a>
      en <a href="/spelregels.html">spelregels</a>.
    </p>
  </div>

</main>

<footer class="trust-strip">
  <div class="trust-item">
    <span class="trust-dot"></span>
    DPA Supabase getekend
  </div>
  <div class="trust-item">
    <span class="trust-dot"></span>
    GDPR conform
  </div>
  <div class="trust-item">
    <span class="trust-dot"></span>
    Sasubo Holding B.V.
  </div>
</footer>

<!--
  NOTITIE VOOR CLAUDE CODE — bij toepassing op productie auth.html:
  · BEHOUD: alle Supabase auth calls (signInWithPassword, signUp, signInWithOAuth)
  · BEHOUD: alle id's die JS aanroept (email, password, alle form-handlers)
  · BEHOUD: tab-switching logica voor login vs signup mode
  · BEHOUD: query-string parsing voor ?role=, ?mode=signup
  · BEHOUD: redirect-na-login naar getRoleLanding()
  · VERVANG: alleen de visuele laag, achtergrond, en typografie
  · KRITIEK: form-input id's en name's blijven exact gelijk
-->

</body>
</html>

<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="/manifest.json">
  <title>Stage Hub — Internly</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    /* ── Design tokens ───────────────────────────────────────────── */
    :root {
      --primary:     #1a7a48;
      --dark-green:  #0f5c36;
      --accent:      #FF7E42;
      --accent-dark: #e05c1a;
      --ink:         #0d1520;
      --ink-2:       #1a2535;
      --ink-3:       #253047;
      --bg:          #f4f3ef;
      --white:       #ffffff;
      --border:      #e5e3de;
      --text:        #1a1a1a;
      --muted:       #6b7280;
      --blue:        #1756a8;
      --blue-bg:     #eef3fb;
      --r:           16px;
      --sidebar-w:   220px;
      --topbar-h:    60px;
      --green:       #1a7a48;
      --green-bg:    #e8f5ee;
      --amber:       #a06010;
      --amber-bg:    #fdf3e0;
      --red:         #b82020;
      --red-bg:      #fdeaea;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Role picker ─────────────────────────────────────────────── */
    #role-picker {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      background: var(--bg);
    }

    .rp-logo {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: -.03em;
      margin-bottom: 8px;
    }
    .rp-logo span { color: var(--accent); }

    .rp-subtitle {
      font-size: .95rem;
      color: var(--muted);
      margin-bottom: 48px;
      text-align: center;
    }

    .rp-heading {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 8px;
      text-align: center;
    }

    .rp-desc {
      font-size: .9rem;
      color: var(--muted);
      margin-bottom: 32px;
      text-align: center;
    }

    .rp-cards {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 680px;
    }

    .rp-card {
      background: var(--white);
      border: 2px solid var(--border);
      border-radius: var(--r);
      padding: 28px 32px;
      cursor: pointer;
      transition: all .18s;
      text-align: center;
      min-width: 180px;
      flex: 1;
    }

    .rp-card:hover {
      border-color: var(--primary);
      box-shadow: 0 4px 20px rgba(26,122,72,.12);
      transform: translateY(-2px);
    }

    .rp-card-icon {
      font-size: 2.2rem;
      margin-bottom: 12px;
    }

    .rp-card-title {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 4px;
    }

    .rp-card-hint {
      font-size: .82rem;
      color: var(--muted);
    }

    /* ── App shell ───────────────────────────────────────────────── */
    #app-shell {
      display: none;
      min-height: 100vh;
    }

    /* Topbar */
    #hub-topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--topbar-h);
      background: var(--white);
      border-bottom: 1.5px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px 0 0;
      z-index: 100;
      gap: 16px;
    }

    #hamburger-btn {
      display: none;
      width: var(--sidebar-w);
      height: var(--topbar-h);
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      cursor: pointer;
      flex-shrink: 0;
    }

    #hamburger-btn svg { width: 22px; height: 22px; }

    .hub-topbar-logo {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--white);
      letter-spacing: -.02em;
      text-decoration: none;
      display: flex;
      align-items: center;
      width: var(--sidebar-w);
      height: 100%;
      padding: 0 20px;
      background: var(--ink);
      flex-shrink: 0;
    }

    .hub-topbar-logo span { color: var(--accent); }

    .hub-topbar-stage {
      flex: 1;
      min-width: 0;
    }

    .hub-topbar-stage-name {
      font-size: .95rem;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .hub-topbar-stage-meta {
      font-size: .78rem;
      color: var(--muted);
    }

    .hub-topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .role-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: .8rem;
      font-weight: 600;
    }

    .role-badge.student { background: var(--blue-bg); color: var(--blue); }
    .role-badge.bedrijf { background: #e8f5ee; color: var(--primary); }
    .role-badge.school  { background: #fdf3e0; color: #a06010; }

    .role-switch-btn {
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 5px 12px;
      font-family: 'Outfit', sans-serif;
      font-size: .8rem;
      color: var(--muted);
      cursor: pointer;
      transition: all .15s;
    }

    .role-switch-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    /* Hub layout */
    .hub-layout {
      display: flex;
      padding-top: var(--topbar-h);
      min-height: 100vh;
    }

    /* Sidebar */
    #sidebar {
      position: fixed;
      top: var(--topbar-h);
      left: 0;
      width: var(--sidebar-w);
      height: calc(100vh - var(--topbar-h));
      background: var(--ink);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      z-index: 90;
      transition: transform .25s;
    }

    .sidebar-section-label {
      font-size: .68rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: rgba(255,255,255,.35);
      padding: 20px 20px 8px;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      color: rgba(255,255,255,.65);
      font-size: .9rem;
      font-weight: 500;
      cursor: pointer;
      border-radius: 0;
      transition: all .15s;
      text-decoration: none;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }

    .sidebar-item:hover {
      background: rgba(255,255,255,.06);
      color: rgba(255,255,255,.9);
    }

    .sidebar-item.active {
      background: rgba(26,122,72,.25);
      color: #fff;
      border-left: 3px solid var(--primary);
    }

    .sidebar-item svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      opacity: .8;
    }

    .sidebar-badge {
      margin-left: auto;
      background: var(--accent);
      color: #fff;
      font-size: .68rem;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 10px;
    }

    .sidebar-spacer { flex: 1; }

    .sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid rgba(255,255,255,.08);
    }

    .sidebar-footer-user {
      font-size: .82rem;
      color: rgba(255,255,255,.5);
      line-height: 1.5;
    }

    /* Main content */
    #main-content {
      flex: 1;
      margin-left: var(--sidebar-w);
      padding: 32px;
      max-width: calc(100% - var(--sidebar-w));
    }

    /* ── Shared components ───────────────────────────────────────── */
    .page-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 24px;
      gap: 16px;
      flex-wrap: wrap;
    }

    .page-title {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: -.02em;
    }

    .page-sub {
      font-size: .88rem;
      color: var(--muted);
      margin-top: 4px;
    }

    .card {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--r);
      padding: 24px;
      margin-bottom: 16px;
    }

    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      gap: 12px;
    }

    .card-title {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--ink);
    }

    .card-sub {
      font-size: .82rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    /* Stat cards */
    .stat-card {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--r);
      padding: 20px;
      text-align: center;
    }

    .stat-num {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--ink);
      line-height: 1;
      margin-bottom: 6px;
    }

    .stat-label {
      font-size: .82rem;
      color: var(--muted);
    }

    /* Tags */
    .tag {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: .75rem;
      font-weight: 600;
    }

    .tag.green  { background: #e8f5ee; color: var(--primary); }
    .tag.blue   { background: var(--blue-bg); color: var(--blue); }
    .tag.orange { background: #fff3eb; color: var(--accent-dark); }
    .tag.yellow { background: #fdf3e0; color: #a06010; }
    .tag.neutral{ background: #f4f3ef; color: var(--muted); }
    .tag.red    { background: #fdeaea; color: #b82020; }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      border-radius: 10px;
      font-family: 'Outfit', sans-serif;
      font-size: .88rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all .15s;
      text-decoration: none;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-primary:hover { background: var(--dark-green); }

    .btn-ghost {
      background: none;
      border: 1.5px solid var(--border);
      color: var(--text);
    }

    .btn-ghost:hover { border-color: var(--primary); color: var(--primary); }

    .btn-sm { padding: 6px 12px; font-size: .8rem; border-radius: 8px; }

    .btn-danger {
      background: #fdeaea;
      color: #b82020;
      border: 1.5px solid #fca5a5;
    }

    .btn-danger:hover { background: #fca5a5; }

    /* Progress bar */
    .progress-wrap {
      background: #f0efeb;
      border-radius: 8px;
      height: 8px;
      overflow: hidden;
      margin-top: 8px;
    }

    .progress-bar {
      height: 100%;
      border-radius: 8px;
      background: linear-gradient(90deg, var(--primary), var(--dark-green));
      transition: width .4s ease;
    }

    /* Avatar chip */
    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: .8rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    /* Trust grade */
    .grade-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-weight: 800;
      font-size: .95rem;
    }

    .grade-badge.A { background: #e8f5ee; color: var(--primary); }
    .grade-badge.B { background: #fdf3e0; color: #a06010; }
    .grade-badge.C { background: #fdeaea; color: #b82020; }

    /* Divider */
    .divider { border: none; border-top: 1.5px solid var(--border); margin: 16px 0; }

    /* List items */
    .list-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }

    .list-item:last-child { border-bottom: none; }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 32px 16px;
      color: var(--muted);
      font-size: .9rem;
    }

    .empty-state .empty-icon {
      font-size: 2rem;
      margin-bottom: 8px;
    }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--ink);
      color: #fff;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: .88rem;
      font-weight: 500;
      z-index: 999;
      opacity: 0;
      transform: translateY(8px);
      transition: all .2s;
      pointer-events: none;
    }

    #toast.show { opacity: 1; transform: translateY(0); }

    /* Modal */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(13,21,32,.55);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    #modal-overlay.open { display: flex; }

    .modal {
      background: var(--white);
      border-radius: var(--r);
      padding: 28px;
      width: 100%;
      max-width: 480px;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
    }

    .modal-title {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 20px;
    }

    .form-group { margin-bottom: 16px; }

    .form-label {
      display: block;
      font-size: .85rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }

    .form-input,
    .form-select,
    .form-textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: 'Outfit', sans-serif;
      font-size: .9rem;
      color: var(--text);
      background: var(--white);
      outline: none;
      transition: border-color .15s;
    }

    .form-input:focus,
    .form-select:focus,
    .form-textarea:focus { border-color: var(--primary); }

    .form-textarea { min-height: 90px; resize: vertical; }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 20px;
    }

    .modal-close {
      position: absolute;
      top: 16px; right: 16px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 1.3rem;
      line-height: 1;
      padding: 4px;
    }

    /* Task item */
    .task-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }

    .task-item:last-child { border-bottom: none; }

    .task-checkbox {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 2px;
      transition: all .15s;
    }

    .task-checkbox.done {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    .task-body { flex: 1; min-width: 0; }

    .task-title {
      font-size: .9rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
    }

    .task-title.done-text {
      text-decoration: line-through;
      color: var(--muted);
    }

    .task-meta {
      font-size: .78rem;
      color: var(--muted);
      margin-top: 3px;
    }

    .task-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: var(--muted);
      border-radius: 6px;
      transition: all .15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-btn:hover { background: #f4f3ef; color: var(--text); }
    .icon-btn.danger:hover { background: #fdeaea; color: #b82020; }

    /* Filter pills */
    .filter-pills {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .pill {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: .8rem;
      font-weight: 600;
      cursor: pointer;
      border: 1.5px solid var(--border);
      background: var(--white);
      color: var(--muted);
      transition: all .15s;
    }

    .pill.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    /* Deadline timeline */
    .deadline-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 12px 0;
      position: relative;
    }

    .deadline-item:not(:last-child)::after {
      content: '';
      position: absolute;
      left: 19px;
      top: 44px;
      width: 2px;
      height: calc(100% - 12px);
      background: var(--border);
    }

    .deadline-dot {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: .62rem;
      font-weight: 700;
      line-height: 1.2;
      text-align: center;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }

    .deadline-dot.past    { background: #f0efeb; color: var(--muted); }
    .deadline-dot.today   { background: var(--accent); color: #fff; }
    .deadline-dot.soon    { background: #fdf3e0; color: #a06010; }
    .deadline-dot.future  { background: var(--blue-bg); color: var(--blue); }

    .deadline-body { flex: 1; padding-top: 8px; }
    .deadline-title { font-size: .9rem; font-weight: 600; color: var(--text); }
    .deadline-date  { font-size: .78rem; color: var(--muted); margin-top: 2px; }

    /* Leerdoel */
    .leerdoel-item {
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
    }

    .leerdoel-item:last-child { border-bottom: none; }

    .leerdoel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .leerdoel-name {
      font-size: .9rem;
      font-weight: 600;
      color: var(--text);
    }

    .leerdoel-pct {
      font-size: .82rem;
      font-weight: 700;
      color: var(--primary);
    }

    /* Reflectie */
    .reflectie-card {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--r);
      padding: 20px;
      margin-bottom: 12px;
    }

    .reflectie-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .reflectie-period {
      font-size: .88rem;
      font-weight: 600;
      color: var(--text);
    }

    .reflectie-date {
      font-size: .78rem;
      color: var(--muted);
    }

    .reflectie-text {
      font-size: .88rem;
      color: var(--text);
      line-height: 1.6;
    }

    /* Score bar */
    .score-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .score-label {
      font-size: .82rem;
      color: var(--muted);
      width: 120px;
      flex-shrink: 0;
    }

    .score-bar-wrap {
      flex: 1;
      background: #f0efeb;
      border-radius: 8px;
      height: 8px;
      overflow: hidden;
    }

    .score-bar-fill {
      height: 100%;
      border-radius: 8px;
      background: linear-gradient(90deg, var(--primary), var(--dark-green));
    }

    .score-val {
      font-size: .82rem;
      font-weight: 700;
      color: var(--text);
      width: 32px;
      text-align: right;
      flex-shrink: 0;
    }

    /* Log */
    .log-entry {
      display: flex;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      font-size: .85rem;
    }

    .log-entry:last-child { border-bottom: none; }

    .log-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border);
      margin-top: 6px;
      flex-shrink: 0;
    }

    .log-dot.green  { background: var(--primary); }
    .log-dot.blue   { background: var(--blue); }
    .log-dot.orange { background: var(--accent); }

    @media (max-width: 768px) {

      .hub-topbar-logo {

    /* ══════════════════════════════════════════════════════
       MEETING SCHEDULER — component CSS
       ══════════════════════════════════════════════════════ */

    /* Meeting card */
    .meeting-card {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: var(--r);
      padding: 20px;
      margin-bottom: 12px;
    }
    .meeting-card.geaccepteerd { border-left-color: var(--green); }
    .meeting-card.tegenbod     { border-left-color: var(--amber); }
    .meeting-card.afgewezen    { border-left-color: var(--red); }
    .meeting-card.geannuleerd  { border-left-color: var(--muted); opacity: .7; }

    .mcard-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }
    .mcard-title {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--ink);
    }
    .mcard-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      font-size: .82rem;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .mcard-meta span { display: flex; align-items: center; gap: 4px; }
    .mcard-note {
      font-size: .85rem;
      color: var(--muted);
      font-style: italic;
      margin: 10px 0;
      padding: 8px 12px;
      background: var(--bg);
      border-radius: 8px;
    }
    .mcard-confirmed {
      background: var(--green-bg);
      color: var(--green);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: .88rem;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .mcard-confirmed .mcard-contact {
      font-weight: 400;
      color: var(--muted);
      margin-top: 4px;
      font-size: .82rem;
    }

    /* Proposed time options */
    .meeting-dates-label {
      font-size: .78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
      margin: 10px 0 6px;
    }
    .meeting-time-opts { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
    .time-opt {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      font-size: .88rem;
      transition: all .14s;
      user-select: none;
    }
    .time-opt:hover { background: var(--bg); border-color: var(--primary); }
    .time-opt.selected { background: var(--green-bg); border-color: var(--green); color: var(--green); }
    .time-opt-radio {
      width: 14px; height: 14px;
      border-radius: 50%;
      border: 2px solid var(--border);
      flex-shrink: 0;
      transition: all .14s;
    }
    .time-opt.selected .time-opt-radio {
      background: var(--green);
      border-color: var(--green);
    }

    /* Counter proposal block */
    .counter-block {
      background: var(--amber-bg);
      border-radius: 10px;
      padding: 12px 14px;
      margin: 10px 0;
    }
    .counter-label { font-size: .78rem; font-weight: 600; color: var(--amber); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .05em; }
    .counter-time  { font-size: .92rem; font-weight: 600; color: var(--ink); }
    .counter-note  { font-size: .82rem; color: var(--muted); margin-top: 4px; font-style: italic; }

    /* Meeting actions row */
    .meeting-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }

    /* Inline counter form */
    .counter-form, .confirm-dialog {
      margin-top: 12px;
      padding: 14px;
      background: var(--bg);
      border-radius: 10px;
      border: 1.5px dashed var(--border);
    }
    .counter-form .form-row { margin-bottom: 10px; }
    .confirm-dialog { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .confirm-dialog span { font-size: .88rem; color: var(--ink); flex: 1; }

    /* Availability grid */
    .avail-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }
    .avail-day { display: flex; flex-direction: column; gap: 6px; }
    .avail-day-name {
      font-size: .75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
      text-align: center;
      padding-bottom: 4px;
      border-bottom: 1px solid var(--border);
    }
    .avail-slot {
      border-radius: 6px;
      padding: 6px 4px;
      font-size: .72rem;
      text-align: center;
      line-height: 1.3;
      font-weight: 500;
    }
    .avail-slot.beschikbaar { background: var(--green-bg); color: var(--green); }
    .avail-slot.voorkeur    { background: var(--amber-bg); color: var(--amber); }
    .avail-slot.bezet       { background: var(--red-bg);   color: var(--red);   opacity: .7; }
    .avail-empty            { font-size: .72rem; color: var(--muted); text-align: center; padding: 6px 0; }

    /* Avail edit rows (in modal) */
    .avail-edit-day { margin-bottom: 16px; }
    .avail-edit-day-label {
      font-weight: 600;
      font-size: .88rem;
      color: var(--ink);
      margin-bottom: 8px;
    }
    .avail-slot-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      flex-wrap: wrap;
    }
    .avail-slot-row select, .avail-slot-row input[type=time] {
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 5px 8px;
      font-family: 'Outfit', sans-serif;
      font-size: .85rem;
      color: var(--text);
      background: var(--white);
    }
    .avail-slot-row select { min-width: 120px; }

    /* Modal overlay + box */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 200;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px;
      overflow-y: auto;
    }
    .modal-box {
      background: var(--white);
      border-radius: var(--r);
      width: 100%;
      max-width: 720px;
      box-shadow: 0 24px 60px rgba(0,0,0,.18);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      border-bottom: 1.5px solid var(--border);
    }
    .modal-title {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--ink);
    }
    .modal-close {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.3rem;
      color: var(--muted);
      line-height: 1;
      padding: 4px 8px;
      border-radius: 6px;
    }
    .modal-close:hover { background: var(--bg); color: var(--ink); }
    .modal-body { padding: 24px; overflow-y: auto; max-height: calc(80vh - 140px); }
    .modal-footer {
      padding: 16px 24px;
      border-top: 1.5px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    /* Step indicator */
    .step-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
      font-size: .85rem;
      color: var(--muted);
    }
    .step-indicator .step {
      padding: 4px 12px;
      border-radius: 20px;
      font-weight: 600;
      background: var(--bg);
    }
    .step-indicator .step.active { background: var(--primary); color: #fff; }
    .step-indicator .sep { color: var(--border); }

    /* Form elements in modal */
    .form-row { margin-bottom: 14px; }
    .form-label {
      display: block;
      font-size: .82rem;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 5px;
    }
    .form-input, .form-select, .form-textarea {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 9px 12px;
      font-family: 'Outfit', sans-serif;
      font-size: .92rem;
      color: var(--text);
      background: var(--white);
      transition: border-color .14s;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      outline: none;
      border-color: var(--primary);
    }
    .form-textarea { resize: vertical; min-height: 72px; }

    /* Type radio group */
    .type-radio-group { display: flex; gap: 8px; flex-wrap: wrap; }
    .type-radio-option {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      font-size: .88rem;
      transition: all .14s;
      user-select: none;
    }
    .type-radio-option:hover { border-color: var(--primary); }
    .type-radio-option.selected { background: var(--green-bg); border-color: var(--green); color: var(--green); font-weight: 600; }
    .type-radio-option input { display: none; }

    /* Step 2 two-column layout */
    .modal-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 600px) { .modal-2col { grid-template-columns: 1fr; } }

    /* Time slot rows in step 2 */
    .time-slot-rows { display: flex; flex-direction: column; gap: 8px; margin-bottom: 8px; }
    .time-slot-row {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .time-slot-row input[type=date], .time-slot-row input[type=time] {
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 7px 10px;
      font-family: 'Outfit', sans-serif;
      font-size: .85rem;
      color: var(--text);
      background: var(--white);
    }
    .time-slot-row .slot-sep { font-size: .8rem; color: var(--muted); }

    /* Section headers inside tab */
    .afspraken-section { margin-bottom: 28px; }
    .afspraken-section-title {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: .9rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--muted);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .afspraken-section-title span { font-size: .75rem; }

    /* Empty state */
    .empty-state {
      padding: 24px;
      text-align: center;
      color: var(--muted);
      font-size: .88rem;
      border: 1.5px dashed var(--border);
      border-radius: var(--r);
    }

    /* Collapsible archief */
    .archief-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      font-size: .88rem;
      color: var(--muted);
      padding: 0;
    }
    .archief-toggle:hover { color: var(--ink); }

    @media print {
      #hub-topbar, #sidebar, #sidebar-overlay,
      #modal-overlay, #modal-root, #avail-modal-root,
      #toast, #role-picker, .role-switch-btn { display: none !important; }
      #main-content { margin-left: 0 !important; max-width: 100% !important; padding: 16px !important; }
      .hub-layout { padding-top: 0 !important; }
      #app-shell { display: block !important; }
    }

    /* ── Animaties & micro-interacties ── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
    @keyframes pageIn   { from{opacity:0;transform:translateY(8px);}  to{opacity:1;transform:translateY(0);} }
    @keyframes modalIn  { from{opacity:0;transform:scale(.96) translateY(8px);} to{opacity:1;transform:scale(1) translateY(0);} }
    @keyframes modalOut { from{opacity:1;transform:scale(1) translateY(0);} to{opacity:0;transform:scale(.96) translateY(8px);} }
    @keyframes sidebarIn{ from{opacity:0;transform:translateX(-8px);} to{opacity:1;transform:translateX(0);} }
    @keyframes barGrow  { from{width:0;} to{width:100%;} }
    @keyframes shakeIn  { 0%,100%{transform:translateX(0);}20%{transform:translateX(-5px);}40%{transform:translateX(5px);}60%{transform:translateX(-3px);}80%{transform:translateX(3px);} }

    body { animation: pageIn 0.32s ease both; }

    /* Modal entrance */
    #modal-overlay.open .modal,
    #modal-overlay.open .modal-box { animation: modalIn 0.22s ease both; }

    /* Card hover lift */
    .card  { transition: transform .18s ease, box-shadow .18s ease; }
    .card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,.08); }

    /* Progress bar */
    .progress-fill, .prog-fill { animation: barGrow 0.6s ease both; }

    /* Input focus glow */
    input:focus, textarea:focus, select:focus { box-shadow: 0 0 0 3px rgba(26,122,72,.15); }

    /* Shake on validation error */
    .shake { animation: shakeIn 0.3s ease; }
  </style>
</head>

function can(action) {
  return CAN[hubState.role]?.[action] ?? false;
}

function roleName() {
  return { student: match.student.name, bedrijf: match.company.name, school: match.school.name }[hubState.role] || hubState.role;
}

/* ── Bootstrap ──────────────────────────────────────────────────────────── */

function startHub(role) {
  hubState.role = role;
  document.getElementById('role-picker').style.display = 'none';
  document.getElementById('app-shell').style.display = 'block';
  updateRoleBadge();
  updateSidebarUser();
  updateTakenBadge();
  switchTab('overzicht');
}

function switchRole() {
  document.getElementById('role-picker').style.display = 'flex';
  document.getElementById('app-shell').style.display = 'none';
  hubState.role = null;
}

function updateRoleBadge() {
  const el = document.getElementById('role-badge-display');
  const labels = { student: '🎓 Student', bedrijf: '🏢 Bedrijf', school: '🏫 School' };
  el.textContent = labels[hubState.role] || '';
  el.className = `role-badge ${hubState.role}`;
}

function updateSidebarUser() {
  const el = document.getElementById('sidebar-user-info');
  const info = {
    student: `${match.student.name}<br>${match.student.opleiding}`,
    bedrijf: `${match.company.name}<br>${match.company.sector}`,
    school:  `${match.school.name}<br>${match.school.opleiding}`
  };
  el.innerHTML = info[hubState.role] || '';
}

function updateTakenBadge() {
  const role = hubState.role;
  const open = hubState.tasks.filter(t => t.status !== 'done' && (!role || t.assignee === role)).length;
  const badge = document.getElementById('sidebar-badge-taken');
  if (!badge) return;
  if (open > 0) {
    badge.textContent = open;
    badge.style.display = '';
  } else {
    badge.style.display = 'none';
  }
}

/* ── Tab routing ────────────────────────────────────────────────────────── */

function switchTab(tab) {
  hubState.currentTab = tab;
  closeSidebar();

  document.querySelectorAll('.sidebar-item[data-tab]').forEach(el => {
    el.classList.toggle('active', el.dataset.tab === tab);
  });

  const mc = document.getElementById('main-content');
  const renderers = {
    overzicht:  renderOverzicht,
    planning:   renderPlanning,
    taken:      renderTaken,
    voortgang:  renderVoortgang,
    afspraken:  renderAfspraken
  };
  mc.innerHTML = renderers[tab] ? renderers[tab]() : '<p>Onbekende tab.</p>';
  updateMeetingBadge();
}

/* ── Sidebar toggle ─────────────────────────────────────────────────────── */

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}

    const dDate = new Date(d.date); dDate.setHours(0, 0, 0, 0);
    const diffDays = Math.ceil((dDate - today) / 86400000);
    const dotClass = dDate < today ? 'past'
      : diffDays === 0 ? 'today'
      : diffDays <= 30 ? 'soon'
      : 'future';
    const monthAbbr = formatDateShort(d.date);

      <button class="icon-btn" title="Bewerken" onclick="openDeadlineModal('${d.id}')">

    <div class="filter-pills">
      <button class="pill ${takenFilter==='all'?'active':''}"     onclick="setTakenFilter('all')">Alle taken</button>

      <button class="pill ${takenFilter==='done'?'active':''}"    onclick="setTakenFilter('done')">Afgerond</button>

function renderTaskItem(t) {
  const isDone = t.status === 'done';
  const statusTag = isDone
    ? `<span class="tag green">Afgerond</span>`
    : t.status === 'in-progress'
      ? `<span class="tag yellow">Bezig</span>`
      : `<span class="tag neutral">Open</span>`;

  const assigneeTag = `<span class="tag ${t.assignee === 'student' ? 'blue' : t.assignee === 'bedrijf' ? 'green' : 'orange'}" style="margin-left:4px;">${t.assignee.charAt(0).toUpperCase()+t.assignee.slice(1)}</span>`;

  const checkboxHtml = can('checkTask') ? `
    <div class="task-checkbox ${isDone ? 'done' : ''}" onclick="toggleTaskDone(${t.id})" title="${isDone ? 'Markeer als open' : 'Markeer als afgerond'}">
      ${isDone ? `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5"><polyline points="20 6 9 17 4 12"/></svg>` : ''}
    </div>` : `<div style="width:20px;"></div>`;

  const editBtn = can('editTask') ? `
    <button class="icon-btn" title="Bewerken" onclick="openTaakModal(${t.id})">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    </button>` : '';

  const deleteBtn = can('deleteTask') ? `
    <button class="icon-btn danger" title="Verwijderen" onclick="deleteTask(${t.id})">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
    </button>` : '';

  return `
    <div class="task-item" id="task-${t.id}">
      ${checkboxHtml}
      <div class="task-body">
        <div class="task-title ${isDone ? 'done-text' : ''}">${escHtml(t.title)}</div>
        <div class="task-meta">
          Deadline: ${formatDate(t.deadline)} &nbsp;${statusTag}${assigneeTag}
        </div>
      </div>
      <div class="task-actions">
        ${editBtn}
        ${deleteBtn}
      </div>
    </div>`;
}

function setTakenFilter(f) {
  takenFilter = f;
  switchTab('taken');
}

function toggleTaskDone(id) {
  if (!can('checkTask')) return;
  const task = hubState.tasks.find(t => t.id === id);
  if (!task) return;
  task.status = task.status === 'done' ? 'todo' : 'done';
  const logMsg = task.status === 'done'
    ? `Taak "${task.title}" afgerond door ${roleName()}.`
    : `Taak "${task.title}" heropend.`;
  addLog(logMsg, 'green');
  updateTakenBadge();
  switchTab('taken');
  toast(task.status === 'done' ? 'Taak afgerond!' : 'Taak heropend.');
}

function deleteTask(id) {
  if (!can('deleteTask')) return;
  const task = hubState.tasks.find(t => t.id === id);
  if (!task) return;
  if (!confirm(`Weet je zeker dat je "${task.title}" wilt verwijderen?`)) return;
  hubState.tasks = hubState.tasks.filter(t => t.id !== id);
  addLog(`Taak "${task.title}" verwijderd.`, 'orange');
  updateTakenBadge();
  switchTab('taken');
  toast('Taak verwijderd.');
}

function openModal(html) {
  document.getElementById('modal-box').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  const overlay = document.getElementById('modal-overlay');
  const box = overlay.querySelector('.modal, .modal-box');
  if (box) {
    box.style.animation = 'modalOut .18s ease forwards';
    setTimeout(() => {
      overlay.classList.remove('open');
      box.style.animation = '';
    }, 175);
  } else {
    overlay.classList.remove('open');
  }
}

function closeModalOnOverlay(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

function saveTaak(id) {
  const title    = document.getElementById('m-task-title').value.trim();
  const desc     = document.getElementById('m-task-desc').value.trim();
  const deadline = document.getElementById('m-task-deadline').value;
  const assignee = document.getElementById('m-task-assignee').value;
  const status   = document.getElementById('m-task-status').value;

  if (!title) { alert('Geef een taakomschrijving op.'); return; }

  if (id) {
    const task = hubState.tasks.find(t => t.id === id);
    if (task) { task.title = title; task.desc = desc; task.deadline = deadline; task.assignee = assignee; task.status = status; }
    addLog(`Taak "${title}" bewerkt.`, 'blue');
    toast('Taak bijgewerkt!');
  } else {
    hubState.tasks.push({ id: hubState.nextId++, title, desc, deadline, assignee, status, maker: hubState.role });
    addLog(`Taak "${title}" toegevoegd door ${roleName()}.`, 'green');
    toast('Taak toegevoegd!');
  }

  updateTakenBadge();
  closeModal();
  switchTab('taken');
}

  toast('Uitnodiging verstuurd aan ' + match.school.name);
  switchTab('overzicht');

function addLog(msg, color) {
  const now = new Date();
  const time = now.toLocaleDateString('nl-NL', { day: 'numeric', month: 'short' }) + ', ' +
    now.toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit' });
  hubState.log.unshift({ id: 'lg' + hubState.nextId++, msg, time, color });
  if (hubState.log.length > 20) hubState.log.pop();
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2800);
}

function escHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function formatDate(dateStr) {
  if (!dateStr) return '—';
  const d = new Date(dateStr);
  return d.toLocaleDateString('nl-NL', { day: 'numeric', month: 'long', year: 'numeric' });
}

function formatDateShort(dateStr) {
  if (!dateStr) return '—';
  const d = new Date(dateStr);
  const parts = d.toLocaleDateString('nl-NL', { day: 'numeric', month: 'short' }).split(' ');
  return `<span>${parts[0]}</span><span>${parts[1] || ''}</span>`;
}

/* ── Transient state ─────────────────────────────────────────────── */
let selectedTimeOpts = {};   // meetingId → dateId
let newMeeting = {};         // form state across modal steps
let modalTimeSlots = [];     // [{date,from,to}] built in step 2
let archievedOpen = false;   // accordion state

/* ── Pure helpers ─────────────────────────────────────────────────── */
function typeIcon(type) {
  return { call: '📞', video: '🎥', fysiek: '🏢' }[type] || '📅';
}
function typeName(type) {
  return { call: 'Telefonisch gesprek', video: 'Videocall', fysiek: 'Fysiek gesprek' }[type] || type;
}
function statusTag(s) {
  return {
    openstaand:   { label: 'Openstaand',  cls: 'orange'  },
    geaccepteerd: { label: 'Bevestigd',   cls: 'green'   },
    tegenbod:     { label: 'Tegenbod 🟡', cls: 'yellow'  },
    afgewezen:    { label: 'Afgewezen',   cls: 'red'     },
    geannuleerd:  { label: 'Geannuleerd', cls: 'neutral' }
  }[s] || { label: s, cls: 'neutral' };
}
function formatMeetingDate(dateStr, from, to) {
  if (!dateStr) return '—';
  const d = new Date(dateStr);
  const day  = d.toLocaleDateString('nl-NL', { weekday: 'long' });
  const date = d.toLocaleDateString('nl-NL', { day: 'numeric', month: 'long' });
  return `${day[0].toUpperCase() + day.slice(1)} ${date} · ${from}–${to}`;
}
function roleDisplay(role) {
  return { student: match.student.name, bedrijf: match.company.name, school: match.school.name }[role] || role;
}
function roleLabel(role) {
  return { student: 'Student', bedrijf: 'Bedrijf', school: 'School' }[role] || role;
}
function receiverOf(m) {
  return m.toAll ? 'alle partijen' : roleDisplay(m.to);
}

/* ── Badge ────────────────────────────────────────────────────────── */
function updateMeetingBadge() {
  const role = hubState.role;
  if (!role) return;
  const count = hubState.meetings.filter(m => {
    if (m.status === 'openstaand' && (m.to === role || (m.toAll && m.from !== role))) return true;
    if (m.status === 'tegenbod'   && m.from === role)             return true;
    return false;
  }).length;
  const badge = document.getElementById('sidebar-badge-afspraken');
  if (!badge) return;
  if (count > 0) { badge.textContent = count; badge.style.display = ''; }
  else           { badge.style.display = 'none'; }
}

/* ── Availability grid (read-only or read-write) ─────────────────── */
function renderAvailabilityGrid(role, readonly) {
  const days = ['maandag','dinsdag','woensdag','donderdag','vrijdag'];
  const slots = hubState.availability[role]?.slots || [];
  const cols  = days.map(day => {
    const daySlots = slots.filter(s => s.day === day);
    if (daySlots.length === 0) {
      return `<div class="avail-day">
        <div class="avail-day-name">${day.slice(0,2).toUpperCase()}</div>
        <div class="avail-empty">—</div>
      </div>`;
    }
    const slotsHtml = daySlots.map(s => `
      <div class="avail-slot ${s.type}">
        ${s.type === 'bezet' ? 'Bezet' : `${s.from}–${s.to}`}
      </div>`).join('');
    return `<div class="avail-day">
      <div class="avail-day-name">${day.slice(0,2).toUpperCase()}</div>
      ${slotsHtml}
    </div>`;
  });
  return `<div class="avail-grid">${cols.join('')}</div>`;
}

/* ── Meeting card ─────────────────────────────────────────────────── */
function renderMeetingCard(m) {
  const role = hubState.role;
  const st   = statusTag(m.status);
  const isReceiver = m.to === role || (m.toAll && m.from !== role);
  const isSender   = m.from === role;

  // Confirmed date display
  let confirmedHtml = '';
  if (m.status === 'geaccepteerd') {
    let dateLabel = '—';
    if (m.counterProposal && m.selectedDate === 'counter') {
      dateLabel = formatMeetingDate(m.counterProposal.date, m.counterProposal.from, m.counterProposal.to);
    } else if (m.selectedDate) {
      const pd = m.proposedDates.find(d => d.id === m.selectedDate);
      if (pd) dateLabel = formatMeetingDate(pd.date, pd.from, pd.to);
    }
    confirmedHtml = `<div class="mcard-confirmed">
      ✓ ${escHtml(dateLabel)}
      <div class="mcard-contact">${typeIcon(m.type)} ${escHtml(m.contactInfo)}</div>
    </div>`;
  }

  // Proposed dates (radio-like) for pending meetings received by current role
  let datesHtml = '';
  if (['openstaand'].includes(m.status) && isReceiver && m.proposedDates.length > 0) {
    const opts = m.proposedDates.map(pd => {
      const sel = selectedTimeOpts[m.id] === pd.id;
      return `<div class="time-opt${sel ? ' selected' : ''}" id="topt-${m.id}-${pd.id}"
        onclick="selectTimeOpt(${m.id}, ${pd.id})">
        <span class="time-opt-radio"></span>
        <span>${formatMeetingDate(pd.date, pd.from, pd.to)}</span>
      </div>`;
    }).join('');
    datesHtml = `<div class="meeting-dates-label">Voorgestelde tijdstippen:</div>
      <div class="meeting-time-opts">${opts}</div>`;
  } else if (m.status === 'openstaand' && isSender && m.proposedDates.length > 0) {
    const opts = m.proposedDates.map(pd =>
      `<div style="font-size:.85rem;color:var(--muted);padding:4px 0">
        ○ ${formatMeetingDate(pd.date, pd.from, pd.to)}
      </div>`).join('');
    datesHtml = `<div class="meeting-dates-label">Jouw voorgestelde tijdstippen:</div>${opts}`;
  }

  // Counter proposal
  let counterHtml = '';
  if (m.status === 'tegenbod' && m.counterProposal) {
    const cp    = m.counterProposal;
    const cFrom = m.to === role ? roleDisplay(m.from) : roleDisplay(m.to);
    counterHtml = `<div class="counter-block">
      <div class="counter-label">Tegenbod van ${escHtml(cFrom)}:</div>
      <div class="counter-time">${formatMeetingDate(cp.date, cp.from, cp.to)}</div>
      ${cp.note ? `<div class="counter-note">"${escHtml(cp.note)}"</div>` : ''}
    </div>`;
  }

  // Action buttons
  let actionsHtml = '';
  if (m.status === 'openstaand' && isReceiver) {
    const sel = !!selectedTimeOpts[m.id];
    actionsHtml = `
      <div class="meeting-actions">
        <button class="btn btn-primary btn-sm" id="accept-btn-${m.id}"
          ${sel ? '' : 'disabled style="opacity:.4;cursor:not-allowed"'}
          onclick="acceptMeeting(${m.id})">✓ Accepteren</button>
        <button class="btn btn-ghost btn-sm" onclick="openCounterForm(${m.id})">↩ Tegenbod</button>
        <button class="btn btn-danger btn-sm" onclick="confirmDecline(${m.id})">✕ Afwijzen</button>
      </div>
      <div id="counter-form-${m.id}" class="counter-form" style="display:none">
        <div class="form-row">
          <label class="form-label">Alternatieve datum</label>
          <input type="date" class="form-input" id="cf-date-${m.id}">
        </div>
        <div style="display:flex;gap:8px;margin-bottom:10px">
          <div style="flex:1"><label class="form-label">Van</label>
            <input type="time" class="form-input" id="cf-from-${m.id}" value="10:00"></div>
          <div style="flex:1"><label class="form-label">Tot</label>
            <input type="time" class="form-input" id="cf-to-${m.id}" value="11:00"></div>
        </div>
        <div class="form-row">
          <label class="form-label">Toelichting (optioneel)</label>
          <textarea class="form-textarea" id="cf-note-${m.id}" rows="2"
            placeholder="Bijv. dinsdag lukt niet, kan het woensdag?"></textarea>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-primary btn-sm" onclick="submitCounter(${m.id})">Tegenbod versturen</button>
          <button class="btn btn-ghost btn-sm"
            onclick="document.getElementById('counter-form-${m.id}').style.display='none'">Annuleren</button>
        </div>
      </div>
      <div id="confirm-decline-${m.id}" class="confirm-dialog" style="display:none">
        <span>Weet je zeker dat je dit verzoek <strong>afwijst</strong>?</span>
        <button class="btn btn-danger btn-sm" onclick="declineMeeting(${m.id})">Ja, afwijzen</button>
        <button class="btn btn-ghost btn-sm"
          onclick="document.getElementById('confirm-decline-${m.id}').style.display='none'">Nee, terug</button>
      </div>`;

  } else if (m.status === 'openstaand' && isSender) {
    actionsHtml = `
      <div class="meeting-actions">
        <button class="btn btn-ghost btn-sm" onclick="confirmCancel(${m.id})">✕ Verzoek annuleren</button>
      </div>
      <div id="confirm-cancel-${m.id}" class="confirm-dialog" style="display:none">
        <span>Weet je zeker dat je dit verzoek <strong>annuleert</strong>?</span>
        <button class="btn btn-danger btn-sm" onclick="cancelMeeting(${m.id})">Ja, annuleren</button>
        <button class="btn btn-ghost btn-sm"
          onclick="document.getElementById('confirm-cancel-${m.id}').style.display='none'">Nee, terug</button>
      </div>`;

  } else if (m.status === 'tegenbod' && isSender) {
    actionsHtml = `
      <div class="meeting-actions">
        <button class="btn btn-primary btn-sm" onclick="acceptCounter(${m.id})">✓ Accepteer tegenbod</button>
        <button class="btn btn-ghost btn-sm" onclick="confirmCancel(${m.id})">✕ Verzoek annuleren</button>
      </div>
      <div id="confirm-cancel-${m.id}" class="confirm-dialog" style="display:none">
        <span>Weet je zeker dat je dit verzoek <strong>annuleert</strong>?</span>
        <button class="btn btn-danger btn-sm" onclick="cancelMeeting(${m.id})">Ja, annuleren</button>
        <button class="btn btn-ghost btn-sm"
          onclick="document.getElementById('confirm-cancel-${m.id}').style.display='none'">Nee, terug</button>
      </div>`;

  } else if (m.status === 'geaccepteerd' && isSender) {
    actionsHtml = `<div class="meeting-actions">
      <button class="btn btn-ghost btn-sm" onclick="confirmCancel(${m.id})">✕ Annuleren</button>
    </div>
    <div id="confirm-cancel-${m.id}" class="confirm-dialog" style="display:none">
      <span>Weet je zeker dat je deze afspraak <strong>annuleert</strong>?</span>
      <button class="btn btn-danger btn-sm" onclick="cancelMeeting(${m.id})">Ja, annuleren</button>
      <button class="btn btn-ghost btn-sm"
        onclick="document.getElementById('confirm-cancel-${m.id}').style.display='none'">Nee, terug</button>
    </div>`;
  }

  return `<div class="meeting-card ${m.status}" id="mcard-${m.id}">
    <div class="mcard-head">
      <div class="mcard-title">📅 ${escHtml(m.subject)}</div>
      <span class="tag ${st.cls}">${st.label}</span>
    </div>
    <div class="mcard-meta">
      <span>Van: ${escHtml(roleDisplay(m.from))} (${roleLabel(m.from)})</span>
      <span>${typeIcon(m.type)} ${typeName(m.type)}</span>
      ${m.status === 'geaccepteerd' ? '' : `<span title="contactgegevens">🔒 Zichtbaar na bevestiging</span>`}
    </div>
    <hr class="divider">
    ${confirmedHtml}
    ${datesHtml}
    ${counterHtml}
    ${m.note ? `<div class="mcard-note">"${escHtml(m.note)}"</div>` : ''}
    ${actionsHtml}
    <div style="font-size:.75rem;color:var(--muted);margin-top:10px">Aangemaakt: ${escHtml(m.createdAt)}</div>
  </div>`;
}

/* ── Main tab renderer ────────────────────────────────────────────── */
function renderAfspraken() {
  const role = hubState.role;

  const roleInvolved = m => m.to === role || m.from === role || (m.toAll && m.from !== role);

  const accepted  = hubState.meetings.filter(m => m.status === 'geaccepteerd' && roleInvolved(m));
  const pending   = hubState.meetings.filter(m =>
    (m.status === 'openstaand' || m.status === 'tegenbod') && roleInvolved(m)
  );
  const archived  = hubState.meetings.filter(m =>
    (m.status === 'afgewezen' || m.status === 'geannuleerd') && roleInvolved(m)
  );

  const acceptedHtml = accepted.length === 0
    ? '<div class="empty-state">Geen aankomende bevestigde afspraken.</div>'
    : accepted.map(m => renderMeetingCard(m)).join('');

  const pendingHtml = pending.length === 0
    ? '<div class="empty-state">Geen openstaande verzoeken.</div>'
    : pending.map(m => renderMeetingCard(m)).join('');

  const archivedHtml = archived.length === 0
    ? '<div class="empty-state" style="font-size:.82rem">Geen afgeronde of geannuleerde afspraken.</div>'
    : archived.map(m => renderMeetingCard(m)).join('');

  const availLabel = ['Mijn beschikbaarheid', `(${roleDisplay(role)})`].join(' ');

  return `
    <div class="page-head">
      <div>
        <div class="page-title">📅 Afspraken</div>
        <div class="page-sub">Verzoeken en beschikbaarheid voor deze stage</div>
      </div>
      <button class="btn btn-primary" onclick="openMeetingModal()">+ Nieuw verzoek</button>
    </div>

    <div class="afspraken-section">
      <div class="afspraken-section-title">Aankomende afspraken <span class="tag green">${accepted.length}</span></div>
      ${acceptedHtml}
    </div>

    <div class="afspraken-section">
      <div class="afspraken-section-title">Openstaande verzoeken <span class="tag orange">${pending.length}</span></div>
      ${pendingHtml}
    </div>

    <div class="afspraken-section">
      <div class="card">
        <div class="card-head">
          <div>
            <div class="card-title">🗓 ${escHtml(availLabel)}</div>
            <div class="card-sub">Jouw beschikbaarheid per dag van de week</div>
          </div>
          <button class="btn btn-ghost btn-sm" onclick="openAvailModal()">⚙ Bewerken</button>
        </div>
        ${renderAvailabilityGrid(role, true)}
      </div>
    </div>

    <div class="afspraken-section">
      <button class="archief-toggle" onclick="toggleArchief()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="${archievedOpen ? '18 15 12 9 6 15' : '6 9 12 15 18 9'}"/>
        </svg>
        Archief (${archived.length})
      </button>
      ${archievedOpen ? `<div style="margin-top:12px">${archivedHtml}</div>` : ''}
    </div>`;
}

function toggleArchief() {
  archievedOpen = !archievedOpen;
  switchTab('afspraken');
}

/* ── Time option selection ────────────────────────────────────────── */
function selectTimeOpt(meetingId, dateId) {
  selectedTimeOpts[meetingId] = dateId;
  // Re-render the tab so the selection state and button disabled state update
  switchTab('afspraken');
}

/* ── Accept ───────────────────────────────────────────────────────── */
function acceptMeeting(id) {
  const m = hubState.meetings.find(m => m.id === id);
  if (!m) return;
  const dateId = selectedTimeOpts[id];
  if (!dateId) return;
  m.status       = 'geaccepteerd';
  m.selectedDate = dateId;
  m.updatedAt    = nowStr();
  const pd = m.proposedDates.find(d => d.id === dateId);
  const dateLabel = pd ? formatMeetingDate(pd.date, pd.from, pd.to) : '';
  addLog(`${roleDisplay(hubState.role)} heeft het meeting-verzoek geaccepteerd — ${dateLabel}`, 'green');
  toast(`✓ Afspraak bevestigd — ${dateLabel}`);
  delete selectedTimeOpts[id];
  switchTab('afspraken');
}

/* ── Counter ──────────────────────────────────────────────────────── */
function openCounterForm(id) {
  const el = document.getElementById(`counter-form-${id}`);
  if (el) el.style.display = el.style.display === 'none' ? '' : 'none';
}

function submitCounter(id) {
  const date = document.getElementById(`cf-date-${id}`)?.value;
  const from = document.getElementById(`cf-from-${id}`)?.value;
  const to   = document.getElementById(`cf-to-${id}`)?.value;
  const note = document.getElementById(`cf-note-${id}`)?.value || '';
  if (!date || !from || !to) { alert('Vul datum en tijden in.'); return; }
  const m = hubState.meetings.find(m => m.id === id);
  if (!m) return;
  m.status          = 'tegenbod';
  m.counterProposal = { date, from, to, note };
  m.updatedAt       = nowStr();
  addLog(`${roleDisplay(hubState.role)} heeft een tegenbod gedaan op "${m.subject}"`, 'orange');
  toast(`${roleDisplay(hubState.role)} stelt een andere tijd voor`);
  switchTab('afspraken');
}

/* ── Decline ──────────────────────────────────────────────────────── */
function confirmDecline(id) {
  const el = document.getElementById(`confirm-decline-${id}`);
  if (el) el.style.display = '';
}

function declineMeeting(id) {
  const m = hubState.meetings.find(m => m.id === id);
  if (!m) return;
  m.status    = 'afgewezen';
  m.updatedAt = nowStr();
  addLog(`${roleDisplay(hubState.role)} heeft het meeting-verzoek "${m.subject}" afgewezen`, 'red');
  toast('Verzoek afgewezen');
  switchTab('afspraken');
}

/* ── Cancel ───────────────────────────────────────────────────────── */
function confirmCancel(id) {
  const el = document.getElementById(`confirm-cancel-${id}`);
  if (el) el.style.display = '';
}

function cancelMeeting(id) {
  const m = hubState.meetings.find(m => m.id === id);
  if (!m || m.from !== hubState.role) return;
  m.status    = 'geannuleerd';
  m.updatedAt = nowStr();
  addLog(`${roleDisplay(hubState.role)} heeft het meeting-verzoek "${m.subject}" geannuleerd`, 'orange');
  toast('Verzoek geannuleerd');
  switchTab('afspraken');
}

/* ── Accept counter proposal ──────────────────────────────────────── */
function acceptCounter(id) {
  const m = hubState.meetings.find(m => m.id === id);
  if (!m || !m.counterProposal) return;
  m.status       = 'geaccepteerd';
  m.selectedDate = 'counter';
  m.updatedAt    = nowStr();
  const cp        = m.counterProposal;
  const dateLabel = formatMeetingDate(cp.date, cp.from, cp.to);
  addLog(`${roleDisplay(hubState.role)} heeft het tegenbod geaccepteerd — ${dateLabel}`, 'green');
  toast(`✓ Afspraak bevestigd — ${dateLabel}`);
  switchTab('afspraken');
}

/* ── Meeting request modal ────────────────────────────────────────── */
function openMeetingModal() {
  newMeeting    = { type: 'video' };
  modalTimeSlots = [{ date: '', from: '10:00', to: '11:00' }];
  renderModalStep1();
  document.getElementById('modal-root').style.display = 'flex';
}

function closeMeetingModal() {
  document.getElementById('modal-root').style.display = 'none';
}

function renderModalStep1() {
  const role   = hubState.role;
  const others = ['student', 'bedrijf', 'school'].filter(r => r !== role);
  const toOpts = others.map(r =>
    `<option value="${r}" ${newMeeting.to === r ? 'selected' : ''}>${roleDisplay(r)} (${roleLabel(r)})</option>`
  ).join('');
  const toAllOpt = `<option value="all" ${newMeeting.to === 'all' ? 'selected' : ''}>Alle partijen</option>`;

  const typeOptions = ['call','video','fysiek'].map(t => `
    <label class="type-radio-option${newMeeting.type === t ? ' selected' : ''}">
      <input type="radio" name="mtype" value="${t}" ${newMeeting.type === t ? 'checked' : ''}
        onchange="newMeeting.type='${t}'; this.closest('.modal-body').querySelector('.contact-label').textContent=contactLabel('${t}'); document.querySelectorAll('.type-radio-option').forEach(el=>el.classList.remove('selected')); this.closest('.type-radio-option').classList.add('selected')">
      ${typeIcon(t)} ${typeName(t)}
    </label>`).join('');

  document.getElementById('modal-inner').innerHTML = `
    <div class="modal-header">
      <div class="modal-title">Afspraak verzoeken</div>
      <button class="modal-close" onclick="closeMeetingModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="step-indicator">
        <span class="step active">① Details</span>
        <span class="sep">→</span>
        <span class="step">② Tijdstip</span>
      </div>
      <div class="form-row">
        <label class="form-label">Aan</label>
        <select class="form-select" id="m-to" onchange="newMeeting.to=this.value">
          <option value="">— Kies ontvanger —</option>
          ${toOpts}${toAllOpt}
        </select>
      </div>
      <div class="form-row">
        <label class="form-label">Onderwerp</label>
        <input type="text" class="form-input" id="m-subject" maxlength="80"
          placeholder="Bijv. Voortgangsgesprek week 4"
          value="${escHtml(newMeeting.subject || '')}"
          oninput="newMeeting.subject=this.value">
      </div>
      <div class="form-row">
        <label class="form-label">Type gesprek</label>
        <div class="type-radio-group">${typeOptions}</div>
      </div>
      <div class="form-row">
        <label class="form-label contact-label">${contactLabel(newMeeting.type)}</label>
        <input type="text" class="form-input" id="m-contact"
          value="${escHtml(newMeeting.contactInfo || '')}"
          oninput="newMeeting.contactInfo=this.value">
      </div>
      <div class="form-row">
        <label class="form-label">Toelichting (optioneel)</label>
        <textarea class="form-textarea" id="m-note" rows="3"
          oninput="newMeeting.note=this.value">${escHtml(newMeeting.note || '')}</textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeMeetingModal()">Annuleren</button>
      <button class="btn btn-primary" onclick="nextStep()">Volgende →</button>
    </div>`;
}

function contactLabel(type) {
  return { call: 'Telefoonnummer', video: 'Vergaderlink (Meet / Teams / Zoom)', fysiek: 'Adres of locatie' }[type] || 'Contactgegevens';
}

function nextStep() {
  const to      = document.getElementById('m-to')?.value;
  const subject = document.getElementById('m-subject')?.value?.trim();
  const contact = document.getElementById('m-contact')?.value?.trim();
  if (!to || !subject || !contact) {
    alert('Vul alle verplichte velden in (Aan, Onderwerp, Contactgegevens).'); return;
  }
  newMeeting.to          = to;
  newMeeting.subject     = subject;
  newMeeting.contactInfo = contact;
  newMeeting.note        = document.getElementById('m-note')?.value || '';
  renderModalStep2();
}

function renderModalStep2() {
  const receiver = newMeeting.to === 'all'
    ? 'alle partijen'
    : roleDisplay(newMeeting.to);

  const availRole = newMeeting.to === 'all' ? 'student' : newMeeting.to;
  const availGrid = renderAvailabilityGrid(availRole, true);

  const slotRows = () => modalTimeSlots.map((s, i) => `
    <div class="time-slot-row" id="tsrow-${i}">
      <input type="date" value="${s.date}" onchange="modalTimeSlots[${i}].date=this.value">
      <span class="slot-sep">van</span>
      <input type="time" value="${s.from}" onchange="modalTimeSlots[${i}].from=this.value">
      <span class="slot-sep">tot</span>
      <input type="time" value="${s.to}"   onchange="modalTimeSlots[${i}].to=this.value">
      ${modalTimeSlots.length > 1
        ? `<button class="btn btn-ghost btn-sm" onclick="removeTimeSlot(${i})" style="padding:4px 8px">✕</button>`
        : ''}
    </div>`).join('');

  document.getElementById('modal-inner').innerHTML = `
    <div class="modal-header">
      <div class="modal-title">Afspraak verzoeken</div>
      <button class="modal-close" onclick="closeMeetingModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="step-indicator">
        <span class="step">① Details</span>
        <span class="sep">→</span>
        <span class="step active">② Tijdstip</span>
      </div>
      <div class="modal-2col">
        <div>
          <div class="form-label" style="margin-bottom:10px">Stel tijdstippen voor (max. 3)</div>
          <div class="time-slot-rows" id="time-slot-rows">${slotRows()}</div>
          ${modalTimeSlots.length < 3
            ? `<button class="btn btn-ghost btn-sm" onclick="addTimeSlot()">+ Tijdstip toevoegen</button>`
            : ''}
        </div>
        <div>
          <div class="form-label" style="margin-bottom:10px">Beschikbaarheid van ${escHtml(receiver)}</div>
          ${availGrid}
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="renderModalStep1()">← Terug</button>
      <button class="btn btn-primary" onclick="saveMeeting()">Verzoek versturen →</button>
    </div>`;
}

function addTimeSlot() {
  if (modalTimeSlots.length >= 3) return;
  modalTimeSlots.push({ date: '', from: '10:00', to: '11:00' });
  renderModalStep2();
}

function removeTimeSlot(idx) {
  modalTimeSlots.splice(idx, 1);
  renderModalStep2();
}

function saveMeeting() {
  const filled = modalTimeSlots.filter(s => s.date && s.from && s.to);
  if (filled.length === 0) { alert('Voeg minimaal één tijdstip toe.'); return; }
  const now = new Date();
  const timeStr = now.toLocaleDateString('nl-NL', { day: 'numeric', month: 'short' }) + ', ' +
    now.toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit' });
  const m = {
    id:            hubState.nextMeetingId++,
    from:          hubState.role,
    to:            newMeeting.to === 'all' ? '' : newMeeting.to,
    toAll:         newMeeting.to === 'all',
    subject:       newMeeting.subject,
    type:          newMeeting.type,
    contactInfo:   newMeeting.contactInfo,
    proposedDates: filled.map((s, i) => ({ id: i + 1, date: s.date, from: s.from, to: s.to })),
    selectedDate:  null,
    status:        'openstaand',
    counterProposal: null,
    note:          newMeeting.note || '',
    createdAt:     timeStr,
    updatedAt:     timeStr,
    seenBy:        [hubState.role]
  };
  hubState.meetings.unshift(m);
  const receiverLabel = newMeeting.to === 'all' ? 'alle partijen' : roleDisplay(newMeeting.to);
  addLog(`${roleDisplay(hubState.role)} heeft een ${typeName(m.type).toLowerCase()}-verzoek verstuurd aan ${receiverLabel}`, 'blue');
  toast(`Verzoek verstuurd aan ${receiverLabel}`);
  closeMeetingModal();
  switchTab('afspraken');
}

/* ── Availability modal ───────────────────────────────────────────── */
function openAvailModal() {
  renderAvailModal();
  document.getElementById('avail-modal-root').style.display = 'flex';
}

function closeAvailModal() {
  document.getElementById('avail-modal-root').style.display = 'none';
}

function renderAvailModal() {
  const role  = hubState.role;
  const days  = ['maandag','dinsdag','woensdag','donderdag','vrijdag'];
  const slots = hubState.availability[role]?.slots || [];

  const dayRows = days.map(day => {
    const daySlots = slots.filter(s => s.day === day);
    const dayIdx   = days.indexOf(day);
    const slotsHtml = daySlots.map((s, si) => `
      <div class="avail-slot-row" id="asr-${dayIdx}-${si}">
        <select onchange="updateAvailSlot('${day}', ${si}, 'type', this.value)">
          <option value="beschikbaar" ${s.type==='beschikbaar'?'selected':''}>Beschikbaar</option>
          <option value="voorkeur"    ${s.type==='voorkeur'   ?'selected':''}>Voorkeur</option>
          <option value="bezet"       ${s.type==='bezet'      ?'selected':''}>Bezet</option>
        </select>
        ${s.type !== 'bezet' ? `
          <input type="time" value="${s.from}" onchange="updateAvailSlot('${day}', ${si}, 'from', this.value)">
          <span style="font-size:.8rem;color:var(--muted)">–</span>
          <input type="time" value="${s.to}"   onchange="updateAvailSlot('${day}', ${si}, 'to', this.value)">
        ` : ''}
        <button class="btn btn-ghost btn-sm" style="padding:4px 8px"
          onclick="removeAvailSlot('${day}', ${si})">✕</button>
      </div>`).join('');

    return `<div class="avail-edit-day">
      <div class="avail-edit-day-label">${day[0].toUpperCase() + day.slice(1)}</div>
      <div id="avail-slots-${dayIdx}">${slotsHtml}</div>
      <button class="btn btn-ghost btn-sm" style="margin-top:4px"
        onclick="addAvailSlot('${day}')">+ Blok toevoegen</button>
    </div>`;
  }).join('');

  document.getElementById('avail-modal-inner').innerHTML = `
    <div class="modal-header">
      <div class="modal-title">Beschikbaarheid instellen</div>
      <button class="modal-close" onclick="closeAvailModal()">✕</button>
    </div>
    <div class="modal-body">${dayRows}</div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeAvailModal()">Annuleren</button>
      <button class="btn btn-primary" onclick="saveAvailability()">Opslaan</button>
    </div>`;
}

function updateAvailSlot(day, idx, field, value) {
  const role  = hubState.role;
  const slots = hubState.availability[role].slots;
  const s     = slots.filter(sl => sl.day === day)[idx];
  if (s) { s[field] = value; renderAvailModal(); }
}

function addAvailSlot(day) {
  const role = hubState.role;
  hubState.availability[role].slots.push({
    id: Date.now(), day, from: '09:00', to: '17:00', type: 'beschikbaar'
  });
  renderAvailModal();
}

function removeAvailSlot(day, idx) {
  const role  = hubState.role;
  const slots = hubState.availability[role].slots;
  const daySlots = slots.filter(s => s.day === day);
  if (daySlots[idx]) {
    const globalIdx = slots.indexOf(daySlots[idx]);
    slots.splice(globalIdx, 1);
  }
  renderAvailModal();
}

function saveAvailability() {
  const role  = hubState.role;
  const slots = hubState.availability[role]?.slots || [];
  const invalid = slots.filter(s => !s.from || !s.to || s.from >= s.to);
  if (invalid.length > 0) {
    alert('Controleer de tijden: elk blok moet een geldige van–tot hebben (van < tot).');
    return;
  }
  addLog(`${roleDisplay(role)} heeft beschikbaarheid bijgewerkt.`, 'blue');
  toast('Beschikbaarheid bijgewerkt');
  closeAvailModal();
  switchTab('afspraken');
}

/* ── CSV Export ───────────────────────────────────────────────────── */
function exportCSV() {
  const csv = rows => rows.map(r => r.map(c => `"${String(c ?? '').replace(/"/g, '""')}"`).join(',')).join('\n');
  const statusNl = s => ({ done: 'Afgerond', 'in-progress': 'Bezig', todo: 'Open' }[s] || s);
  const rows = [
    ['Type', 'Omschrijving', 'Datum / Details', 'Status', 'Partij'],
    ['', '=== STAGEGEGEVENS ===', '', '', ''],
    ['Stage',   match.company.vacature,  `${match.company.start} – ${match.company.eind}`, 'Lopend', 'Alle partijen'],
    ['Student', match.student.name,       match.student.opleiding, '', 'Student'],
    ['Bedrijf', match.company.name,        match.company.sector,   '', 'Bedrijf'],
    ['School',  match.school.name,         match.school.opleiding, '', 'School'],
    ['', '=== LEERDOELEN ===', '', '', ''],
    ...hubState.leerdoelen.map(l => [
      'Leerdoel', l.title,
      l.progress + '%' + (l.notes ? ' — ' + l.notes : ''),
      l.progress >= 60 ? 'Op schema' : l.progress >= 35 ? 'In ontwikkeling' : 'Aandacht nodig',
      match.student.name
    ]),
    ['', '=== PLANNING ===', '', '', ''],
    ...hubState.deadlines.map(d => ['Deadline', d.title, d.date, '', 'Alle partijen']),
    ['', '=== TAKEN ===', '', '', ''],
    ...hubState.tasks.map(t => ['Taak', t.title, t.deadline || '', statusNl(t.status), t.assignee]),
    ['', '=== AFSPRAKEN ===', '', '', ''],
    ...hubState.meetings.map(m => {
      const pd = m.selectedDate && m.selectedDate !== 'counter'
        ? m.proposedDates.find(d => d.id === m.selectedDate) : null;
      const dt = pd ? `${pd.date} ${pd.from}–${pd.to}`
        : m.counterProposal ? `${m.counterProposal.date} ${m.counterProposal.from}–${m.counterProposal.to}`
        : '—';
      return ['Afspraak', m.subject, dt, m.status, `${m.from} → ${m.toAll ? 'alle' : m.to}`];
    }),
  ];
  const blob = new Blob(['\uFEFF' + csv(rows)], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = `stageplan-${match.student.name.replace(/ /g, '-')}-${new Date().toISOString().split('T')[0]}.csv`;
  link.click();
  toast('CSV gedownload');
}

/* ── PDF Export ───────────────────────────────────────────────────── */
function exportPDF() {
  if (typeof window.jspdf === 'undefined') {
    toast('PDF-bibliotheek niet geladen — gebruik Ctrl+P om af te drukken');
    window.print();
    return;
  }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const margin = 14;
  let y = 18;

  const guard   = () => { if (y > 270) { doc.addPage(); y = margin; } };
  const section = title => {
    guard();
    doc.setFont('helvetica', 'bold'); doc.setFontSize(10);
    doc.setFillColor(244, 243, 239);
    doc.rect(margin, y - 4, 182, 8, 'F');
    doc.text(title, margin + 2, y); y += 9;
    doc.setFont('helvetica', 'normal'); doc.setFontSize(9);
  };
  const line = (label, val) => {
    guard();
    doc.setFont('helvetica', 'bold'); doc.setFontSize(8.5);
    doc.text(label + ':', margin, y);
    doc.setFont('helvetica', 'normal');
    const wrapped = doc.splitTextToSize(String(val ?? '—'), 140);
    doc.text(wrapped, 52, y);
    y += wrapped.length * 5 + 2;
  };

  // Header
  doc.setFont('helvetica', 'bold'); doc.setFontSize(14);
  doc.text('Stage Hub — Internly', margin, y); y += 7;
  doc.setFont('helvetica', 'normal'); doc.setFontSize(9);
  doc.setTextColor(100);
  doc.text(`${match.student.name} × ${match.company.name} — ${match.company.vacature}`, margin, y); y += 5;
  doc.text(`${match.company.start} – ${match.company.eind} | ${match.company.duur}`, margin, y); y += 10;
  doc.setTextColor(0);

  section('Stagegegevens');
  line('Student',   match.student.name);
  line('Opleiding', match.student.opleiding);
  line('Bedrijf',   match.company.name);
  line('Sector',    match.company.sector);
  line('School',    `${match.school.name} (${match.school.opleiding})`);
  y += 3;

  section('Leerdoelen & Voortgang');
  hubState.leerdoelen.forEach(l => {
    line(l.title, `${l.progress}%${l.notes ? ' — ' + l.notes : ''}`);
  });
  y += 3;

  section('Planning & Deadlines');
  hubState.deadlines.forEach(d => { line(d.title, d.date); });
  y += 3;

  section('Taken');
  const statusNl = s => ({ done: 'Afgerond', 'in-progress': 'Bezig', todo: 'Open' }[s] || s);
  hubState.tasks.forEach(t => {
    line(t.title, `${t.assignee} · ${statusNl(t.status)}${t.deadline ? ' · ' + t.deadline : ''}`);
  });
  y += 3;

  section('Afspraken');
  hubState.meetings.forEach(m => {
    const pd = m.selectedDate && m.selectedDate !== 'counter'
      ? m.proposedDates.find(d => d.id === m.selectedDate) : null;
    const dt = pd ? `${pd.date} ${pd.from}–${pd.to}`
      : m.counterProposal ? `${m.counterProposal.date} ${m.counterProposal.from}–${m.counterProposal.to}`
      : '—';
    line(m.subject, `${m.status} · ${dt}`);
  });
  y += 3;

  section('Activiteitenlog');
  hubState.log.slice(0, 10).forEach(l => { line(l.time, l.msg); });

  doc.save(`stageplan-${match.student.name.replace(/ /g, '-')}-${new Date().toISOString().split('T')[0]}.pdf`);
  toast('PDF gedownload');
}

/* ── Utility ──────────────────────────────────────────────────────── */
function nowStr() {
  const now = new Date();
  return now.toLocaleDateString('nl-NL', { day: 'numeric', month: 'short' }) + ', ' +
    now.toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit' });
}

<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="/manifest.json">
  <title>Stage Hub — Internly</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* ── Design tokens ───────────────────────────────────────────── */
    :root {
      /* Core */
      --primary:     #1a7a48;
      --dark-green:  #0f5c36;
      --accent:      #FF7E42;
      --accent-dark: #e05c1a;
      --ink:         #0d1520;
      --ink-2:       #1a2535;
      --ink-3:       #253047;
      --ink2:        #374151;
      --ink3:        #6b7280;
      --bg:          #f4f3ef;
      --bg2:         #eceae4;
      --bg3:         #dddbd5;
      --white:       #ffffff;
      --border:      #e5e3de;
      --border2:     #d4d1cb;
      --text:        #1a1a1a;
      --muted:       #6b7280;
      /* Radius */
      --r:           14px;
      --r-sm:        8px;
      /* Layout */
      --sidebar-w:   220px;
      --topbar-h:    60px;
      /* Accent / orange */
      --orange:      #FF7E42;
      --orange-dk:   #e05c1a;
      --orange-bg:   #fff2eb;
      /* Party colors */
      --student:     #1756a8;
      --student-bg:  #e8f0fc;
      --bedrijf:     #1a7a48;
      --bedrijf-bg:  #e8f5ee;
      --school:      #a06010;
      --school-bg:   #fdf3e0;
      /* Semantic aliases (kept for backward compat) */
      --blue:        #1756a8;
      --blue-bg:     #e8f0fc;
      --green:       #1a7a48;
      --green-bg:    #e8f5ee;
      --amber:       #a06010;
      --amber-bg:    #fdf3e0;
      --red:         #b82020;
      --red-bg:      #fdeaea;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Role picker ─────────────────────────────────────────────── */
    #role-picker {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      background: var(--bg);
    }

    .rp-logo {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: -.03em;
      margin-bottom: 8px;
    }
    .rp-logo span { color: var(--accent); }

    .rp-subtitle {
      font-size: .95rem;
      color: var(--muted);
      margin-bottom: 48px;
      text-align: center;
    }

    .rp-heading {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 8px;
      text-align: center;
    }

    .rp-desc {
      font-size: .9rem;
      color: var(--muted);
      margin-bottom: 32px;
      text-align: center;
    }

    .rp-cards {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 680px;
    }

    .rp-card {
      background: var(--white);
      border: 2px solid var(--border);
      border-radius: var(--r);
      padding: 28px 32px;
      cursor: pointer;
      transition: all .18s;
      text-align: center;
      min-width: 180px;
      flex: 1;
    }

    .rp-card:hover {
      border-color: var(--primary);
      box-shadow: 0 4px 20px rgba(26,122,72,.12);
      transform: translateY(-2px);
    }

    .rp-card-icon {
      font-size: 2.2rem;
      margin-bottom: 12px;
    }

    .rp-card-title {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 4px;
    }

    .rp-card-hint {
      font-size: .82rem;
      color: var(--muted);
    }

    /* ── App shell ───────────────────────────────────────────────── */
    #app-shell {
      display: none;
      min-height: 100vh;
    }

    /* Topbar */
    #hub-topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--topbar-h);
      background: var(--white);
      border-bottom: 1.5px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px 0 0;
      z-index: 100;
      gap: 16px;
    }

    #hamburger-btn {
      display: none;
      width: var(--sidebar-w);
      height: var(--topbar-h);
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      cursor: pointer;
      flex-shrink: 0;
    }

    #hamburger-btn svg { width: 22px; height: 22px; }

    .hub-topbar-logo {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--white);
      letter-spacing: -.02em;
      text-decoration: none;
      display: flex;
      align-items: center;
      width: var(--sidebar-w);
      height: 100%;
      padding: 0 20px;
      background: var(--ink);
      flex-shrink: 0;
    }

    .hub-topbar-logo span { color: var(--accent); }

    .hub-topbar-stage {
      flex: 1;
      min-width: 0;
    }

    .hub-topbar-stage-name {
      font-size: .95rem;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .hub-topbar-stage-meta {
      font-size: .78rem;
      color: var(--muted);
    }

    .hub-topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .role-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: .8rem;
      font-weight: 600;
    }

    .role-badge.student { background: var(--blue-bg); color: var(--blue); }
    .role-badge.bedrijf { background: #e8f5ee; color: var(--primary); }
    .role-badge.school  { background: #fdf3e0; color: #a06010; }

    .role-switch-btn {
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 5px 12px;
      font-family: 'Outfit', sans-serif;
      font-size: .8rem;
      color: var(--muted);
      cursor: pointer;
      transition: all .15s;
    }

    .role-switch-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    /* Hub layout */
    .hub-layout {
      display: flex;
      padding-top: var(--topbar-h);
      min-height: 100vh;
    }

    /* Sidebar */
    #sidebar {
      position: fixed;
      top: var(--topbar-h);
      left: 0;
      width: var(--sidebar-w);
      height: calc(100vh - var(--topbar-h));
      background: var(--ink);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      z-index: 90;
      transition: transform .25s;
    }

    .sidebar-section-label {
      font-size: .68rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: rgba(255,255,255,.35);
      padding: 20px 20px 8px;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      color: rgba(255,255,255,.65);
      font-size: .9rem;
      font-weight: 500;
      cursor: pointer;
      border-radius: 0;
      transition: all .15s;
      text-decoration: none;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }

    .sidebar-item:hover {
      background: rgba(255,255,255,.06);
      color: rgba(255,255,255,.9);
    }

    .sidebar-item.active {
      background: rgba(26,122,72,.25);
      color: #fff;
      border-left: 3px solid var(--primary);
    }

    .sidebar-item svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      opacity: .8;
    }

    .sidebar-badge {
      margin-left: auto;
      background: var(--accent);
      color: #fff;
      font-size: .68rem;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 10px;
    }

    .sidebar-spacer { flex: 1; }

    .sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid rgba(255,255,255,.08);
    }

    .sidebar-footer-user {
      font-size: .82rem;
      color: rgba(255,255,255,.5);
      line-height: 1.5;
    }

    /* Main content */
    #main-content {
      flex: 1;
      margin-left: var(--sidebar-w);
      padding: 32px;
      max-width: calc(100% - var(--sidebar-w));
    }

    /* ── Shared components ───────────────────────────────────────── */
    .page-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 24px;
      gap: 16px;
      flex-wrap: wrap;
    }

    .page-title {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: -.02em;
    }

    .page-sub {
      font-size: .88rem;
      color: var(--muted);
      margin-top: 4px;
    }

    .card {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--r);
      padding: 24px;
      margin-bottom: 16px;
    }

    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      gap: 12px;
    }

    .card-title {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--ink);
    }

    .card-sub {
      font-size: .82rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    /* Stat cards */
    .stat-card {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--r);
      padding: 20px;
      text-align: center;
    }

    .stat-num {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--ink);
      line-height: 1;
      margin-bottom: 6px;
    }

    .stat-label {
      font-size: .82rem;
      color: var(--muted);
    }

    /* Tags */
    .tag {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: .75rem;
      font-weight: 600;
    }

    .tag.green  { background: #e8f5ee; color: var(--primary); }
    .tag.blue   { background: var(--blue-bg); color: var(--blue); }
    .tag.orange { background: #fff3eb; color: var(--accent-dark); }
    .tag.yellow { background: #fdf3e0; color: #a06010; }
    .tag.neutral{ background: #f4f3ef; color: var(--muted); }
    .tag.red    { background: #fdeaea; color: #b82020; }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      border-radius: 10px;
      font-family: 'Outfit', sans-serif;
      font-size: .88rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all .15s;
      text-decoration: none;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-primary:hover { background: var(--dark-green); }

    .btn-ghost {
      background: none;
      border: 1.5px solid var(--border);
      color: var(--text);
    }

    .btn-ghost:hover { border-color: var(--primary); color: var(--primary); }

    .btn-sm { padding: 6px 12px; font-size: .8rem; border-radius: 8px; }

    .btn-danger {
      background: #fdeaea;
      color: #b82020;
      border: 1.5px solid #fca5a5;
    }

    .btn-danger:hover { background: #fca5a5; }

    /* Progress bar */
    .progress-wrap {
      background: #f0efeb;
      border-radius: 8px;
      height: 8px;
      overflow: hidden;
      margin-top: 8px;
    }

    .progress-bar {
      height: 100%;
      border-radius: 8px;
      background: linear-gradient(90deg, var(--primary), var(--dark-green));
      transition: width .4s ease;
    }

    /* Avatar chip */
    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: .8rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    /* Trust grade */
    .grade-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-weight: 800;
      font-size: .95rem;
    }

    .grade-badge.A { background: #e8f5ee; color: var(--primary); }
    .grade-badge.B { background: #fdf3e0; color: #a06010; }
    .grade-badge.C { background: #fdeaea; color: #b82020; }

    /* Divider */
    .divider { border: none; border-top: 1.5px solid var(--border); margin: 16px 0; }

    /* List items */
    .list-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }

    .list-item:last-child { border-bottom: none; }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 32px 16px;
      color: var(--muted);
      font-size: .9rem;
    }

    .empty-state .empty-icon {
      font-size: 2rem;
      margin-bottom: 8px;
    }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--ink);
      color: #fff;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: .88rem;
      font-weight: 500;
      z-index: 999;
      opacity: 0;
      transform: translateY(8px);
      transition: all .2s;
      pointer-events: none;
    }

    #toast.show { opacity: 1; transform: translateY(0); }

    /* Modal */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(13,21,32,.55);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    #modal-overlay.open { display: flex; }

    .modal {
      background: var(--white);
      border-radius: var(--r);
      padding: 28px;
      width: 100%;
      max-width: 480px;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
    }

    .modal-title {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 20px;
    }

    .form-group { margin-bottom: 16px; }

    .form-label {
      display: block;
      font-size: .85rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }

    .form-input,
    .form-select,
    .form-textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: 'Outfit', sans-serif;
      font-size: .9rem;
      color: var(--text);
      background: var(--white);
      outline: none;
      transition: border-color .15s;
    }

    .form-input:focus,
    .form-select:focus,
    .form-textarea:focus { border-color: var(--primary); }

    .form-textarea { min-height: 90px; resize: vertical; }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 20px;
    }

    .modal-close {
      position: absolute;
      top: 16px; right: 16px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 1.3rem;
      line-height: 1;
      padding: 4px;
    }

    /* Task item */
    .task-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }

    .task-item:last-child { border-bottom: none; }

    .task-checkbox {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 2px;
      transition: all .15s;
    }

    .task-checkbox.done {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    .task-body { flex: 1; min-width: 0; }

    .task-title {
      font-size: .9rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
    }

    .task-title.done-text {
      text-decoration: line-through;
      color: var(--muted);
    }

    .task-meta {
      font-size: .78rem;
      color: var(--muted);
      margin-top: 3px;
    }

    .task-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: var(--muted);
      border-radius: 6px;
      transition: all .15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-btn:hover { background: #f4f3ef; color: var(--text); }
    .icon-btn.danger:hover { background: #fdeaea; color: #b82020; }

    /* Filter pills */
    .filter-pills {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .pill {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: .8rem;
      font-weight: 600;
      cursor: pointer;
      border: 1.5px solid var(--border);
      background: var(--white);
      color: var(--muted);
      transition: all .15s;
    }

    .pill.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    /* Deadline timeline */
    .deadline-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 12px 0;
      position: relative;
    }

    .deadline-item:not(:last-child)::after {
      content: '';
      position: absolute;
      left: 19px;
      top: 44px;
      width: 2px;
      height: calc(100% - 12px);
      background: var(--border);
    }

    .deadline-dot {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: .62rem;
      font-weight: 700;
      line-height: 1.2;
      text-align: center;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }

    .deadline-dot.past    { background: #f0efeb; color: var(--muted); }
    .deadline-dot.today   { background: var(--accent); color: #fff; }
    .deadline-dot.soon    { background: #fdf3e0; color: #a06010; }
    .deadline-dot.future  { background: var(--blue-bg); color: var(--blue); }

    .deadline-body { flex: 1; padding-top: 8px; }
    .deadline-title { font-size: .9rem; font-weight: 600; color: var(--text); }
    .deadline-date  { font-size: .78rem; color: var(--muted); margin-top: 2px; }

    /* Leerdoel */
    .leerdoel-item {
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
    }

    .leerdoel-item:last-child { border-bottom: none; }

    .leerdoel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .leerdoel-name {
      font-size: .9rem;
      font-weight: 600;
      color: var(--text);
    }

    .leerdoel-pct {
      font-size: .82rem;
      font-weight: 700;
      color: var(--primary);
    }

    /* Reflectie */
    .reflectie-card {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--r);
      padding: 20px;
      margin-bottom: 12px;
    }

    .reflectie-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .reflectie-period {
      font-size: .88rem;
      font-weight: 600;
      color: var(--text);
    }

    .reflectie-date {
      font-size: .78rem;
      color: var(--muted);
    }

    .reflectie-text {
      font-size: .88rem;
      color: var(--text);
      line-height: 1.6;
    }

    /* Score bar */
    .score-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .score-label {
      font-size: .82rem;
      color: var(--muted);
      width: 120px;
      flex-shrink: 0;
    }

    .score-bar-wrap {
      flex: 1;
      background: #f0efeb;
      border-radius: 8px;
      height: 8px;
      overflow: hidden;
    }

    .score-bar-fill {
      height: 100%;
      border-radius: 8px;
      background: linear-gradient(90deg, var(--primary), var(--dark-green));
    }

    .score-val {
      font-size: .82rem;
      font-weight: 700;
      color: var(--text);
      width: 32px;
      text-align: right;
      flex-shrink: 0;
    }

    /* Log */
    .log-entry {
      display: flex;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      font-size: .85rem;
    }

    .log-entry:last-child { border-bottom: none; }

    .log-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border);
      margin-top: 6px;
      flex-shrink: 0;
    }

    .log-dot.green  { background: var(--primary); }
    .log-dot.blue   { background: var(--blue); }
    .log-dot.orange { background: var(--accent); }

    .log-msg { color: var(--text); line-height: 1.5; }
    .log-time { font-size: .75rem; color: var(--muted); margin-top: 2px; }

    /* Sidebar overlay (mobile) */
    #sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 80;
    }

    /* ── Responsive ──────────────────────────────────────────────── */
    @media (max-width: 768px) {
      :root { --sidebar-w: 220px; }

      #hamburger-btn { display: flex; width: 56px; }

      .hub-topbar-logo {
        display: none;
      }

      #sidebar {
        transform: translateX(-100%);
      }

      #sidebar.open {
        transform: translateX(0);
      }

      #sidebar-overlay.open { display: block; }

      #main-content {
        margin-left: 0;
        max-width: 100%;
        padding: 20px 16px;
      }

      .grid-2, .grid-3 { grid-template-columns: 1fr; }

      .page-head { flex-direction: column; align-items: flex-start; }
    }

    @media (max-width: 480px) {
      .rp-cards { flex-direction: column; }
      .rp-card { min-width: unset; }
    }

    /* ══════════════════════════════════════════════════════
       MEETING SCHEDULER — component CSS
       ══════════════════════════════════════════════════════ */

    /* Meeting card */
    .meeting-card {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: var(--r);
      padding: 20px;
      margin-bottom: 12px;
    }
    .meeting-card.geaccepteerd { border-left-color: var(--green); }
    .meeting-card.tegenbod     { border-left-color: var(--amber); }
    .meeting-card.afgewezen    { border-left-color: var(--red); }
    .meeting-card.geannuleerd  { border-left-color: var(--muted); opacity: .7; }

    .mcard-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }
    .mcard-title {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--ink);
    }
    .mcard-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      font-size: .82rem;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .mcard-meta span { display: flex; align-items: center; gap: 4px; }
    .mcard-note {
      font-size: .85rem;
      color: var(--muted);
      font-style: italic;
      margin: 10px 0;
      padding: 8px 12px;
      background: var(--bg);
      border-radius: 8px;
    }
    .mcard-confirmed {
      background: var(--green-bg);
      color: var(--green);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: .88rem;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .mcard-confirmed .mcard-contact {
      font-weight: 400;
      color: var(--muted);
      margin-top: 4px;
      font-size: .82rem;
    }

    /* Proposed time options */
    .meeting-dates-label {
      font-size: .78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
      margin: 10px 0 6px;
    }
    .meeting-time-opts { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
    .time-opt {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      font-size: .88rem;
      transition: all .14s;
      user-select: none;
    }
    .time-opt:hover { background: var(--bg); border-color: var(--primary); }
    .time-opt.selected { background: var(--green-bg); border-color: var(--green); color: var(--green); }
    .time-opt-radio {
      width: 14px; height: 14px;
      border-radius: 50%;
      border: 2px solid var(--border);
      flex-shrink: 0;
      transition: all .14s;
    }
    .time-opt.selected .time-opt-radio {
      background: var(--green);
      border-color: var(--green);
    }

    /* Counter proposal block */
    .counter-block {
      background: var(--amber-bg);
      border-radius: 10px;
      padding: 12px 14px;
      margin: 10px 0;
    }
    .counter-label { font-size: .78rem; font-weight: 600; color: var(--amber); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .05em; }
    .counter-time  { font-size: .92rem; font-weight: 600; color: var(--ink); }
    .counter-note  { font-size: .82rem; color: var(--muted); margin-top: 4px; font-style: italic; }

    /* Meeting actions row */
    .meeting-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }

    /* Inline counter form */
    .counter-form, .confirm-dialog {
      margin-top: 12px;
      padding: 14px;
      background: var(--bg);
      border-radius: 10px;
      border: 1.5px dashed var(--border);
    }
    .counter-form .form-row { margin-bottom: 10px; }
    .confirm-dialog { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .confirm-dialog span { font-size: .88rem; color: var(--ink); flex: 1; }

    /* Availability grid */
    .avail-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }
    .avail-day { display: flex; flex-direction: column; gap: 6px; }
    .avail-day-name {
      font-size: .75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
      text-align: center;
      padding-bottom: 4px;
      border-bottom: 1px solid var(--border);
    }
    .avail-slot {
      border-radius: 6px;
      padding: 6px 4px;
      font-size: .72rem;
      text-align: center;
      line-height: 1.3;
      font-weight: 500;
    }
    .avail-slot.beschikbaar { background: var(--green-bg); color: var(--green); }
    .avail-slot.voorkeur    { background: var(--amber-bg); color: var(--amber); }
    .avail-slot.bezet       { background: var(--red-bg);   color: var(--red);   opacity: .7; }
    .avail-empty            { font-size: .72rem; color: var(--muted); text-align: center; padding: 6px 0; }

    /* Avail edit rows (in modal) */
    .avail-edit-day { margin-bottom: 16px; }
    .avail-edit-day-label {
      font-weight: 600;
      font-size: .88rem;
      color: var(--ink);
      margin-bottom: 8px;
    }
    .avail-slot-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      flex-wrap: wrap;
    }
    .avail-slot-row select, .avail-slot-row input[type=time] {
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 5px 8px;
      font-family: 'Outfit', sans-serif;
      font-size: .85rem;
      color: var(--text);
      background: var(--white);
    }
    .avail-slot-row select { min-width: 120px; }

    /* Modal overlay + box */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 200;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px;
      overflow-y: auto;
    }
    .modal-box {
      background: var(--white);
      border-radius: var(--r);
      width: 100%;
      max-width: 720px;
      box-shadow: 0 24px 60px rgba(0,0,0,.18);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      border-bottom: 1.5px solid var(--border);
    }
    .modal-title {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--ink);
    }
    .modal-close {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.3rem;
      color: var(--muted);
      line-height: 1;
      padding: 4px 8px;
      border-radius: 6px;
    }
    .modal-close:hover { background: var(--bg); color: var(--ink); }
    .modal-body { padding: 24px; overflow-y: auto; max-height: calc(80vh - 140px); }
    .modal-footer {
      padding: 16px 24px;
      border-top: 1.5px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    /* Step indicator */
    .step-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
      font-size: .85rem;
      color: var(--muted);
    }
    .step-indicator .step {
      padding: 4px 12px;
      border-radius: 20px;
      font-weight: 600;
      background: var(--bg);
    }
    .step-indicator .step.active { background: var(--primary); color: #fff; }
    .step-indicator .sep { color: var(--border); }

    /* Form elements in modal */
    .form-row { margin-bottom: 14px; }
    .form-label {
      display: block;
      font-size: .82rem;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 5px;
    }
    .form-input, .form-select, .form-textarea {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 9px 12px;
      font-family: 'Outfit', sans-serif;
      font-size: .92rem;
      color: var(--text);
      background: var(--white);
      transition: border-color .14s;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      outline: none;
      border-color: var(--primary);
    }
    .form-textarea { resize: vertical; min-height: 72px; }

    /* Type radio group */
    .type-radio-group { display: flex; gap: 8px; flex-wrap: wrap; }
    .type-radio-option {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      font-size: .88rem;
      transition: all .14s;
      user-select: none;
    }
    .type-radio-option:hover { border-color: var(--primary); }
    .type-radio-option.selected { background: var(--green-bg); border-color: var(--green); color: var(--green); font-weight: 600; }
    .type-radio-option input { display: none; }

    /* Step 2 two-column layout */
    .modal-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 600px) { .modal-2col { grid-template-columns: 1fr; } }

    /* Time slot rows in step 2 */
    .time-slot-rows { display: flex; flex-direction: column; gap: 8px; margin-bottom: 8px; }
    .time-slot-row {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .time-slot-row input[type=date], .time-slot-row input[type=time] {
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 7px 10px;
      font-family: 'Outfit', sans-serif;
      font-size: .85rem;
      color: var(--text);
      background: var(--white);
    }
    .time-slot-row .slot-sep { font-size: .8rem; color: var(--muted); }

    /* Section headers inside tab */
    .afspraken-section { margin-bottom: 28px; }
    .afspraken-section-title {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: .9rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--muted);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .afspraken-section-title span { font-size: .75rem; }

    /* Empty state */
    .empty-state {
      padding: 24px;
      text-align: center;
      color: var(--muted);
      font-size: .88rem;
      border: 1.5px dashed var(--border);
      border-radius: var(--r);
    }

    /* Collapsible archief */
    .archief-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      font-size: .88rem;
      color: var(--muted);
      padding: 0;
    }
    .archief-toggle:hover { color: var(--ink); }

    @media print {
      #hub-topbar, #sidebar, #sidebar-overlay,
      #modal-overlay, #modal-root, #avail-modal-root,
      #toast, #role-picker, .role-switch-btn { display: none !important; }
      #main-content { margin-left: 0 !important; max-width: 100% !important; padding: 16px !important; }
      .hub-layout { padding-top: 0 !important; }
      #app-shell { display: block !important; }
    }

    /* ── Animaties & micro-interacties ── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
    @keyframes pageIn   { from{opacity:0;transform:translateY(8px);}  to{opacity:1;transform:translateY(0);} }
    @keyframes modalIn  { from{opacity:0;transform:scale(.96) translateY(8px);} to{opacity:1;transform:scale(1) translateY(0);} }
    @keyframes modalOut { from{opacity:1;transform:scale(1) translateY(0);} to{opacity:0;transform:scale(.96) translateY(8px);} }
    @keyframes sidebarIn{ from{opacity:0;transform:translateX(-8px);} to{opacity:1;transform:translateX(0);} }
    @keyframes barGrow  { from{width:0;} to{width:100%;} }
    @keyframes shakeIn  { 0%,100%{transform:translateX(0);}20%{transform:translateX(-5px);}40%{transform:translateX(5px);}60%{transform:translateX(-3px);}80%{transform:translateX(3px);} }

    body { animation: pageIn 0.32s ease both; }

    /* Modal entrance */
    #modal-overlay.open .modal,
    #modal-overlay.open .modal-box { animation: modalIn 0.22s ease both; }

    /* Card hover lift */
    .card  { transition: transform .18s ease, box-shadow .18s ease; }
    .card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,.08); }

    /* Progress bar */
    .progress-fill, .prog-fill { animation: barGrow 0.6s ease both; }

    /* Input focus glow */
    input:focus, textarea:focus, select:focus { box-shadow: 0 0 0 3px rgba(26,122,72,.15); }

    /* Shake on validation error */
    .shake { animation: shakeIn 0.3s ease; }

    /* ── Hide role-picker during auth boot ───────────────────────────────── */
    body.auth-boot #role-picker { display: none !important; }

    /* ── Loading spinner ──────────────────────────────────────────────────── */
    #hub-spinner {
      display: none;
      position: fixed; inset: 0;
      background: rgba(244,243,239,.82);
      z-index: 9999;
      align-items: center; justify-content: center;
    }
    #hub-spinner.show { display: flex; }
    .spinner-ring {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Match indicator ──────────────────────────────────────────────────── */
    .match-indicator {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 1.1rem 1.4rem .9rem;
      margin-bottom: 1.1rem;
    }
    .party-row {
      display: flex; align-items: center; gap: 0;
      margin-bottom: .6rem;
    }
    .party-node {
      display: flex; flex-direction: column;
      align-items: center; gap: .3rem; flex-shrink: 0;
    }
    .party-connector {
      flex: 1; height: 0;
      border-top: 2px dashed var(--border2);
      margin: 0 .5rem;
      position: relative; top: -14px;
    }
    .party-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Bricolage Grotesque', sans-serif;
      font-weight: 700; font-size: .82rem;
      border: 2px solid transparent;
      transition: border-color .2s, box-shadow .2s;
    }
    .party-avatar.active {
      border-color: var(--orange);
      box-shadow: 0 0 0 3px var(--orange-bg);
    }
    .party-name {
      font-size: .74rem; font-weight: 600; color: var(--ink);
      text-align: center; max-width: 80px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .party-role {
      font-size: .63rem; color: var(--ink3);
      text-align: center; letter-spacing: .05em; text-transform: uppercase;
    }
    .stage-meta {
      display: flex; align-items: center; gap: .65rem;
      flex-wrap: wrap; font-size: .8rem; color: var(--ink2);
      margin-bottom: .7rem;
    }
    .stage-meta-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
    .progress-stage {
      height: 4px; background: var(--bg2);
      border-radius: 2px; overflow: hidden;
    }
    .progress-stage-fill {
      height: 100%; border-radius: 2px; transition: width .6s ease;
    }
    .progress-stage-wrap {
      display: flex; align-items: center; gap: .6rem;
    }
    .progress-stage-wrap .progress-stage { flex: 1; }
    .progress-stage-pct {
      font-size: .74rem; font-weight: 700; color: var(--ink2);
      white-space: nowrap; min-width: 32px; text-align: right;
    }
    .mi-stage-info {
      margin-bottom: .65rem;
    }
    .mi-stage-name {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: .92rem; font-weight: 700; color: var(--ink);
      margin-bottom: .25rem;
    }
    .mi-stage-meta {
      display: flex; align-items: center; gap: .5rem;
      font-size: .78rem; color: var(--ink3); flex-wrap: wrap;
    }
    .mi-status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--green); display: inline-block; flex-shrink: 0;
    }

    /* ── Kalender ─────────────────────────────────────────────────────────── */
    .kal-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    .kal-month-title {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 1.05rem; font-weight: 600; color: var(--ink);
      text-transform: capitalize;
    }
    .kal-nav-btn {
      width: 32px; height: 32px; border-radius: 50%;
      border: 1px solid var(--border2); background: var(--white);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: .9rem; color: var(--ink2); transition: background .12s;
    }
    .kal-nav-btn:hover { background: var(--bg2); }
    .kal-filters { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
    .kal-filter {
      padding: 4px 14px; border-radius: 20px;
      border: 1.5px solid var(--border);
      background: var(--white); cursor: pointer;
      font-size: .8rem; font-family: 'Outfit', sans-serif;
      color: var(--text); transition: all .15s;
    }
    .kal-filter.active { background: var(--primary); border-color: var(--primary); color: #fff; }
    .kal-grid-head {
      display: grid; grid-template-columns: repeat(7, 1fr);
      gap: 3px; margin-bottom: 3px;
    }
    .kal-dow {
      text-align: center; font-size: .68rem;
      color: var(--muted); font-weight: 700;
      padding: 3px 0; text-transform: uppercase; letter-spacing: .05em;
    }
    .kal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
    .kal-day {
      min-height: 58px; padding: 5px;
      border: 1px solid var(--border); border-radius: var(--r-sm);
      background: var(--white); cursor: pointer;
      transition: border-color .12s, background .12s;
    }
    .kal-day:hover { border-color: var(--primary); }
    .kal-day.empty { background: transparent; border-color: transparent; cursor: default; }
    .kal-day.today { border-color: var(--orange); background: var(--orange-bg); }
    .kal-day.overdue-day { background: var(--red-bg); }
    .kal-day-num { font-size: .78rem; font-weight: 600; color: var(--ink); line-height: 1; }
    .kal-day.empty .kal-day-num { visibility: hidden; }
    .kal-dots { display: flex; flex-wrap: wrap; gap: 2px; margin-top: 4px; }
    .kal-dot { width: 6px; height: 6px; border-radius: 50%; }
    .kal-dot.oplevering { background: var(--orange); }
    .kal-dot.meeting    { background: #7c3aed; }
    .kal-dot.verplicht  { background: var(--blue); }
    .kal-dot.begeleiding{ background: var(--green); }
    .kal-dot.verlopen   { background: var(--red); }
    .kal-dot.deadline   { background: var(--orange); }
    .kal-legend {
      display: flex; gap: 14px; flex-wrap: wrap;
      margin-top: 12px; font-size: .75rem; color: var(--muted);
      padding-top: 12px; border-top: 1px solid var(--border);
    }
    .kal-legend-item { display: flex; align-items: center; gap: 5px; }
    .kal-popup {
      position: fixed;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 14px 16px 12px;
      box-shadow: 0 8px 28px rgba(0,0,0,.13);
      z-index: 1000;
      min-width: 220px; max-width: 300px;
    }
    .kal-popup-title {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-weight: 700; font-size: .9rem;
      color: var(--ink); margin-bottom: 10px;
    }
    .kal-popup-item {
      display: flex; align-items: flex-start; gap: 8px;
      font-size: .82rem; color: var(--text); margin-bottom: 6px; line-height: 1.4;
    }
    .kal-popup-dot {

function renderMatchIndicator() {
  const role = hubState.role;
  const wk = stageWeekNum();
  const weekPct = wk.total > 0 ? Math.round((wk.current / wk.total) * 100) : 0;
  const avgPct = hubState.leerdoelen.length
    ? Math.round(hubState.leerdoelen.reduce((s, l) => s + l.progress, 0) / hubState.leerdoelen.length)
    : 0;

  const node = (name, roleKey, colorVar, bgVar, label) => {
    const initials = name.trim().split(/\s+/).map(w => w[0]).slice(0, 2).join('').toUpperCase();
    const isActive = role === roleKey;
    return `
      <div class="party-node">
        <div class="party-avatar${isActive ? ' active' : ''}"
             style="background:var(${bgVar});color:var(${colorVar});border-color:${isActive ? 'var(--orange)' : 'transparent'}">
          ${initials}
        </div>
        <div class="party-name">${escHtml(name)}</div>
        <div class="party-role">${label}</div>
      </div>`;
  };

  return `
    <div class="match-indicator">
      <div class="party-row">
        ${node(match.student.name, 'student', '--student', '--student-bg', 'Student')}
        <div class="party-connector"></div>
        ${node(match.company.name, 'bedrijf', '--bedrijf', '--bedrijf-bg', 'Bedrijf')}
        <div class="party-connector"></div>
        ${node(match.school.name,  'school',  '--school',  '--school-bg',  'School')}
      </div>
      <div class="mi-stage-info">
        <div class="mi-stage-name">${escHtml(match.company.vacature)}</div>
        <div class="mi-stage-meta">
          <span class="mi-status-dot"></span>
          Lopend &nbsp;·&nbsp; Week ${wk.current} van ${wk.total}
          &nbsp;·&nbsp; ${escHtml(match.company.start)} – ${escHtml(match.company.eind)}
        </div>
      </div>
      <div class="progress-stage-wrap">
        <div class="progress-stage">
          <div class="progress-stage-fill" style="width:${weekPct}%;background:${pctColor(avgPct)}"></div>
        </div>
        <span class="progress-stage-pct">${weekPct}%</span>
      </div>
    </div>`;
}

/* ── DB loader ────────────────────────────────────────────────────────────── */

async function loadHubFromDB() {
  if (!MATCH_ID) return;
  showSpinner();
  try {
    const [planRes, leerdoelenRes, deadlinesRes, tasksRes, reflectiesRes, logRes] = await Promise.all([
      db.from('stage_plans').select('*').eq('match_id', MATCH_ID).maybeSingle(),
      db.from('stage_leerdoelen').select('*').eq('match_id', MATCH_ID).order('created_at'),
      db.from('stage_deadlines').select('*').eq('match_id', MATCH_ID).order('date'),
      db.from('stage_tasks').select('*').eq('match_id', MATCH_ID).order('created_at'),
      db.from('stage_reflecties').select('*').eq('match_id', MATCH_ID).order('date', { ascending: false }),
      db.from('stage_log').select('*').eq('match_id', MATCH_ID).order('created_at', { ascending: false }).limit(20)
    ]);

    if (planRes.data) {
      const p = planRes.data;
      hubState.stageplan = {
        _dbId:              p.id,
        stageopdracht:      p.stageopdracht      || '',
        hoofdvraag:         p.hoofdvraag         || '',
        onderzoekstype:     p.onderzoekstype      || 'kwalitatief',
        context:            p.context             || '',
        methode:            p.methode             || 'interviews',
        methodeomschrijving: p.methodeomschrijving || '',
        resultaattype:      p.resultaattype       || 'rapport',
        doelgroep:          p.doelgroep           || '',
        deelvragen:         Array.isArray(p.deelvragen) ? p.deelvragen : [],
        schoolnoot:         p.schoolnoot          || ''
      };
      hubState.schoolInvited = p.school_invited ?? false;
    }

    if (leerdoelenRes.data?.length) {
      hubState.leerdoelen = leerdoelenRes.data.map(l => ({
        id: hubState.nextId++, _dbId: l.id,
        title: l.title, progress: l.progress ?? 0, notes: l.notes || ''
      }));
    }

    if (deadlinesRes.data?.length) {
      hubState.deadlines = deadlinesRes.data.map(d => ({
        id: 'd' + hubState.nextId++, _dbId: d.id,
        title: d.title, date: d.date, type: d.type || 'future'
      }));
    }

    if (tasksRes.data?.length) {
      hubState.tasks = tasksRes.data.map(t => ({
        id: hubState.nextId++, _dbId: t.id,
        title: t.title, desc: t.desc || '', deadline: t.deadline || '',
        status: t.status || 'todo', assignee: t.assignee || 'student', maker: t.maker || 'student',
        priority: t.priority || 'medium'
      }));
    }

    if (reflectiesRes.data?.length) {
      hubState.reflecties = reflectiesRes.data.map(r => ({
        id: 'r' + hubState.nextId++, _dbId: r.id,
        period: r.period, date: r.date || '', text: r.text,
        editAllowed: r.author_role === hubState.role
      }));
    }

    if (logRes.data?.length) {
      hubState.log = logRes.data.map(l => ({
        id: 'lg' + hubState.nextId++, _dbId: l.id,
        msg: l.msg, time: l.time || l.created_at, color: l.color || 'blue'
      }));
    }

    switchTab(hubState.currentTab);
  } catch (e) {
    toast('Fout bij laden: ' + (e.message || e));
  } finally {
    hideSpinner();
  }
}

/* ── Auth boot (runs only when ?match=UUID is present) ────────────────────── */

window.addEventListener('DOMContentLoaded', async () => {
  if (!MATCH_ID) return; // demo mode — role-picker handles boot
  showSpinner();
  const { data: { user } } = await db.auth.getUser();
  if (!user) {
    window.location.href = 'auth.html?redirect=' + encodeURIComponent(window.location.href);
    return;
  }
  await loadMatchFromDB(user);
});

async function loadMatchFromDB(user) {
  // Spinner already showing from DOMContentLoaded handler.
  // loadHubFromDB (called via startHub) will hide it when done.
  try {
    // 1. Load match record + vacature name via FK join
    const { data: matchRow, error: matchErr } = await db
      .from('matches')
      .select('id, party_a, party_b, internship_postings(title)')
      .eq('id', MATCH_ID)
      .single();

    if (matchErr || !matchRow) {
      toast('Match niet gevonden of geen toegang.');
      hideSpinner();
      return;
    }

    // 2. Determine role of the authenticated user
    let role = null;
    if (user.id === matchRow.party_a) {
      role = 'student';
    } else if (user.id === matchRow.party_b) {
      role = 'bedrijf';
    } else {
      const { data: prof } = await db.from('profiles').select('role').eq('id', user.id).maybeSingle();
      if (prof?.role === 'school') role = 'school';
    }

    if (!role) {
      toast('Je bent geen deelnemer van dit Stage Hub.');
      hideSpinner();
      return;
    }

    // 3. Load student + company names in parallel
    const [studentRes, companyRes] = await Promise.all([
      db.from('student_profiles').select('naam, opleiding, jaar').eq('profile_id', matchRow.party_a).maybeSingle(),
      db.from('company_profiles').select('bedrijfsnaam, sector').eq('profile_id', matchRow.party_b).maybeSingle()
    ]);

    if (studentRes.data) {
      const s = studentRes.data;
      match.student.name      = s.naam      || match.student.name;
      match.student.opleiding = s.opleiding || match.student.opleiding;
      match.student.avatar    = (s.naam || match.student.name).trim().split(/\s+/).map(w => w[0]).slice(0,2).join('').toUpperCase();
    }

    if (companyRes.data) {
      const c = companyRes.data;
      match.company.name   = c.bedrijfsnaam || match.company.name;
      match.company.sector = c.sector       || match.company.sector;
    }

    if (matchRow.internship_postings?.title) {
      match.company.vacature = matchRow.internship_postings.title;
    }

    // For school: load school name
    if (role === 'school') {
      const { data: schoolRow } = await db.from('school_profiles')
        .select('schoolnaam').eq('profile_id', user.id).maybeSingle();
      if (schoolRow?.schoolnaam) match.school.name = schoolRow.schoolnaam;
    }

    // Update topbar with real match info
    const topbarStage = document.querySelector('.hub-topbar-stage-name');
    const topbarMeta  = document.querySelector('.hub-topbar-stage-meta');
    if (topbarStage) topbarStage.textContent = match.company.vacature;
    if (topbarMeta)  topbarMeta.textContent  = match.company.name + ' · ' + match.company.start + ' – ' + match.company.eind;

    // 4. Auto-start hub (also triggers loadHubFromDB which hides spinner)
    startHub(role);

  } catch (e) {
    hideSpinner();
    toast('Fout bij laden: ' + (e.message || e));
  }
}

function renderPlanning() {
  const today = new Date(); today.setHours(0, 0, 0, 0);

  const deadlinesHtml = hubState.deadlines.length === 0
    ? `<div class="empty-state"><div class="empty-icon">📅</div>Nog geen deadlines toegevoegd.</div>`
    : hubState.deadlines.map((d) => {
        const dDate = new Date(d.date); dDate.setHours(0, 0, 0, 0);
        const diffDays = Math.ceil((dDate - today) / 86400000);
        const isDone    = d.type === 'done' || dDate < today;
        const isSoon    = !isDone && diffDays <= 7;
        const urgency   = isDone ? 'overdue' : isSoon ? 'soon' : '';
        const urgLabel  = isDone
          ? `<span class="dl-urgency overdue">Verlopen</span>`
          : isSoon
            ? `<span class="dl-urgency soon">${diffDays === 0 ? 'Vandaag' : `${diffDays} dag${diffDays > 1 ? 'en' : ''}`}</span>`
            : '';

        const dObj = new Date(d.date + 'T00:00:00');
        const dayNum   = dObj.getDate();
        const monthStr = dObj.toLocaleDateString('nl-NL', { month: 'short' }).replace('.', '');

        const editBtn = can('editDeadline') ? `
          <button class="icon-btn" title="Bewerken" onclick="openDeadlineModal('${d.id}')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>` : '';

        return `
          <div class="dl-item ${urgency}">
            <div class="dl-date">
              <div class="dl-day">${dayNum}</div>
              <div class="dl-month">${monthStr}</div>
            </div>
            <div class="dl-body">
              <div class="dl-title">${escHtml(d.title)}</div>
              <div class="dl-meta">${formatDate(d.date)} ${urgLabel}</div>
            </div>
            <div class="task-actions">${editBtn}</div>

      }).join('');

  const addDeadlineBtn = can('addDeadline') ? `
    <button class="btn btn-primary btn-sm" onclick="openDeadlineModal(null)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Deadline toevoegen
    </button>` : '';

  const now2 = new Date(); now2.setHours(0,0,0,0);
  const next = hubState.deadlines.find(d => new Date(d.date + 'T00:00:00') >= now2);

  return `
    <div class="page-head">
      <div>
        <div class="page-title">Planning</div>
        <div class="page-sub">Tijdlijn en deadlines van de stage</div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        ${addDeadlineBtn}
        <button class="btn btn-ghost btn-sm" onclick="switchTab('kalender')">🗓 Kalender</button>
      </div>
    </div>

    <div class="grid-2">
      <div>
        <div class="card">
          <div class="card-head"><div class="card-title">Stageperiode tijdlijn</div></div>
          ${deadlinesHtml}
        </div>
      </div>

      <div>
        <div class="card">
          <div class="card-head"><div class="card-title">Stage info</div></div>
          <div style="font-size:.88rem;line-height:2;">
            <div><span style="color:var(--muted);display:inline-block;width:120px;">Duur</span><strong>${escHtml(match.company.duur)}</strong></div>
            <div><span style="color:var(--muted);display:inline-block;width:120px;">Startdatum</span><strong>${escHtml(match.company.start)}</strong></div>
            <div><span style="color:var(--muted);display:inline-block;width:120px;">Einddatum</span><strong>${escHtml(match.company.eind)}</strong></div>
            <div><span style="color:var(--muted);display:inline-block;width:120px;">Bedrijf</span><strong>${escHtml(match.company.name)}</strong></div>
            <div><span style="color:var(--muted);display:inline-block;width:120px;">Sector</span><strong>${escHtml(match.company.sector)}</strong></div>

function renderTaskItem(t) {
  const isDone    = t.status === 'done';
  const priority  = t.priority || 'medium';
  const prioLabel = { hoog: 'Hoog', medium: 'Medium', laag: 'Laag' }[priority] || priority;

  const checkHtml = can('checkTask') ? `
    <div class="task-check${isDone ? ' done' : ''}" onclick="toggleTaskDone(${t.id})" title="${isDone ? 'Markeer als open' : 'Markeer als afgerond'}"></div>`
    : `<div style="width:20px;flex-shrink:0"></div>`;

  const editBtn = can('editTask') ? `
    <button class="icon-btn" title="Bewerken" onclick="openTaakModal(${t.id})">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    </button>` : '';

  const deleteBtn = can('deleteTask') ? `
    <button class="icon-btn danger" title="Verwijderen" onclick="deleteTask(${t.id})">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
    </button>` : '';

  const assigneeColor = t.assignee === 'student' ? 'blue' : t.assignee === 'bedrijf' ? 'green' : 'orange';

  return `
    <div class="task-item${isDone ? ' done' : ''}" id="task-${t.id}">
      ${checkHtml}
      <div class="task-body">
        <div class="task-title">${escHtml(t.title)}</div>
        <div class="task-desc">${t.desc ? escHtml(t.desc) : ''}</div>
        <div class="task-meta">
          <span class="tag ${assigneeColor}">${t.assignee.charAt(0).toUpperCase()+t.assignee.slice(1)}</span>
          <span class="priority ${priority}">${prioLabel}</span>
          <span style="color:var(--muted);font-size:.75rem;">· ${formatDate(t.deadline)}</span>
        </div>
      </div>
      <div class="task-actions">
        ${editBtn}
        ${deleteBtn}
      </div>
    </div>`;
}

function setTakenFilter(f) {
  takenFilter = f;
  switchTab('taken');
}

async function toggleTaskDone(id) {
  if (!can('checkTask')) return;
  const task = hubState.tasks.find(t => t.id === id);
  if (!task) return;
  task.status = task.status === 'done' ? 'todo' : 'done';
  if (MATCH_ID && task._dbId) {
    await db.from('stage_tasks').update({ status: task.status }).eq('id', task._dbId);
  }
  const logMsg = task.status === 'done'
    ? `Taak "${task.title}" afgerond door ${roleName()}.`
    : `Taak "${task.title}" heropend.`;
  addLog(logMsg, 'green');
  updateTakenBadge();
  switchTab('taken');
  toast(task.status === 'done' ? 'Taak afgerond!' : 'Taak heropend.');
}

let _pendingDeleteTaskId = null;
let _pendingDeleteTimer  = null;

async function deleteTask(id) {
  if (!can('deleteTask')) return;
  const task = hubState.tasks.find(t => t.id === id);
  if (!task) return;

  // Two-tap confirmation: first tap arms, second tap within 3s confirms
  if (_pendingDeleteTaskId !== id) {
    _pendingDeleteTaskId = id;
    clearTimeout(_pendingDeleteTimer);
    _pendingDeleteTimer = setTimeout(() => { _pendingDeleteTaskId = null; }, 3000);
    toast(`Nogmaals tikken om "${escHtml(task.title)}" te verwijderen.`, 'error');
    return;
  }

  // Second tap — confirmed
  clearTimeout(_pendingDeleteTimer);
  _pendingDeleteTaskId = null;

  hubState.tasks = hubState.tasks.filter(t => t.id !== id);
  if (MATCH_ID && task._dbId) {
    await db.from('stage_tasks').delete().eq('id', task._dbId);
  }
  addLog(`Taak "${task.title}" verwijderd.`, 'orange');
  updateTakenBadge();
  switchTab('taken');
  toast('Taak verwijderd.');
}

/* ── Modals ─────────────────────────────────────────────────────────────── */

function openModal(html) {
  document.getElementById('modal-box').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  const overlay = document.getElementById('modal-overlay');
  const box = overlay.querySelector('.modal, .modal-box');
  if (box) {
    box.style.animation = 'modalOut .18s ease forwards';
    setTimeout(() => {
      overlay.classList.remove('open');
      box.style.animation = '';
    }, 175);
  } else {
    overlay.classList.remove('open');
  }
}

function closeModalOnOverlay(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

  const assignee = document.getElementById('m-task-assignee').value;
  const priority = document.getElementById('m-task-priority').value;

  if (!title) { toast('Geef een taakomschrijving op.', 'error'); return; }

      task.title = title; task.desc = desc; task.deadline = deadline;

function addLog(msg, color) {
  const now = new Date();
  const time = now.toLocaleDateString('nl-NL', { day: 'numeric', month: 'short' }) + ', ' +
    now.toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit' });
  hubState.log.unshift({ id: 'lg' + hubState.nextId++, msg, time, color });
  if (hubState.log.length > 20) hubState.log.pop();
  // Persist to DB (fire-and-forget — does not block the caller)
  if (MATCH_ID) {
    db.from('stage_log').insert({ match_id: MATCH_ID, msg, time, color }).then(({ error }) => {
      if (error) console.warn('[stage_log] insert failed:', error.message);
    });
  }
}

function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (type ? ' ' + type : '');
  clearTimeout(el._toastTimer);
  el._toastTimer = setTimeout(() => { el.className = ''; }, 2800);
}

/* ── Utility: colour from progress % ───────────────────────────────── */
function pctColor(pct) {
  if (pct >= 60) return 'var(--green)';
  if (pct >= 35) return 'var(--amber)';
  return 'var(--red)';
}

/* ── Utility: parse Dutch date strings ('1 maart 2026') → Date ─────── */
function parseDutchDate(str) {
  if (!str) return null;
  const months = { januari:0, februari:1, maart:2, april:3, mei:4, juni:5,
                   juli:6, augustus:7, september:8, oktober:9, november:10, december:11 };
  const parts = String(str).trim().toLowerCase().split(/\s+/);
  if (parts.length === 3) {
    const d = parseInt(parts[0], 10);
    const m = months[parts[1]];
    const y = parseInt(parts[2], 10);
    if (!isNaN(d) && m !== undefined && !isNaN(y)) return new Date(y, m, d);
  }
  const iso = new Date(str);
  return isNaN(iso.getTime()) ? null : iso;
}

/* ── Utility: current + total stage week numbers ────────────────────── */
function stageWeekNum() {
  const start = parseDutchDate(match.company.start);
  const eind  = parseDutchDate(match.company.eind);
  if (!start || !eind) return { current: 0, total: 0 };
  const now = new Date();
  const MS_WEEK = 7 * 86400000;
  const total   = Math.max(1, Math.round((eind  - start) / MS_WEEK));
  const elapsed = Math.max(0, Math.round((now   - start) / MS_WEEK));
  const current = Math.min(elapsed + 1, total);
  return { current, total };
}

function escHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function formatDate(dateStr) {
  if (!dateStr) return '—';
  const d = new Date(dateStr);
  return d.toLocaleDateString('nl-NL', { day: 'numeric', month: 'long', year: 'numeric' });
}

function formatDateShort(dateStr) {
  if (!dateStr) return '—';
  const d = new Date(dateStr);
  const parts = d.toLocaleDateString('nl-NL', { day: 'numeric', month: 'short' }).split(' ');
  return `<span>${parts[0]}</span><span>${parts[1] || ''}</span>`;
}

  if (!document.getElementById('sp-hoofdvraag')) return;

  sp.stageopdracht       = document.getElementById('sp-stageopdracht')?.value       ?? sp.stageopdracht;
  sp.hoofdvraag          = document.getElementById('sp-hoofdvraag')?.value          ?? sp.hoofdvraag;
  sp.onderzoekstype      = document.getElementById('sp-onderzoekstype')?.value      ?? sp.onderzoekstype;

  sp.methode             = document.getElementById('sp-methode')?.value             ?? sp.methode;
  sp.methodeomschrijving = document.getElementById('sp-methodeomschrijving')?.value ?? sp.methodeomschrijving;
  sp.resultaattype       = document.getElementById('sp-resultaattype')?.value       ?? sp.resultaattype;
  sp.doelgroep           = document.getElementById('sp-doelgroep')?.value           ?? sp.doelgroep;

  if (MATCH_ID) {
    const payload = {
      match_id:            MATCH_ID,
      stageopdracht:       sp.stageopdracht,
      hoofdvraag:          sp.hoofdvraag,
      onderzoekstype:      sp.onderzoekstype,
      context:             sp.context,
      methode:             sp.methode,
      methodeomschrijving: sp.methodeomschrijving,
      resultaattype:       sp.resultaattype,
      doelgroep:           sp.doelgroep,
      deelvragen:          sp.deelvragen,
      schoolnoot:          sp.schoolnoot,   // preserve school annotation on bedrijf/student saves
      school_invited:      hubState.schoolInvited  // preserve invite state on each save
    };
    const { data, error } = await db.from('stage_plans')
      .upsert(payload, { onConflict: 'match_id' })
      .select().single();
    if (error) { toast('Fout bij opslaan: ' + error.message); return; }
    if (data) sp._dbId = data.id;
  }

  addLog('Stageplan bijgewerkt door ' + roleName() + '.', 'blue');
  toast('Stageplan opgeslagen!');
  switchTab('stageplan');
}

async function saveSchoolnoot() {
  const val = document.getElementById('sp-schoolnoot')?.value || '';
  hubState.stageplan.schoolnoot = val;
  if (MATCH_ID) {
    const sp = hubState.stageplan;
    if (sp._dbId) {
      // Plan row exists — targeted UPDATE (don't overwrite other fields)
      const { error } = await db.from('stage_plans').update({ schoolnoot: val }).eq('id', sp._dbId);
      if (error) { toast('Fout bij opslaan: ' + error.message, 'error'); return; }
    } else {
      // No plan row yet — UPSERT with only required fields
      const { data, error } = await db.from('stage_plans')
        .upsert({ match_id: MATCH_ID, schoolnoot: val }, { onConflict: 'match_id' })
        .select('id').single();
      if (error) { toast('Fout bij opslaan: ' + error.message, 'error'); return; }
      if (data) sp._dbId = data.id;
    }
  }
  toast('Notitie opgeslagen!', 'success');
}

function buildKalDateMap() {
  const map = {};
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const add = (dateStr, item) => {
    if (!dateStr) return;
    if (!map[dateStr]) map[dateStr] = [];
    map[dateStr].push(item);
  };

  if (kalState.filter !== 'meetings') {
    hubState.deadlines.forEach(d => {
      const evType = buildKalEventType(d, today);
      add(d.date, { type: evType, label: d.title });
    });
  }
  if (kalState.filter !== 'deadlines') {
    hubState.meetings.filter(m => m.status === 'geaccepteerd').forEach(m => {
      let ds = null;
      if (m.selectedDate === 'counter' && m.counterProposal) ds = m.counterProposal.date;
      else if (m.selectedDate) { const pd = m.proposedDates.find(d => d.id === m.selectedDate); if (pd) ds = pd.date; }
      add(ds, { type: 'meeting', label: m.subject });
    });
  }
  return map;
}

function buildKalEventType(d, today) {
  const dDate = new Date(d.date + 'T00:00:00');
  if (dDate < today) return 'verlopen';
  const diffDays = Math.ceil((dDate - today) / 86400000);
  if (d.type === 'done') return 'verlopen';
  if (diffDays <= 3) return 'verplicht';
  if (d.type === 'oplevering') return 'oplevering';
  return 'oplevering';
}

function renderKalender() {
  const { year, month } = kalState;
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const firstDay   = new Date(year, month, 1);
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const startDow    = (firstDay.getDay() + 6) % 7; // Monday = 0

  const monthName = firstDay.toLocaleDateString('nl-NL', { month: 'long', year: 'numeric' });

  // Build date map with enhanced event types
  const dateMap = {};
  const add = (ds, item) => {
    if (!ds) return;
    if (!dateMap[ds]) dateMap[ds] = [];
    dateMap[ds].push(item);
  };
  if (kalState.filter !== 'meetings') {
    hubState.deadlines.forEach(d => {
      const evType = buildKalEventType(d, today);
      add(d.date, { type: evType, label: d.title });
    });
  }
  if (kalState.filter !== 'deadlines') {
    hubState.meetings.filter(m => m.status === 'geaccepteerd').forEach(m => {
      let ds = null;
      if (m.selectedDate === 'counter' && m.counterProposal) ds = m.counterProposal.date;
      else if (m.selectedDate) { const pd = m.proposedDates.find(d => d.id === m.selectedDate); if (pd) ds = pd.date; }
      add(ds, { type: 'meeting', label: m.subject });
    });
  }

  const filters = ['alles', 'deadlines', 'meetings'].map(f => `
    <button class="kal-filter${kalState.filter === f ? ' active' : ''}" onclick="setKalFilter('${f}')">
      ${f === 'alles' ? 'Alles' : f === 'deadlines' ? 'Deadlines' : 'Afspraken'}
    </button>`).join('');

  const dowHtml = ['Ma','Di','Wo','Do','Vr','Za','Zo']
    .map(d => `<div class="kal-dow">${d}</div>`).join('');

  let totalEvents = 0;
  let cellsHtml = '';
  for (let i = 0; i < startDow; i++) cellsHtml += '<div class="kal-day empty"></div>';

  for (let day = 1; day <= daysInMonth; day++) {
    const ds  = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
    const dObj = new Date(ds + 'T00:00:00');
    const events = dateMap[ds] || [];
    const isToday   = today.getFullYear() === year && today.getMonth() === month && today.getDate() === day;
    const isOverdue = dObj < today && events.length > 0;
    totalEvents += events.length;

    const dots = events.slice(0, 4).map(e => `<div class="kal-dot ${e.type}"></div>`).join('');
    const moreIndicator = events.length > 4 ? `<div style="font-size:.6rem;color:var(--muted);line-height:1">+${events.length-4}</div>` : '';

    let dayClass = 'kal-day';
    if (isToday)   dayClass += ' today';
    if (isOverdue) dayClass += ' overdue-day';

    cellsHtml += `
      <div class="${dayClass}" onclick="openKalPopup('${ds}', event)">
        <div class="kal-day-num">${day}</div>
        <div class="kal-dots">${dots}${moreIndicator}</div>
      </div>`;
  }

  const emptyMonthMsg = totalEvents === 0
    ? `<div style="text-align:center;padding:12px 0 4px;font-size:.82rem;color:var(--muted);">Geen evenementen in ${firstDay.toLocaleDateString('nl-NL', { month: 'long' })}.</div>`
    : '';

  const legend = `
    <div class="kal-legend">
      <span class="kal-legend-item"><span class="kal-dot oplevering"></span>Oplevering</span>
      <span class="kal-legend-item"><span class="kal-dot meeting"></span>Afspraak</span>
      <span class="kal-legend-item"><span class="kal-dot verplicht"></span>Urgent</span>
      <span class="kal-legend-item"><span class="kal-dot verlopen"></span>Verlopen</span>
    </div>`;

  return `
    <div class="page-head">
      <div>
        <div class="page-title">Kalender</div>
        <div class="page-sub">Deadlines en afspraken in één overzicht</div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        ${can('addDeadline') ? `<button class="btn btn-primary btn-sm" onclick="openDeadlineModal(null)">+ Deadline</button>` : ''}
        <button class="btn btn-ghost btn-sm" onclick="switchTab('afspraken');setTimeout(()=>openMeetingModal(),50)">+ Afspraak</button>
      </div>
    </div>

    <div class="card">
      <div class="kal-header">
        <button class="kal-nav-btn" onclick="kalPrevMonth()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <strong style="font-size:1rem;color:var(--ink);text-transform:capitalize">${monthName}</strong>
        <button class="kal-nav-btn" onclick="kalNextMonth()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
      <div class="kal-filters">${filters}</div>
      <div class="kal-grid-head">${dowHtml}</div>
      <div class="kal-grid">${cellsHtml}</div>
      ${emptyMonthMsg}
      ${legend}
    </div>
    <div id="kal-popup" class="kal-popup" style="display:none"></div>`;
}

function setKalFilter(f) {
  kalState.filter = f;
  switchTab('kalender');
}

function kalPrevMonth() {
  kalState.month--;
  if (kalState.month < 0) { kalState.month = 11; kalState.year--; }
  switchTab('kalender');
}

function kalNextMonth() {
  kalState.month++;
  if (kalState.month > 11) { kalState.month = 0; kalState.year++; }
  switchTab('kalender');
}

function openKalPopup(dateStr, e) {
  const events = buildKalDateMap()[dateStr] || [];
  if (events.length === 0) return;
  const d = new Date(dateStr + 'T00:00:00');
  const dateLabel = d.toLocaleDateString('nl-NL', { weekday: 'long', day: 'numeric', month: 'long' });
  const items = events.map(ev => `
    <div class="kal-popup-item">
      <div class="kal-popup-dot ${ev.type}"></div>
      <span>${escHtml(ev.label)}</span>
    </div>`).join('');
  const popup = document.getElementById('kal-popup');
  if (!popup) return;
  popup.innerHTML = `
    <button class="kal-popup-close" onclick="document.getElementById('kal-popup').style.display='none'">×</button>
    <div class="kal-popup-title">${dateLabel.charAt(0).toUpperCase() + dateLabel.slice(1)}</div>
    ${items}`;
  popup.style.display = 'block';
  popup.style.left = Math.min(e.clientX + 8, window.innerWidth - 290) + 'px';
  popup.style.top  = Math.min(e.clientY + 8, window.innerHeight - 200) + 'px';
  // Close on outside click
  setTimeout(() => {
    document.addEventListener('click', function closeKalPopup(ev) {
      if (!popup.contains(ev.target)) { popup.style.display = 'none'; document.removeEventListener('click', closeKalPopup); }
    });
  }, 10);
}

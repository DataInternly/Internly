/* ── Transient state ─────────────────────────────────────────────── */
let selectedTimeOpts = {};   // meetingId → dateId
let newMeeting = {};         // form state across modal steps
let modalTimeSlots = [];     // [{date,from,to}] built in step 2
let archievedOpen = false;   // accordion state

/* ── Pure helpers ─────────────────────────────────────────────────── */
function typeIcon(type) {
  return { call: '📞', video: '🎥', fysiek: '🏢' }[type] || '📅';
}
function typeName(type) {
  return { call: 'Telefonisch gesprek', video: 'Videocall', fysiek: 'Fysiek gesprek' }[type] || type;
}
function statusTag(s) {
  return {
    openstaand:   { label: 'Openstaand',  cls: 'orange'  },
    geaccepteerd: { label: 'Bevestigd',   cls: 'green'   },
    tegenbod:     { label: 'Tegenbod 🟡', cls: 'yellow'  },
    afgewezen:    { label: 'Afgewezen',   cls: 'red'     },
    geannuleerd:  { label: 'Geannuleerd', cls: 'neutral' }
  }[s] || { label: s, cls: 'neutral' };
}
function formatMeetingDate(dateStr, from, to) {
  if (!dateStr) return '—';
  const d = new Date(dateStr);
  const day  = d.toLocaleDateString('nl-NL', { weekday: 'long' });
  const date = d.toLocaleDateString('nl-NL', { day: 'numeric', month: 'long' });
  return `${day[0].toUpperCase() + day.slice(1)} ${date} · ${from}–${to}`;
}
function roleDisplay(role) {
  return { student: match.student.name, bedrijf: match.company.name, school: match.school.name }[role] || role;
}
function roleLabel(role) {
  return { student: 'Student', bedrijf: 'Bedrijf', school: 'School' }[role] || role;
}
function receiverOf(m) {
  return m.toAll ? 'alle partijen' : roleDisplay(m.to);
}

/* ── Badge ────────────────────────────────────────────────────────── */
function updateMeetingBadge() {
  const role = hubState.role;
  if (!role) return;
  const count = hubState.meetings.filter(m => {
    if (m.status === 'openstaand' && (m.to === role || (m.toAll && m.from !== role))) return true;
    if (m.status === 'tegenbod'   && m.from === role)             return true;
    return false;
  }).length;
  const badge = document.getElementById('sidebar-badge-afspraken');
  if (!badge) return;
  if (count > 0) { badge.textContent = count; badge.style.display = ''; }
  else           { badge.style.display = 'none'; }
}

/* ── Availability grid (read-only or read-write) ─────────────────── */
function renderAvailabilityGrid(role, readonly) {
  const days = ['maandag','dinsdag','woensdag','donderdag','vrijdag'];
  const slots = hubState.availability[role]?.slots || [];
  const cols  = days.map(day => {
    const daySlots = slots.filter(s => s.day === day);
    if (daySlots.length === 0) {
      return `<div class="avail-day">
        <div class="avail-day-name">${day.slice(0,2).toUpperCase()}</div>
        <div class="avail-empty">—</div>
      </div>`;
    }
    const slotsHtml = daySlots.map(s => `
      <div class="avail-slot ${s.type}">
        ${s.type === 'bezet' ? 'Bezet' : `${s.from}–${s.to}`}
      </div>`).join('');
    return `<div class="avail-day">
      <div class="avail-day-name">${day.slice(0,2).toUpperCase()}</div>
      ${slotsHtml}
    </div>`;
  });
  return `<div class="avail-grid">${cols.join('')}</div>`;
}

/* ── Meeting card ─────────────────────────────────────────────────── */
function renderMeetingCard(m) {
  const role = hubState.role;
  const st   = statusTag(m.status);
  const isReceiver = m.to === role || (m.toAll && m.from !== role);
  const isSender   = m.from === role;

  // Confirmed date display
  let confirmedHtml = '';
  if (m.status === 'geaccepteerd') {
    let dateLabel = '—';
    if (m.counterProposal && m.selectedDate === 'counter') {
      dateLabel = formatMeetingDate(m.counterProposal.date, m.counterProposal.from, m.counterProposal.to);
    } else if (m.selectedDate) {
      const pd = m.proposedDates.find(d => d.id === m.selectedDate);
      if (pd) dateLabel = formatMeetingDate(pd.date, pd.from, pd.to);
    }
    confirmedHtml = `<div class="mcard-confirmed">
      ✓ ${escHtml(dateLabel)}
      <div class="mcard-contact">${typeIcon(m.type)} ${escHtml(m.contactInfo)}</div>
    </div>`;
  }

  // Proposed dates (radio-like) for pending meetings received by current role
  let datesHtml = '';
  if (['openstaand'].includes(m.status) && isReceiver && m.proposedDates.length > 0) {
    const opts = m.proposedDates.map(pd => {
      const sel = selectedTimeOpts[m.id] === pd.id;
      return `<div class="time-opt${sel ? ' selected' : ''}" id="topt-${m.id}-${pd.id}"
        onclick="selectTimeOpt(${m.id}, ${pd.id})">
        <span class="time-opt-radio"></span>
        <span>${formatMeetingDate(pd.date, pd.from, pd.to)}</span>
      </div>`;
    }).join('');
    datesHtml = `<div class="meeting-dates-label">Voorgestelde tijdstippen:</div>
      <div class="meeting-time-opts">${opts}</div>`;
  } else if (m.status === 'openstaand' && isSender && m.proposedDates.length > 0) {
    const opts = m.proposedDates.map(pd =>
      `<div style="font-size:.85rem;color:var(--muted);padding:4px 0">
        ○ ${formatMeetingDate(pd.date, pd.from, pd.to)}
      </div>`).join('');
    datesHtml = `<div class="meeting-dates-label">Jouw voorgestelde tijdstippen:</div>${opts}`;
  }

  // Counter proposal
  let counterHtml = '';
  if (m.status === 'tegenbod' && m.counterProposal) {
    const cp    = m.counterProposal;
    const cFrom = m.to === role ? roleDisplay(m.from) : roleDisplay(m.to);
    counterHtml = `<div class="counter-block">
      <div class="counter-label">Tegenbod van ${escHtml(cFrom)}:</div>
      <div class="counter-time">${formatMeetingDate(cp.date, cp.from, cp.to)}</div>
      ${cp.note ? `<div class="counter-note">"${escHtml(cp.note)}"</div>` : ''}
    </div>`;
  }

  // Action buttons
  let actionsHtml = '';
  if (m.status === 'openstaand' && isReceiver) {
    const sel = !!selectedTimeOpts[m.id];
    actionsHtml = `
      <div class="meeting-actions">
        <button class="btn btn-primary btn-sm" id="accept-btn-${m.id}"
          ${sel ? '' : 'disabled style="opacity:.4;cursor:not-allowed"'}
          onclick="acceptMeeting(${m.id})">✓ Accepteren</button>
        <button class="btn btn-ghost btn-sm" onclick="openCounterForm(${m.id})">↩ Tegenbod</button>
        <button class="btn btn-danger btn-sm" onclick="confirmDecline(${m.id})">✕ Afwijzen</button>
      </div>
      <div id="counter-form-${m.id}" class="counter-form" style="display:none">
        <div class="form-row">
          <label class="form-label">Alternatieve datum</label>
          <input type="date" class="form-input" id="cf-date-${m.id}">
        </div>
        <div style="display:flex;gap:8px;margin-bottom:10px">
          <div style="flex:1"><label class="form-label">Van</label>
            <input type="time" class="form-input" id="cf-from-${m.id}" value="10:00"></div>
          <div style="flex:1"><label class="form-label">Tot</label>
            <input type="time" class="form-input" id="cf-to-${m.id}" value="11:00"></div>
        </div>
        <div class="form-row">
          <label class="form-label">Toelichting (optioneel)</label>
          <textarea class="form-textarea" id="cf-note-${m.id}" rows="2"
            placeholder="Bijv. dinsdag lukt niet, kan het woensdag?"></textarea>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-primary btn-sm" onclick="submitCounter(${m.id})">Tegenbod versturen</button>
          <button class="btn btn-ghost btn-sm"
            onclick="document.getElementById('counter-form-${m.id}').style.display='none'">Annuleren</button>
        </div>
      </div>
      <div id="confirm-decline-${m.id}" class="confirm-dialog" style="display:none">
        <span>Weet je zeker dat je dit verzoek <strong>afwijst</strong>?</span>
        <button class="btn btn-danger btn-sm" onclick="declineMeeting(${m.id})">Ja, afwijzen</button>
        <button class="btn btn-ghost btn-sm"
          onclick="document.getElementById('confirm-decline-${m.id}').style.display='none'">Nee, terug</button>
      </div>`;

  } else if (m.status === 'openstaand' && isSender) {
    actionsHtml = `
      <div class="meeting-actions">
        <button class="btn btn-ghost btn-sm" onclick="confirmCancel(${m.id})">✕ Verzoek annuleren</button>
      </div>
      <div id="confirm-cancel-${m.id}" class="confirm-dialog" style="display:none">
        <span>Weet je zeker dat je dit verzoek <strong>annuleert</strong>?</span>
        <button class="btn btn-danger btn-sm" onclick="cancelMeeting(${m.id})">Ja, annuleren</button>
        <button class="btn btn-ghost btn-sm"
          onclick="document.getElementById('confirm-cancel-${m.id}').style.display='none'">Nee, terug</button>
      </div>`;

  } else if (m.status === 'tegenbod' && isSender) {
    actionsHtml = `
      <div class="meeting-actions">
        <button class="btn btn-primary btn-sm" onclick="acceptCounter(${m.id})">✓ Accepteer tegenbod</button>
        <button class="btn btn-ghost btn-sm" onclick="confirmCancel(${m.id})">✕ Verzoek annuleren</button>
      </div>
      <div id="confirm-cancel-${m.id}" class="confirm-dialog" style="display:none">
        <span>Weet je zeker dat je dit verzoek <strong>annuleert</strong>?</span>
        <button class="btn btn-danger btn-sm" onclick="cancelMeeting(${m.id})">Ja, annuleren</button>
        <button class="btn btn-ghost btn-sm"
          onclick="document.getElementById('confirm-cancel-${m.id}').style.display='none'">Nee, terug</button>
      </div>`;

  } else if (m.status === 'geaccepteerd' && isSender) {
    actionsHtml = `<div class="meeting-actions">
      <button class="btn btn-ghost btn-sm" onclick="confirmCancel(${m.id})">✕ Annuleren</button>
    </div>
    <div id="confirm-cancel-${m.id}" class="confirm-dialog" style="display:none">
      <span>Weet je zeker dat je deze afspraak <strong>annuleert</strong>?</span>
      <button class="btn btn-danger btn-sm" onclick="cancelMeeting(${m.id})">Ja, annuleren</button>
      <button class="btn btn-ghost btn-sm"
        onclick="document.getElementById('confirm-cancel-${m.id}').style.display='none'">Nee, terug</button>
    </div>`;
  }

  return `<div class="meeting-card ${m.status}" id="mcard-${m.id}">
    <div class="mcard-head">
      <div class="mcard-title">📅 ${escHtml(m.subject)}</div>
      <span class="tag ${st.cls}">${st.label}</span>
    </div>
    <div class="mcard-meta">
      <span>Van: ${escHtml(roleDisplay(m.from))} (${roleLabel(m.from)})</span>
      <span>${typeIcon(m.type)} ${typeName(m.type)}</span>
      ${m.status === 'geaccepteerd' ? '' : `<span title="contactgegevens">🔒 Zichtbaar na bevestiging</span>`}
    </div>
    <hr class="divider">
    ${confirmedHtml}
    ${datesHtml}
    ${counterHtml}
    ${m.note ? `<div class="mcard-note">"${escHtml(m.note)}"</div>` : ''}
    ${actionsHtml}
    <div style="font-size:.75rem;color:var(--muted);margin-top:10px">Aangemaakt: ${escHtml(m.createdAt)}</div>
  </div>`;
}

/* ── Main tab renderer ────────────────────────────────────────────── */
function renderAfspraken() {
  const role = hubState.role;

  const roleInvolved = m => m.to === role || m.from === role || (m.toAll && m.from !== role);

  const accepted  = hubState.meetings.filter(m => m.status === 'geaccepteerd' && roleInvolved(m));
  const pending   = hubState.meetings.filter(m =>
    (m.status === 'openstaand' || m.status === 'tegenbod') && roleInvolved(m)
  );
  const archived  = hubState.meetings.filter(m =>
    (m.status === 'afgewezen' || m.status === 'geannuleerd') && roleInvolved(m)
  );

  const acceptedHtml = accepted.length === 0
    ? '<div class="empty-state">Geen aankomende bevestigde afspraken.</div>'
    : accepted.map(m => renderMeetingCard(m)).join('');

  const pendingHtml = pending.length === 0
    ? '<div class="empty-state">Geen openstaande verzoeken.</div>'
    : pending.map(m => renderMeetingCard(m)).join('');

  const archivedHtml = archived.length === 0
    ? '<div class="empty-state" style="font-size:.82rem">Geen afgeronde of geannuleerde afspraken.</div>'
    : archived.map(m => renderMeetingCard(m)).join('');

  const availLabel = ['Mijn beschikbaarheid', `(${roleDisplay(role)})`].join(' ');

  return `
    <div class="page-head">
      <div>
        <div class="page-title">📅 Afspraken</div>
        <div class="page-sub">Verzoeken en beschikbaarheid voor deze stage</div>
      </div>
      <button class="btn btn-primary" onclick="openMeetingModal()">+ Nieuw verzoek</button>
    </div>

    <div class="afspraken-section">
      <div class="afspraken-section-title">Aankomende afspraken <span class="tag green">${accepted.length}</span></div>
      ${acceptedHtml}
    </div>

    <div class="afspraken-section">
      <div class="afspraken-section-title">Openstaande verzoeken <span class="tag orange">${pending.length}</span></div>
      ${pendingHtml}
    </div>

    <div class="afspraken-section">
      <div class="card">
        <div class="card-head">
          <div>
            <div class="card-title">🗓 ${escHtml(availLabel)}</div>
            <div class="card-sub">Jouw beschikbaarheid per dag van de week</div>
          </div>
          <button class="btn btn-ghost btn-sm" onclick="openAvailModal()">⚙ Bewerken</button>
        </div>
        ${renderAvailabilityGrid(role, true)}
      </div>
    </div>

    <div class="afspraken-section">
      <button class="archief-toggle" onclick="toggleArchief()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="${archievedOpen ? '18 15 12 9 6 15' : '6 9 12 15 18 9'}"/>
        </svg>
        Archief (${archived.length})
      </button>
      ${archievedOpen ? `<div style="margin-top:12px">${archivedHtml}</div>` : ''}
    </div>`;
}

function toggleArchief() {
  archievedOpen = !archievedOpen;
  switchTab('afspraken');
}

/* ── Time option selection ────────────────────────────────────────── */
function selectTimeOpt(meetingId, dateId) {
  selectedTimeOpts[meetingId] = dateId;
  // Re-render the tab so the selection state and button disabled state update
  switchTab('afspraken');
}

/* ── Accept ───────────────────────────────────────────────────────── */
function acceptMeeting(id) {
  const m = hubState.meetings.find(m => m.id === id);
  if (!m) return;
  const dateId = selectedTimeOpts[id];
  if (!dateId) return;
  m.status       = 'geaccepteerd';
  m.selectedDate = dateId;
  m.updatedAt    = nowStr();
  const pd = m.proposedDates.find(d => d.id === dateId);
  const dateLabel = pd ? formatMeetingDate(pd.date, pd.from, pd.to) : '';
  addLog(`${roleDisplay(hubState.role)} heeft het meeting-verzoek geaccepteerd — ${dateLabel}`, 'green');
  toast(`✓ Afspraak bevestigd — ${dateLabel}`);
  delete selectedTimeOpts[id];
  switchTab('afspraken');
}

/* ── Counter ──────────────────────────────────────────────────────── */
function openCounterForm(id) {
  const el = document.getElementById(`counter-form-${id}`);
  if (el) el.style.display = el.style.display === 'none' ? '' : 'none';
}

function submitCounter(id) {
  const date = document.getElementById(`cf-date-${id}`)?.value;
  const from = document.getElementById(`cf-from-${id}`)?.value;
  const to   = document.getElementById(`cf-to-${id}`)?.value;
  const note = document.getElementById(`cf-note-${id}`)?.value || '';
  if (!date || !from || !to) { toast('Vul datum en tijden in.', 'error'); return; }
  const m = hubState.meetings.find(m => m.id === id);
  if (!m) return;
  m.status          = 'tegenbod';
  m.counterProposal = { date, from, to, note };
  m.updatedAt       = nowStr();
  addLog(`${roleDisplay(hubState.role)} heeft een tegenbod gedaan op "${m.subject}"`, 'orange');
  toast(`${roleDisplay(hubState.role)} stelt een andere tijd voor`);
  switchTab('afspraken');
}

/* ── Decline ──────────────────────────────────────────────────────── */
function confirmDecline(id) {
  const el = document.getElementById(`confirm-decline-${id}`);
  if (el) el.style.display = '';
}

function declineMeeting(id) {
  const m = hubState.meetings.find(m => m.id === id);
  if (!m) return;
  m.status    = 'afgewezen';
  m.updatedAt = nowStr();
  addLog(`${roleDisplay(hubState.role)} heeft het meeting-verzoek "${m.subject}" afgewezen`, 'red');
  toast('Verzoek afgewezen');
  switchTab('afspraken');
}

/* ── Cancel ───────────────────────────────────────────────────────── */
function confirmCancel(id) {
  const el = document.getElementById(`confirm-cancel-${id}`);
  if (el) el.style.display = '';
}

function cancelMeeting(id) {
  const m = hubState.meetings.find(m => m.id === id);
  if (!m || m.from !== hubState.role) return;
  m.status    = 'geannuleerd';
  m.updatedAt = nowStr();
  addLog(`${roleDisplay(hubState.role)} heeft het meeting-verzoek "${m.subject}" geannuleerd`, 'orange');
  toast('Verzoek geannuleerd');
  switchTab('afspraken');
}

/* ── Accept counter proposal ──────────────────────────────────────── */
function acceptCounter(id) {
  const m = hubState.meetings.find(m => m.id === id);
  if (!m || !m.counterProposal) return;
  m.status       = 'geaccepteerd';
  m.selectedDate = 'counter';
  m.updatedAt    = nowStr();
  const cp        = m.counterProposal;
  const dateLabel = formatMeetingDate(cp.date, cp.from, cp.to);
  addLog(`${roleDisplay(hubState.role)} heeft het tegenbod geaccepteerd — ${dateLabel}`, 'green');
  toast(`✓ Afspraak bevestigd — ${dateLabel}`);
  switchTab('afspraken');
}

/* ── Meeting request modal ────────────────────────────────────────── */
function openMeetingModal() {
  newMeeting    = { type: 'video' };
  modalTimeSlots = [{ date: '', from: '10:00', to: '11:00' }];
  renderModalStep1();
  document.getElementById('modal-root').style.display = 'flex';
}

function closeMeetingModal() {
  document.getElementById('modal-root').style.display = 'none';
}

function renderModalStep1() {
  const role   = hubState.role;
  const others = ['student', 'bedrijf', 'school'].filter(r => r !== role);
  const toOpts = others.map(r =>
    `<option value="${r}" ${newMeeting.to === r ? 'selected' : ''}>${roleDisplay(r)} (${roleLabel(r)})</option>`
  ).join('');
  const toAllOpt = `<option value="all" ${newMeeting.to === 'all' ? 'selected' : ''}>Alle partijen</option>`;

  const typeOptions = ['call','video','fysiek'].map(t => `
    <label class="type-radio-option${newMeeting.type === t ? ' selected' : ''}">
      <input type="radio" name="mtype" value="${t}" ${newMeeting.type === t ? 'checked' : ''}
        onchange="newMeeting.type='${t}'; this.closest('.modal-body').querySelector('.contact-label').textContent=contactLabel('${t}'); document.querySelectorAll('.type-radio-option').forEach(el=>el.classList.remove('selected')); this.closest('.type-radio-option').classList.add('selected')">
      ${typeIcon(t)} ${typeName(t)}
    </label>`).join('');

  document.getElementById('modal-inner').innerHTML = `
    <div class="modal-header">
      <div class="modal-title">Afspraak verzoeken</div>
      <button class="modal-close" onclick="closeMeetingModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="step-indicator">
        <span class="step active">① Details</span>
        <span class="sep">→</span>
        <span class="step">② Tijdstip</span>
      </div>
      <div class="form-row">
        <label class="form-label">Aan</label>
        <select class="form-select" id="m-to" onchange="newMeeting.to=this.value">
          <option value="">— Kies ontvanger —</option>
          ${toOpts}${toAllOpt}
        </select>
      </div>
      <div class="form-row">
        <label class="form-label">Onderwerp</label>
        <input type="text" class="form-input" id="m-subject" maxlength="80"
          placeholder="Bijv. Voortgangsgesprek week 4"
          value="${escHtml(newMeeting.subject || '')}"
          oninput="newMeeting.subject=this.value">
      </div>
      <div class="form-row">
        <label class="form-label">Type gesprek</label>
        <div class="type-radio-group">${typeOptions}</div>
      </div>
      <div class="form-row">
        <label class="form-label contact-label">${contactLabel(newMeeting.type)}</label>
        <input type="text" class="form-input" id="m-contact"
          value="${escHtml(newMeeting.contactInfo || '')}"
          oninput="newMeeting.contactInfo=this.value">
      </div>
      <div class="form-row">
        <label class="form-label">Toelichting (optioneel)</label>
        <textarea class="form-textarea" id="m-note" rows="3"
          oninput="newMeeting.note=this.value">${escHtml(newMeeting.note || '')}</textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeMeetingModal()">Annuleren</button>
      <button class="btn btn-primary" onclick="nextStep()">Volgende →</button>
    </div>`;
}

function contactLabel(type) {
  return { call: 'Telefoonnummer', video: 'Vergaderlink (Meet / Teams / Zoom)', fysiek: 'Adres of locatie' }[type] || 'Contactgegevens';
}

function nextStep() {
  const to      = document.getElementById('m-to')?.value;
  const subject = document.getElementById('m-subject')?.value?.trim();
  const contact = document.getElementById('m-contact')?.value?.trim();
  if (!to || !subject || !contact) {
    toast('Vul alle verplichte velden in.', 'error'); return;
  }
  newMeeting.to          = to;
  newMeeting.subject     = subject;
  newMeeting.contactInfo = contact;
  newMeeting.note        = document.getElementById('m-note')?.value || '';
  renderModalStep2();
}

function renderModalStep2() {
  const receiver = newMeeting.to === 'all'
    ? 'alle partijen'
    : roleDisplay(newMeeting.to);

  const availRole = newMeeting.to === 'all' ? 'student' : newMeeting.to;
  const availGrid = renderAvailabilityGrid(availRole, true);

  const slotRows = () => modalTimeSlots.map((s, i) => `
    <div class="time-slot-row" id="tsrow-${i}">
      <input type="date" value="${s.date}" onchange="modalTimeSlots[${i}].date=this.value">
      <span class="slot-sep">van</span>
      <input type="time" value="${s.from}" onchange="modalTimeSlots[${i}].from=this.value">
      <span class="slot-sep">tot</span>
      <input type="time" value="${s.to}"   onchange="modalTimeSlots[${i}].to=this.value">
      ${modalTimeSlots.length > 1
        ? `<button class="btn btn-ghost btn-sm" onclick="removeTimeSlot(${i})" style="padding:4px 8px">✕</button>`
        : ''}
    </div>`).join('');

  document.getElementById('modal-inner').innerHTML = `
    <div class="modal-header">
      <div class="modal-title">Afspraak verzoeken</div>
      <button class="modal-close" onclick="closeMeetingModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="step-indicator">
        <span class="step">① Details</span>
        <span class="sep">→</span>
        <span class="step active">② Tijdstip</span>
      </div>
      <div class="modal-2col">
        <div>
          <div class="form-label" style="margin-bottom:10px">Stel tijdstippen voor (max. 3)</div>
          <div class="time-slot-rows" id="time-slot-rows">${slotRows()}</div>
          ${modalTimeSlots.length < 3
            ? `<button class="btn btn-ghost btn-sm" onclick="addTimeSlot()">+ Tijdstip toevoegen</button>`
            : ''}
        </div>
        <div>
          <div class="form-label" style="margin-bottom:10px">Beschikbaarheid van ${escHtml(receiver)}</div>
          ${availGrid}
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="renderModalStep1()">← Terug</button>
      <button class="btn btn-primary" onclick="saveMeeting()">Verzoek versturen →</button>
    </div>`;
}

function addTimeSlot() {
  if (modalTimeSlots.length >= 3) return;
  modalTimeSlots.push({ date: '', from: '10:00', to: '11:00' });
  renderModalStep2();
}

function removeTimeSlot(idx) {
  modalTimeSlots.splice(idx, 1);
  renderModalStep2();
}

function saveMeeting() {
  const filled = modalTimeSlots.filter(s => s.date && s.from && s.to);
  if (filled.length === 0) { toast('Voeg minimaal één tijdstip toe.', 'error'); return; }
  const now = new Date();
  const timeStr = now.toLocaleDateString('nl-NL', { day: 'numeric', month: 'short' }) + ', ' +
    now.toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit' });
  const m = {
    id:            hubState.nextMeetingId++,
    from:          hubState.role,
    to:            newMeeting.to === 'all' ? '' : newMeeting.to,
    toAll:         newMeeting.to === 'all',
    subject:       newMeeting.subject,
    type:          newMeeting.type,
    contactInfo:   newMeeting.contactInfo,
    proposedDates: filled.map((s, i) => ({ id: i + 1, date: s.date, from: s.from, to: s.to })),
    selectedDate:  null,
    status:        'openstaand',
    counterProposal: null,
    note:          newMeeting.note || '',
    createdAt:     timeStr,
    updatedAt:     timeStr,
    seenBy:        [hubState.role]
  };
  hubState.meetings.unshift(m);
  const receiverLabel = newMeeting.to === 'all' ? 'alle partijen' : roleDisplay(newMeeting.to);
  addLog(`${roleDisplay(hubState.role)} heeft een ${typeName(m.type).toLowerCase()}-verzoek verstuurd aan ${receiverLabel}`, 'blue');
  toast(`Verzoek verstuurd aan ${receiverLabel}`);
  closeMeetingModal();
  switchTab('afspraken');
}

/* ── Availability modal ───────────────────────────────────────────── */
function openAvailModal() {
  renderAvailModal();
  document.getElementById('avail-modal-root').style.display = 'flex';
}

function closeAvailModal() {
  document.getElementById('avail-modal-root').style.display = 'none';
}

function renderAvailModal() {
  const role  = hubState.role;
  const days  = ['maandag','dinsdag','woensdag','donderdag','vrijdag'];
  const slots = hubState.availability[role]?.slots || [];

  const dayRows = days.map(day => {
    const daySlots = slots.filter(s => s.day === day);
    const dayIdx   = days.indexOf(day);
    const slotsHtml = daySlots.map((s, si) => `
      <div class="avail-slot-row" id="asr-${dayIdx}-${si}">
        <select onchange="updateAvailSlot('${day}', ${si}, 'type', this.value)">
          <option value="beschikbaar" ${s.type==='beschikbaar'?'selected':''}>Beschikbaar</option>
          <option value="voorkeur"    ${s.type==='voorkeur'   ?'selected':''}>Voorkeur</option>
          <option value="bezet"       ${s.type==='bezet'      ?'selected':''}>Bezet</option>
        </select>
        ${s.type !== 'bezet' ? `
          <input type="time" value="${s.from}" onchange="updateAvailSlot('${day}', ${si}, 'from', this.value)">
          <span style="font-size:.8rem;color:var(--muted)">–</span>
          <input type="time" value="${s.to}"   onchange="updateAvailSlot('${day}', ${si}, 'to', this.value)">
        ` : ''}
        <button class="btn btn-ghost btn-sm" style="padding:4px 8px"
          onclick="removeAvailSlot('${day}', ${si})">✕</button>
      </div>`).join('');

    return `<div class="avail-edit-day">
      <div class="avail-edit-day-label">${day[0].toUpperCase() + day.slice(1)}</div>
      <div id="avail-slots-${dayIdx}">${slotsHtml}</div>
      <button class="btn btn-ghost btn-sm" style="margin-top:4px"
        onclick="addAvailSlot('${day}')">+ Blok toevoegen</button>
    </div>`;
  }).join('');

  document.getElementById('avail-modal-inner').innerHTML = `
    <div class="modal-header">
      <div class="modal-title">Beschikbaarheid instellen</div>
      <button class="modal-close" onclick="closeAvailModal()">✕</button>
    </div>
    <div class="modal-body">${dayRows}</div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeAvailModal()">Annuleren</button>
      <button class="btn btn-primary" onclick="saveAvailability()">Opslaan</button>
    </div>`;
}

function updateAvailSlot(day, idx, field, value) {
  const role  = hubState.role;
  const slots = hubState.availability[role].slots;
  const s     = slots.filter(sl => sl.day === day)[idx];
  if (s) { s[field] = value; renderAvailModal(); }
}

function addAvailSlot(day) {
  const role = hubState.role;
  hubState.availability[role].slots.push({
    id: Date.now(), day, from: '09:00', to: '17:00', type: 'beschikbaar'
  });
  renderAvailModal();
}

function removeAvailSlot(day, idx) {
  const role  = hubState.role;
  const slots = hubState.availability[role].slots;
  const daySlots = slots.filter(s => s.day === day);
  if (daySlots[idx]) {
    const globalIdx = slots.indexOf(daySlots[idx]);
    slots.splice(globalIdx, 1);
  }
  renderAvailModal();
}

function saveAvailability() {
  const role  = hubState.role;
  const slots = hubState.availability[role]?.slots || [];
  const invalid = slots.filter(s => !s.from || !s.to || s.from >= s.to);
  if (invalid.length > 0) {
    toast('Ongeldige tijden: van moet vóór tot liggen.', 'error');
    return;
  }
  addLog(`${roleDisplay(role)} heeft beschikbaarheid bijgewerkt.`, 'blue');
  toast('Beschikbaarheid bijgewerkt');
  closeAvailModal();
  switchTab('afspraken');
}

/* ── CSV Export ───────────────────────────────────────────────────── */
function exportCSV() {
  const csv = rows => rows.map(r => r.map(c => `"${String(c ?? '').replace(/"/g, '""')}"`).join(',')).join('\n');
  const statusNl = s => ({ done: 'Afgerond', 'in-progress': 'Bezig', todo: 'Open' }[s] || s);
  const rows = [
    ['Type', 'Omschrijving', 'Datum / Details', 'Status', 'Partij'],
    ['', '=== STAGEGEGEVENS ===', '', '', ''],
    ['Stage',   match.company.vacature,  `${match.company.start} – ${match.company.eind}`, 'Lopend', 'Alle partijen'],
    ['Student', match.student.name,       match.student.opleiding, '', 'Student'],
    ['Bedrijf', match.company.name,        match.company.sector,   '', 'Bedrijf'],
    ['School',  match.school.name,         match.school.opleiding, '', 'School'],
    ['', '=== LEERDOELEN ===', '', '', ''],
    ...hubState.leerdoelen.map(l => [
      'Leerdoel', l.title,
      l.progress + '%' + (l.notes ? ' — ' + l.notes : ''),
      l.progress >= 60 ? 'Op schema' : l.progress >= 35 ? 'In ontwikkeling' : 'Aandacht nodig',
      match.student.name
    ]),
    ['', '=== PLANNING ===', '', '', ''],
    ...hubState.deadlines.map(d => ['Deadline', d.title, d.date, '', 'Alle partijen']),
    ['', '=== TAKEN ===', '', '', ''],
    ...hubState.tasks.map(t => ['Taak', t.title, t.deadline || '', statusNl(t.status), t.assignee]),
    ['', '=== AFSPRAKEN ===', '', '', ''],
    ...hubState.meetings.map(m => {
      const pd = m.selectedDate && m.selectedDate !== 'counter'
        ? m.proposedDates.find(d => d.id === m.selectedDate) : null;
      const dt = pd ? `${pd.date} ${pd.from}–${pd.to}`
        : m.counterProposal ? `${m.counterProposal.date} ${m.counterProposal.from}–${m.counterProposal.to}`
        : '—';
      return ['Afspraak', m.subject, dt, m.status, `${m.from} → ${m.toAll ? 'alle' : m.to}`];
    }),
  ];
  const blob = new Blob(['\uFEFF' + csv(rows)], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = `stageplan-${match.student.name.replace(/ /g, '-')}-${new Date().toISOString().split('T')[0]}.csv`;
  link.click();
  toast('CSV gedownload');
}

/* ── PDF Export ───────────────────────────────────────────────────── */
function exportPDF() {
  if (typeof window.jspdf === 'undefined') {
    toast('PDF-bibliotheek niet geladen — gebruik Ctrl+P om af te drukken');
    window.print();
    return;
  }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const margin = 14;
  let y = 18;

  const guard   = () => { if (y > 270) { doc.addPage(); y = margin; } };
  const section = title => {
    guard();
    doc.setFont('helvetica', 'bold'); doc.setFontSize(10);
    doc.setFillColor(244, 243, 239);
    doc.rect(margin, y - 4, 182, 8, 'F');
    doc.text(title, margin + 2, y); y += 9;
    doc.setFont('helvetica', 'normal'); doc.setFontSize(9);
  };
  const line = (label, val) => {
    guard();
    doc.setFont('helvetica', 'bold'); doc.setFontSize(8.5);
    doc.text(label + ':', margin, y);
    doc.setFont('helvetica', 'normal');
    const wrapped = doc.splitTextToSize(String(val ?? '—'), 140);
    doc.text(wrapped, 52, y);
    y += wrapped.length * 5 + 2;
  };

  // Header
  doc.setFont('helvetica', 'bold'); doc.setFontSize(14);
  doc.text('Stage Hub — Internly', margin, y); y += 7;
  doc.setFont('helvetica', 'normal'); doc.setFontSize(9);
  doc.setTextColor(100);
  doc.text(`${match.student.name} × ${match.company.name} — ${match.company.vacature}`, margin, y); y += 5;
  doc.text(`${match.company.start} – ${match.company.eind} | ${match.company.duur}`, margin, y); y += 10;
  doc.setTextColor(0);

  section('Stagegegevens');
  line('Student',   match.student.name);
  line('Opleiding', match.student.opleiding);
  line('Bedrijf',   match.company.name);
  line('Sector',    match.company.sector);
  line('School',    `${match.school.name} (${match.school.opleiding})`);
  y += 3;

  section('Leerdoelen & Voortgang');
  hubState.leerdoelen.forEach(l => {
    line(l.title, `${l.progress}%${l.notes ? ' — ' + l.notes : ''}`);
  });
  y += 3;

  section('Planning & Deadlines');
  hubState.deadlines.forEach(d => { line(d.title, d.date); });
  y += 3;

  section('Taken');
  const statusNl = s => ({ done: 'Afgerond', 'in-progress': 'Bezig', todo: 'Open' }[s] || s);
  hubState.tasks.forEach(t => {
    line(t.title, `${t.assignee} · ${statusNl(t.status)}${t.deadline ? ' · ' + t.deadline : ''}`);
  });
  y += 3;

  section('Afspraken');
  hubState.meetings.forEach(m => {
    const pd = m.selectedDate && m.selectedDate !== 'counter'
      ? m.proposedDates.find(d => d.id === m.selectedDate) : null;
    const dt = pd ? `${pd.date} ${pd.from}–${pd.to}`
      : m.counterProposal ? `${m.counterProposal.date} ${m.counterProposal.from}–${m.counterProposal.to}`
      : '—';
    line(m.subject, `${m.status} · ${dt}`);
  });
  y += 3;

  section('Activiteitenlog');
  hubState.log.slice(0, 10).forEach(l => { line(l.time, l.msg); });

  doc.save(`stageplan-${match.student.name.replace(/ /g, '-')}-${new Date().toISOString().split('T')[0]}.pdf`);
  toast('PDF gedownload');
}

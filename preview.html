<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/favicon_180x180.png">
  <link rel="manifest" href="/manifest.json">
  <title>Internly Logo Animatie Preview</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #f8f9fa;
      font-family: system-ui, sans-serif;
      overflow: hidden;
    }

    #loading-screen {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(255, 255, 255, 0.97);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.8s ease;
    }

    .logo-container {
      text-align: center;
    }

    #internly-logo {
      width: 220px;           /* groter gemaakt */
      height: 220px;
      filter: drop-shadow(0 15px 30px rgba(0, 0, 0, 0.12));
    }

    .loading-text {
      margin-top: 35px;
      font-size: 19px;
      color: #2c3e50;
      font-weight: 500;
    }
  </style>
</head>
<body>

  <div id="loading-screen">
    <div class="logo-container">
      <!-- Jouw echte logo -->
      <img id="internly-logo" src="/home/workdir/attachments/Elegant Green Badge with Centered Orange 'ly'.png" alt="Internly Logo">
      
      <p class="loading-text">Even laden voor internly.pro...</p>
    </div>
  </div>

  <script>
    const logo = document.getElementById('internly-logo');
    
    let angle = 0;
    let scale = 1;
    let growing = true;

    function animateLogo() {
      angle += 0.65;                    // langzame draai
      if (growing) {
        scale += 0.0035;
        if (scale >= 1.085) growing = false;
      } else {
        scale -= 0.0035;
        if (scale <= 0.94) growing = true;
      }

      logo.style.transform = `rotate(${angle}deg) scale(${scale})`;
      logo.style.transformOrigin = "center center";
      
      requestAnimationFrame(animateLogo);
    }

    // Start animatie
    animateLogo();

    // Verberg laadscherm na 4 seconden (voor test)
    setTimeout(() => {
      document.getElementById('loading-screen').style.opacity = '0';
    }, 4500);
  </script>

</body>
</html>

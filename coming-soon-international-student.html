<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/favicon_180x180.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1756a8">
  <title>Internly Worldwide | Launching soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="cs-page cs-intl-student">
  <header class="cs-topbar">
    <a href="index.html" class="cs-logo">intern<span style="color:#FF7E42">ly</span></a>
  </header>

  <main class="cs-main">
    <div class="cs-container">
      <div class="cs-eyebrow">Internly Worldwide</div>
      <h1 class="cs-title">Launching soon</h1>
      <p class="cs-subtitle">Find your Dutch internship â€” fully supported. Visa, housing, insurance, language support. Built for international students.</p>

      <form class="cs-form" id="cs-form" onsubmit="return submitCS(event)">
        <div class="cs-field">
          <label class="cs-label" for="cs-naam">Name</label>
          <input class="cs-input" type="text" id="cs-naam" required>
        </div>
        <div class="cs-field-last">
          <label class="cs-label" for="cs-email">Email</label>
          <input class="cs-input" type="email" id="cs-email" required>
        </div>
        <button class="cs-button" type="submit" id="cs-btn">Notify me</button>
        <div class="cs-success" id="cs-success">Thanks â€” we'll be in touch when Internly Worldwide launches.</div>
        <div class="cs-error" id="cs-error">Please enter a valid email address.</div>
      </form>
    </div>
  </main>

  <footer class="cs-footer">
    <a href="index.html">â† Back to homepage</a>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4" integrity="sha384-GFr3yTh5lJznCbZfpTtXnwboFsxqtTQoeTZCRHhE0579KrRmlCzen5AA8ohaB5ug" crossorigin="anonymous"></script>
  <script src="js/utils.js"></script>
  <script src="js/roles.js"></script>
  <script src="js/supabase.js"></script>
  <script>
  (function() {
    window.submitCS = async function(ev) {
      ev.preventDefault();
      const naamEl = document.getElementById('cs-naam');
      const emailEl = document.getElementById('cs-email');
      const btn = document.getElementById('cs-btn');
      const succ = document.getElementById('cs-success');
      const err = document.getElementById('cs-error');

      err.classList.remove('show');

      const naam = naamEl.value.trim();
      const email = emailEl.value.trim().toLowerCase();

      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        err.textContent = 'Please enter a valid email address.';
        err.classList.add('show');
        return false;
      }

      btn.disabled = true;
      btn.textContent = 'Sendingâ€¦';

      const client = window.db;
      if (!client) {
        err.textContent = 'Something went wrong. Please try again later.';
        err.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Notify me';
        return false;
      }

      const payload = {
        email,
        naam,
        source: '/coming-soon-international-student'
      };

      const { error } = await client.from('waitlist').insert(payload);

      btn.disabled = false;
      btn.textContent = 'Notify me';

      if (error && error.code !== '23505') {
        err.textContent = 'Something went wrong. Please try again later.';
        err.classList.add('show');
        return false;
      }

      document.getElementById('cs-form').style.display = 'none';
      succ.classList.add('show');
      return false;
    };
  })();
  </script>
</body>
</html>
